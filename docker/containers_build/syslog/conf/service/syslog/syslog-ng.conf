@version: 3.25
@include "scl.conf"

# Syslog-ng configuration file, compatible with default Debian syslogd
# installation.

# First, set some global options.
options { chain_hostnames(off); flush_lines(0); use_dns(no); use_fqdn(no);
	owner("root"); group("adm"); perm(0640); stats_freq(0); create_dirs(yes);
	bad_hostname("^gconfd$");
};

########################
# Sources
########################
# This is the default behavior of sysklogd package
# Logs may come from unix stream, but not from another machine.
#
source s_src {
	system();
	internal();
};

# If you wish to get logs from remote machine you should uncomment
# this and comment the above source line.
source s_net {
        tcp( ip("0.0.0.0") );
        udp( ip("0.0.0.0") );
        syslog( ip("0.0.0.0") );
        unix-stream("/var/run/syslog-ng/syslog-ng.sock");
};

########################
# Destinations
########################
# First some standard logfile
#
destination d_auth { file("/var/log/auth.log"); };
destination d_cron { file("/var/log/cron.log"); };
destination d_daemon { file("/var/log/daemon.log"); };
destination d_kern { file("/var/log/kern.log"); };
destination d_lpr { file("/var/log/lpr.log"); };
destination d_mail { file("/var/log/mail.log"); };
destination d_syslog { file("/var/log/syslog"); };
destination d_user { file("/var/log/user.log"); };
destination d_uucp { file("/var/log/uucp.log"); };

# This files are the log come from the mail subsystem.
#
destination d_mailinfo { file("/var/log/mail/mail.info"); };
destination d_mailwarn { file("/var/log/mail/mail.warn"); };
destination d_mailerr { file("/var/log/mail/mail.err"); };

# Logging for INN news system
#
destination d_newscrit { file("/var/log/news/news.crit"); };
destination d_newserr { file("/var/log/news/news.err"); };
destination d_newsnotice { file("/var/log/news/news.notice"); };

# Some catch-all logfiles.
#
destination d_debug { file("/var/log/debug"); };
destination d_error { file("/var/log/error"); };
destination d_messages { file("/var/log/messages"); };

# The root's console.
#
destination d_console { usertty("root"); };

# Virtual console.
#
destination d_console_all { file("/dev/tty10"); };

# The named pipe /dev/xconsole is for the nsole' utility.  To use it,
# you must invoke nsole' with the -file' option:
#
#    $ xconsole -file /dev/xconsole [...]
#
destination d_xconsole { pipe("/dev/xconsole"); };

# Debian only
destination d_ppp { file("/var/log/ppp.log"); };

# From Remote
destination d_net_file { file("/var/log/net/net.log" create_dirs(yes)); };

# Opensips Destinations
destination d_osips      { file("/var/log/opensips/opensips.log"           create_dirs(yes)); };
destination d_osips_acc  { file("/var/log/opensips/acc/acc.log" template("${method},${from_tag},${to_tag},${call_id},${code},${reason},$(if ( \"$(length ${timestamp})\" != \"0\" ) \"${timestamp}\" \"$(+ ${call_start_time} ${duration})\"),${uniqueid},${fu},${tu},${ua},${fU},${si},${sp},${dst_user},${rd},${rp},${x-gwipaddress},${x-callstart},${x-callsetup},${rs},${fn},${ds},${contact},${fac_user},${fac_domain},${transfer_id},${leg_src},${leg_dst},${setuptime},${created},${duration},${ms_duration}\n")); };
destination d_osips_pres { file("/var/log/opensips/opensips-presence.log"  create_dirs(yes)); };
destination d_osips_regs { file("/var/log/opensips/opensips-register.log"  create_dirs(yes)); };
destination d_osips_tls  { file("/var/log/opensips/opensips-tls.log"       create_dirs(yes)); };

# Asterisk
destination d_asterisk { file("/var/log/asterisk/asterisk.log" create_dirs(yes)); };

# Dhcpd
destination d_dhcpd { file("/var/log/dhcpd/dhcpd.log" create_dirs(yes)); };

# Ldap
destination d_ldap { file("/var/log/ldap/ldap.log" create_dirs(yes)); };

# UFW
destination d_ufw { file("/var/log/ufw.log" create_dirs(yes)); };

# RTP Proxy
destination d_rtpproxy { file("/var/log/rtpproxy/rtpproxy.log" create_dirs(yes)); };


# Tomcat9
destination d_tomcat { file("/var/log/tomcat9/catalina.out" create_dirs(yes)); };

# Elk Stack
#
## Logstash listener
destination d_net { network("127.0.0.1" port(5140) flags(syslog-protocol)); };

# Null
destination d_null { file("/dev/null" perm(0666)); };

########################
# Filters
########################
# Here's come the filter options. With this rules, we can set which
# message go where.

filter f_dbg { level(debug); };
filter f_info { level(info); };
filter f_notice { level(notice); };
filter f_warn { level(warn); };
filter f_err { level(err); };
filter f_crit { level(crit .. emerg); };

filter f_debug { level(debug) and not facility(auth, authpriv, news, mail); };
filter f_error { level(err .. emerg) ; };
filter f_messages { level(info,notice,warn) and
	not facility(auth,authpriv,cron,daemon,mail,news); };

filter f_auth { facility(auth, authpriv) and not filter(f_debug); };
filter f_cron { facility(cron) and not filter(f_debug); };
filter f_daemon { facility(daemon) and not filter(f_debug); };
filter f_kern { facility(kern) and not filter(f_debug); };
filter f_lpr { facility(lpr) and not filter(f_debug); };
filter f_local { facility(local0, local1, local3, local4, local5,
		local6, local7) and not filter(f_debug); };
filter f_mail { facility(mail) and not filter(f_debug); };
filter f_news { facility(news) and not filter(f_debug); };
filter f_syslog3 { not facility(auth, authpriv, mail) and not filter(f_debug); };
filter f_user { facility(user) and not filter(f_debug); };
filter f_uucp { facility(uucp) and not filter(f_debug); };

filter f_cnews { level(notice, err, crit) and facility(news); };
filter f_cother { level(debug, info, notice, warn) or facility(daemon, mail); };

filter f_ppp { facility(local2) and not filter(f_debug); };
filter f_console { level(warn .. emerg); };

# Opensips filters
filter f_osips      {  program("MV-SIProxy");  };
filter f_osips_acc  {  message(".*ACC:.*");  };
filter f_osips_regs {  message(".*REGISTER.*"); };
filter f_osips_pres {  message(".*(INFO|ERROR|NOTICE|WARNING):(pua|presence).*"); };
filter f_osips_disc {  message(".*INFO:(exec:timer_routine|db_mysql:(reset_all_statements|db_mysql_do_prepared_query|connect_with_retry|switch_state_to_disconnected)).*"); };
filter f_osips_tls  {  message(".*(proto_tls|tls_mgm).*"); };

# Dhcpd filter
filter f_dhcpd { program("dhcpd"); };

# LDAP filter
filter f_ldap { program("slapd"); };

# Asterisk filter
filter f_asterisk { program("MV-MTP"); };

# UFW filter
filter f_ufw { program("UFW"); };

# RTP Proxy filter
filter f_rtpproxy { program("rtpproxy"); };

filter f_tomcat { program("tomcat9"); };

########################
# Rewrite Filters
########################

rewrite r_osips {
	subst("opensips", "SBC", value("PROGRAM"));
	subst("opensips", "SBC", value("MESSAGE"), flags("global" "ignore-case"));
};
rewrite r_asterisk {
	subst("asterisk", "MTP", value("PROGRAM"));
	subst("asterisk", "MTP", value("MESSAGE"), flags("global" "ignore-case"));
};
rewrite r_acc_sanitize {
	subst('.*method=', '', value("MESSAGE"), flags("global"),  type("pcre"));
	subst(';\w+[-_ ]?\w+=', ',', value("MESSAGE"), flags("global"),  type("pcre"));
};

parser p_kv_by_semicol {
	kv-parser(pair-separator(";"));
};

########################
# Log paths
########################

# Opensips destinations
log { source(s_net); rewrite(r_osips); filter(f_osips_disc); destination(d_null); flags(final);};
log { source(s_net); rewrite(r_osips); filter(f_osips_regs); destination(d_osips_regs); flags(final);};
log { source(s_net); rewrite(r_osips); filter(f_osips_pres); destination(d_osips_pres); flags(final);};
log { source(s_net); filter(f_osips_acc); parser(p_kv_by_semicol); destination(d_osips_acc);  flags(final);};
log { source(s_net); rewrite(r_osips); filter(f_osips_tls);  destination(d_osips_tls);  flags(final);};
log { source(s_net); rewrite(r_osips); filter(f_osips); destination(d_osips); flags(final);};

# Dhcpd destination
log { source(s_net); filter(f_dhcpd); destination(d_dhcpd); flags(final); };

# Dhcpd destination
log { source(s_net); filter(f_ldap); destination(d_ldap); flags(final); };

# Opensips destination
log { source(s_net); rewrite(r_asterisk); filter(f_asterisk); destination(d_asterisk); flags(final); };

# RTP Proxy destination
log { source(s_net); filter(f_rtpproxy); destination(d_rtpproxy); flags(final); };

# Tomcat 9 destination
log { source(s_net); filter(f_tomcat); destination(d_tomcat); flags(final); };

# UFW destination
log { source(s_net); filter(f_ufw); destination(d_ufw); flags(final); };

log { source(s_net); filter(f_auth); destination(d_auth); };
log { source(s_net); filter(f_cron); destination(d_cron); flags(final); };
log { source(s_net); filter(f_daemon); destination(d_daemon); };
log { source(s_net); filter(f_kern); destination(d_kern); flags(final); };
log { source(s_net); filter(f_lpr); destination(d_lpr); };
log { source(s_net); filter(f_syslog3); destination(d_syslog); };
log { source(s_net); filter(f_user); destination(d_user); };
log { source(s_net); filter(f_uucp); destination(d_uucp); };

log { source(s_net); filter(f_mail); destination(d_mail); };
#log { source(s_net); filter(f_mail); filter(f_info); destination(d_mailinfo); };
#log { source(s_net); filter(f_mail); filter(f_warn); destination(d_mailwarn); };
#log { source(s_net); filter(f_mail); filter(f_err); destination(d_mailerr); };

log { source(s_net); filter(f_news); filter(f_crit); destination(d_newscrit); };
log { source(s_net); filter(f_news); filter(f_err); destination(d_newserr); };
log { source(s_net); filter(f_news); filter(f_notice); destination(d_newsnotice); };
#log { source(s_net); filter(f_cnews); destination(d_console_all); };
#log { source(s_net); filter(f_cother); destination(d_console_all); };
#log { source(s_net); filter(f_ppp); destination(d_ppp); };
log { source(s_net); filter(f_debug); destination(d_debug); };
log { source(s_net); filter(f_error); destination(d_error); };
log { source(s_net); filter(f_messages); destination(d_messages); };
log { source(s_net); filter(f_console); destination(d_console_all); destination(d_xconsole); };
log { source(s_net); filter(f_crit); destination(d_console); };
log { source(s_net); destination(d_net_file); };

# All messages send to a remote site
log { source(s_net); destination(d_net); };

###
# Include all config files in /etc/syslog-ng/conf.d/
###
@include "/etc/syslog-ng/conf.d/"
