{
	"db": {
		"type": "mysql",
		"user": "{{DB_USER}}",
		"pass": "{{DB_PASS}}",
		"dbnm": "opensips",
		"host": "{{HOST_IP}}"
	},
	"accounting": {
		"source_file": "/var/log/opensips/opensips-acc.log"
	},
	# Upload URIs are exclusive (get sequentially tested): CDR records are dispatched
	# only to the first answering
	"upload_uris": [
		"http://{{HOST_IP}}:{{TELCO_HTTP_PORT}}/api/v1/CallLogs/raw_cdr_record",
	#	"https://lab.techfusion.it:3001/api/v1/CallLogs/raw_cdr_record",
	],
	# Replication URIs are inclusive (get sequentially tested): CDR records are dispatched
	# to all answering
	"replication_uris": [
	#	"http://{{HOST_IP}}:{{TELCO_HTTP_PORT}}/api/v1/CallLogs/raw_cdr_record"
	#	"https://lab.techfusion.it:3001/api/v1/CallLogs/raw_cdr_record"
	],
	# Same as before but used to upload recording audio
	"recording_upload_uris": [
		"http://{{HOST_IP}}:{{TELCO_HTTP_PORT}}/api/v1/CallRecordings/raw_cdr_recording",
	#	"https://lab.techfusion.it:3001/api/v1/CallRecordings/raw_cdr_recording"
	],
	# Same as before but used to replicate recording audio
	"recording_replication_uris": [
	#	"http://{{HOST_IP}}:{{TELCO_HTTP_PORT}}/api/v1/CallLogs/raw_cdr_record"
	#	"https://lab.techfusion.it:3001/api/v1/CallRecordings/raw_cdr_recording"
	],
	"system": {
	#	"debug_log": "/var/log/CDREngine/mmonitor_accounting.log"
	}
}
