## Routa le chiamate verso le destinazioni locali.
route[LOCAL] {
	# Gestisce i Distinctive ringtone
	avp_db_query("SELECT distinctive_ringtone FROM subscriber WHERE username='$rU' and domain_id='$avp(domainid)';", "$avp(ret)");

	# Cicla tutti i contatti del chiamante
	# for ($var(ct) in $(ct[*])) xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> LOCAL][0m                 >>> Caller Contact: $var(ct)\n");

	# Controla per eventuali forward
	route(CHKFWD);

 	serialize_branches(1);
    next_branches();

	# Inoltra alla route di default
	route(1);
	
	# Ferma la transazione
	exit();
}

## Aggiorna la presentazione dell'utente se specificata nel database
route[UPDCTC] {
	# Preleva l'rpid del subscriber (auth_db module)
	if($avp(rpid) || $avp(label)) {
		# Avaya WA (introducing PAI) Rimuove il precedente RPID/PAI se presente
		if($hdr("Remote-Party-ID")) { remove_hf("Remote-Party-ID"); }
		if($hdr("P-Asserted-Identity")) { remove_hf("P-Asserted-Identity"); }

		# Check for RPID field
		$var(userpart) = $fU;
		if($avp(rpid))  { $var(userpart) = $avp(rpid); }

		# Check for Label field
		$var(lblpart) = $var(userpart);
		if($avp(label)) { $var(lblpart) = $avp(label); }

		# Riscrive il campo From -- Meglio evitare essendo la rotta necessaria
		# alla riscrittura dell'RPID in ambito di Interouting.
		# Abilitare solo in caso di interworking con apparati con supporto SIP
		# limitato.
		# ----
		# uac_replace_from("$var(lblpart)", "sip:$var(userpart)@$avp(domain)");

		# Appende il Remote Party ID
		$avp(x-rpid) = "\"" + $var(lblpart) + "\" <sip:" + $var(userpart) + "@" + $avp(domain) + ">";

		# Debug
		xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> UPDCTC][0m                >>> PRESENTATION for $fu updated to: $avp(x-rpid)\n");
	}
}

## Controlla le abilitazioni sui forwards
route[CHKFWD] {
	# Debug
	xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> CHKFWD]                >>> Matching $rU ($ru) against local AOR database\n");

	# Controlla se la numerazione cercata e' una local AOR ... altrimenti esce
	if (is_contact_registered("location","$ru",,)) { return; }

	# Se la numerazione cercata non esiste tra quelle di sistema esce
	avp_db_query("SELECT id,domain_id,num FROM  coresipnum_view WHERE domain_id='$avp(domainid)' AND num='$rU'", "$avp(subid);$avp(ret)");
	
	# Non e' presente tra i subscribers ... esce
	if(!$avp(ret)) { return; }
	
#	# Se Ă un boss/secretary con filtro disattivato non valuta le deviazioni
#	if (avp_db_query("SELECT id FROM `hunting_group` WHERE `group_name`='$rU' AND `domain_id`='$avp(domainid)' AND `boss_secretary`=1 AND (`forward_unc`=1 AND `forward_unc_target`='$rU');", "$avp(hgid)")) {
#		if($avp(hgid) && ($(avp(hgid){s.int}) > 0)) {
#			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKFWD][0m                >>> Skipping Forward for IMA service ($avp(hgid)) with filter disabled\n");
#			return;
#		}
#	}

	# Non e' presente tra i subscribers ... esce
	if(!$avp(ret)) { return; }

	# Controlla eventuali impostazioni di forwarding
	if(avp_db_query("SELECT sp.`cfwd_on_notfound_enabled`, sp.`fme_on_notfound_enabled`, sp.`cfwd_on_notfound_target`, sp.`cfwd_on_busy_enabled`, sp.`fme_on_busy_enabled`, sp.`cfwd_on_busy_target`, sp.`cfwd_unconditional_enabled`, sp.`fme_unconditional_enabled`, 
			sp.`cfwd_unconditional_target`, sp.`cfwd_on_unavailable_enabled`, sp.`fme_on_unavailable_enabled`, sp.`cfwd_on_unavailable_target`, sp.`cfwd_on_unavailable_timout`, sp.`vm_on_unavailable_enabled`, sp.`vm_only_internal_enabled` FROM `subscriber_properties` as sp,
			subscriber AS sbr WHERE sbr.`username`='$rU' AND sbr.`id`=sp.`subscriber_id` LIMIT 1", "$avp(cfnr);$avp(cfnrfme);$avp(cfnrtrg);$avp(cfbena);$avp(cfbfme);$avp(cfbtrg);$avp(cfaena);$avp(cfafme);$avp(cfatrg);$avp(cfuena);$avp(cfufme);$avp(cfutrg);$avp(cfutmt);$avp(vmunena);$avp(vmint)")) {

		# Avvalora le avp per i controlli sui forward lato centrale
		$dlg_val(is_forward)       = "1";
		$avp(x-forward-user)       = $rU;
		$avp(x-forward-domain)     = $td;
		$avp(x-forward-destdomain) = $td;

		# Il trasferimento incondizionale e' abilitato
		# in questo caso  e' sufficiente modificare il
		# remote uri.
		if($(avp(cfaena){s.int}) || $(avp(cfafme){s.int})) {
			if(!$(avp(cfafme){s.int})) {
				# Avvalora le avp per i controlli sui forward lato centrale
				$avp(x-forward-destuser)   = $avp(cfatrg);
				# Debug
				xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> CHKFWD][0m                >>> [31mFWD ALWAYS[0m for $rU to sip:$avp(x-forward-destuser)@$avp(x-forward-destdomain), checking call classes ...\n");
				# Controlla le classi di servizio
				route(CHKDST);
				# Cambia il  remote uri  in  modo che
				# venga correttamente applicato nella
				# t_reply
				$rU =  $avp(cfatrg);
				# Nel caso di FWD ALWAYS da centrale non avrĂ˛ call leg che provano a raggiungere il telefono
				# e non vedrĂ˛ alcun riferimento al chiamato nei CDR:
				# salvo il contatto, in modo da poter poi billare la chiamata inoltrata al chiamato
				$avp(x-cdr-billto) = "Contact: <" + $ru + ">";
				# Tiene traccia degli estremi del fwd (trasferente, trasferito)
				$avp(acc_transfer_src) = $fu;
				$avp(acc_transfer_dst) = $ru;
				$avp(x-cdr) = 1;
		                # salva il contatto originale destinatario per il servizio fax
		                $avp(x-orig-ru)  = $avp(x-forward-user);
				# Reinietta la nuova chiamata in dialplan
				route(DIALPLAN);
			} else {
				# Debug
				xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> CHKFWD][0m                >>> [31mFWD ALWAYS to followme[0m service id: $avp(subid)\n");
				route(FOLLOWME);
			}
			# Essendo  incondizionale,  blocco la
			# transazione
			exit();
		}

		# E' abilitato il trasferimento  su occupato
		# in questo caso  ci limitiamo  ad impostare
		# una variabile da utilizzare nella rotta di
		# fallback
		if($(avp(cfbena){s.int}) && !$(avp(cfbfme){s.int})) {
			# Imposto il  target della trasferta
			$avp(onbusy) = $avp(cfbtrg);

			# Debug
			xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> CHKFWD][0m                >>> [31mFWD ON BUSY[0m configured for $rU to sip:$avp(onbusy)@$td\n");
		}

		# E' abilitato il trasferimento o la voicemail
		# su indisponibilita' / occupato
		if(($(avp(cfuena){s.int}) || $(avp(vmunena){s.int})) && !$(avp(cfufme){s.int})) {
			if($(avp(vmunena){s.int})) {
				# Debug
				xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> CHKFWD][0m                >>> [31mVM ON UNAV[0m for $rU after $avp(cfutmt) seconds\n");
			} else {
				# Debug
				xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> CHKFWD][0m                >>> [31mFWD ON UNAV[0m for $rU to $avp(cfutrg) after $avp(cfutmt) seconds\n");
				# Imposto il target della trasferta
				$avp(onunav) = $avp(cfutrg);
			}

			# Imposto il timeout della dialog se la chiamata non proviene dall'esterno
			# e non e' abilitata la voicemail per le sole chiamate interne
			if(!($(avp(vmunena){s.int}) && $(avp(vmint){s.int}) && !$avp(fromlocal))) {
				$T_fr_inv_timeout = $avp(cfutmt);
			} else {
				# Debug
				xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKFWD][0m                >>> [31mSkipping forward to VM due to internal only flag![0m\n");
			}
		}
	}
}

route[CHKSPD] {
	# Salva gli uri originari
	$var(ofuri) = $fu;
	$var(oruri) = $ru;
	# Controlla se la numerazione e' uno speedial per utente
	if(!sd_lookup("speed_dial", "$fu")) {
		# Altrimenti controlla se la numerazione e' uno speedial globale
		if(!sd_lookup("speed_dial", "sip:any@any")) {
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> CHKSPD]                >>> $ru is NOT a SPEED DIAL go ahead\n");
		} else {
			# Debug
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKSPD][0m                >>> R-URI $var(oruri) is a speed dial: $ru\n");
			# Imposta flag di abilitazione per lo speed dial utente
			setflag(29);
		}
	} else {
		# Debug
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKSPD][0m                >>> F-URI $var(ofuri) is a speed dial: $fu\n");
		# Riscrive l'original URI
		# Imposta flag di abilitazione per lo speed dial utente
		setflag(29);
	}

	# Riscrive l'original URI
	if(isflagset(29)) { $avp(originalruri) = $ru; }

}

route[CHKRBL] {

	# Il flag 29 e' gia stato impostato (possibile pickup).
	# non c'e' alcuna necessita' di controllarne le autorizzazioni
	if(isflagset(29)) {
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> Call-Id $ci already authorized for $ru\n");
		return;
	}

	# Quando si un chiamante innesca il recall, non Ă¨ detto che la sua numerazione sia raggiungibile dal servizio di recall -> bypass
	if($hdr(X-CoreSIP-Recall)) {
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> Call-Id $ci recall bypass for $ru\n");
		return;
	}

	# Forward direttore, bypassa le blacklist <-- Valido solo per le chiamate
	# entranti intercettate dalla segretaria
	if($hdr(X-CoreSIP-ServiceType) =~ "HuntingGroupFwd") {
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> Call-Id $ci boss bypass for $ru\n");
		return;
	} else {
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> Call-Id $ci NO boss bypass for $ru\n");
	}

	# Forward direttore, bypassa le blacklist <-- Valido solo per le chiamate
	# uscenti inizializzate dalla segretaria
	if($hdr(Replaces)) { $var(referrer) = $hdr(Replaces); } else { $var(referrer) = $fU + ";" + $rU; }

	# Preleva la coppia direttore/segretaria dal memcache prima dei 10 secondi
	# Se presente
	cache_fetch("memcached:aor", "$var(referrer)", $avp(bossecre));
	
	$var(bltarget) = $rU;
	$var(bluser) = $fU;	
	if($avp(bossecre)) {
		$var(bltarget) = $(avp(bossecre){s.select,0,;});
		$var(bluser) = $(avp(bossecre){s.select,1,;});
	}

	# Debug
	xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> Retrieving from $var(referrer) bossecre var $avp(bossecre) ($var(bltarget) - $var(bluser))\n");
	
	# Controlla se il chiamante sta cercando di raggiungere un servizio Boss/Secretary la cui boss line
	# ha lo stesso numero di un subscriber. In tal caso ignora le blacklist
	if (avp_db_query("SELECT id FROM `hunting_group` WHERE `group_name`='$rU' AND `domain_id`='$avp(domainid)' AND `boss_secretary`=1", "$avp(hgid)")) {
		if($avp(hgid) && ($(avp(hgid){s.int}) > 0)) {
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> $fu is trying to contact an IMA service - $avp(hgid) - , going ahead!\n");
			return;
		} 
	}
	
	# Controlla preventivamente le regole specifiche per l'utente
	# se almeno una ha un range valido ed Ă¨ white permetti la chiamata
	# altrimenti se almeno una ha un range valido ed Ă¨ black blocca la chiamata
	# altrimenti prosegui i controlli
	$avp(usrbl) = 2; # default value
	
	# bugfix: il formato del timerec richiesto dalla check_time_rec richiede dtstart|DTEND|duration...
	# diversamente dal formato usato in drouting e dialplan che non lo prevede -> fino ad avvenuta unificazione si usa una manipolazione SQL sul timerec
	if (avp_db_query("SELECT br.`prefix`, br.`whitelist`, ifnull(insert( br.timerec, instr( br.`timerec` , '|' ) , 1, '||' ),'') 
				FROM `blacklist_rule` as br
				INNER JOIN  `blacklist_rule_subscribers` as brs on brs.blacklist_rule_id = br.id
				INNER JOIN  `subscriber` as s on brs.subscriber_id = s.id
				WHERE br.`is_global` = 0 AND '$var(bltarget)' REGEXP br.prefix AND '$var(bluser)' = s.username", 
				"$avp(usrblprefix);$avp(usrblwhite);$avp(usrbltime)") ) {

		while($avp(usrblprefix)){
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> evaluating user blacklist rule $avp(usrblprefix): whitelist $avp(usrblwhite), timerec $avp(usrbltime) \n");
			
			# se il range  Ă¨ vuoto o Ă¨ valido, imposta $avp(usrbl) al valore contenuto in $avp(usrblwhite)
			if ( ($(avp(usrbltime){s.len}) < 1) || check_time_rec("$avp(usrbltime)")) {
				$avp(usrbl) = $avp(usrblwhite);
				$avp(usrblprefix) = null; # equivalente al break
			}
							
			avp_delete("$avp(usrblprefix)");
		}
	}

	# Debug
	xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> user blacklist check exit status:  $avp(usrbl) \n");
	
	# Controlla le regole generiche
	# se almeno una ha un range valido ed Ă¨ white permetti la chiamata
	# altrimenti se almeno una ha un range valido ed Ă¨ black blocca la chiamata
	# altrimenti prosegui i controlli
	$avp(glrbl) = 2; # default value
	
	# bugfix: il formato del timerec richiesto dalla check_time_rec richiede dtstart|DTEND|duration...
	# diversamente dal formato usato in drouting e dialplan che non lo prevede -> fino ad avvenuta unificazione si usa una manipolazione SQL sul timerec
	if (avp_db_query("SELECT br.`prefix`, br.`whitelist`, ifnull(insert( br.timerec, instr( br.`timerec` , '|' ) , 1, '||' ),'') 
				FROM `blacklist_rule` as br
				WHERE br.`is_global` = 1 AND '$var(bltarget)' REGEXP br.prefix", 
				"$avp(glrblprefix);$avp(glrblwhite);$avp(glrbltime)") ) {

		while($avp(glrblprefix)){
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> evaluating global blacklist rule $avp(glrblprefix): whitelist $avp(glrblwhite), timerec $avp(glrbltime) \n");
			
			# se il range  Ă¨ vuoto o Ă¨ valido, imposta $avp(glrbl) al valore contenuto in $avp(glrblwhite)
			if (($(avp(glrbltime){s.len}) < 1) || check_time_rec("$avp(glrbltime)")) {
				$avp(glrbl) = $avp(glrblwhite);
				$avp(glrblprefix) = null; # equivalente al break
			}
							
			avp_delete("$avp(glrblprefix)");
		}
	}

	# Debug
	xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> global blacklist check exit status:  $avp(glrbl) \n");
	
	# Discrimina sul risultato
	if($(avp(usrbl){s.int}) == 1 || $(avp(glrbl){s.int}) == 1) {
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> User $fU whitelisted for $rU ... go ahead!\n");
		setflag(29);
	} else if($(avp(usrbl){s.int}) == 2 && $(avp(glrbl){s.int}) == 2) {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> CHKRBL]                >>> Nothing found for $fU to $rU ... go ahead!\n");
	} else if($(avp(glrbl){s.int}) == 0 || $(avp(usrbl){s.int}) == 0) {
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> $fU is blacklisted for $rU!\n");
		t_reply("403", "Non autorizzato");
		exit;
	} else {
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> CHKRBL][0m                >>> Destination $rU is blacklisted for $fU!\n");
		t_reply("403", "Non autorizzato");
		exit;
	}
}

# Controlla se la Destinazione e' un hunting group
route[CHKHG] {
	if(
		avp_db_query("SELECT group_name,boss_secretary,username,domain,domain_id,delay,policy_name,forward_on_unvailable,forward_target,forward_on_busy,forward_on_busy_target,forward_unc,forward_unc_target,boss_dnd,cycle 
			FROM hunting_view WHERE group_name='$rU' AND domain_id='$avp(domainid)'", 
			"$avp(hg_name);$avp(hg_bs);$avp(hg_user);$avp(hg_domain);$avp(hg_domainid);$avp(hg_delay);$avp(hg_pname);$avp(hg_fou);$avp(hg_fout);$avp(hg_fob);$avp(hg_fobt);$avp(hg_fue);$avp(hg_fut);$avp(hg_dnd);$avp(hg_cycle)"
		)
	){

		# Debug
		if($(avp(hg_bs){s.int}) == 1) {
			# Debug
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> IMA][0m                   >>> $rU detected as IMA service for domain $avp(domainid) / $avp(x-routedomain)\n");

			# Check if source is whitelisted for service
                        if (avp_db_query(
				"SELECT br.`prefix`, br.`whitelist`, ifnull(insert(br.timerec, instr( br.`timerec` , '|' ) , 1, '||' ),'') FROM `blacklist_rule` as br INNER JOIN `blacklist_rule_customnumbers` as brs on brs.blacklist_rule_id = br.id
				INNER JOIN  `coresipnum_custom` as cnc on brs.cusnumber_id = cnc.id WHERE br.`is_global` = 0 AND '$var(bltarget)' REGEXP br.prefix AND '$var(bluser)' = cnc.num",
				"$avp(usrblprefix);$avp(usrblwhite);$avp(usrbltime)")
			) {
				while($avp(usrblprefix)) {
					xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> IMA][0m                   >>> Evaluating custom numbers blacklist rule $avp(usrblprefix): whitelist $avp(usrblwhite), timerec $avp(usrbltime) \n");
					
					# se il range  Ă¨ vuoto o Ă¨ valido, imposta $avp(usrbl) al valore contenuto in $avp(usrblwhite)
					if(($(avp(usrbltime){s.len}) < 1) || check_time_rec("$avp(usrbltime)")) {
						xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> IMA][0m                   >>> $fu is whitelisted for IMA $avp(hg_name) service ...\n");
						return;
					}
					
					avp_delete("$avp(usrblprefix)");
				}
			}

			# E' stato impostato il bsfwd (bypass segretarie)
			if(($(avp(hg_fue){s.int}) == 1) && ($avp(hg_name) == $avp(hg_fut))) {
				xlog("L_INFO", "[33m[$(fU{s.fill.left,'.',15}) -> IMA][0m                   >>> Filter deactivated for $rU, sending to manager!\n");
				return;
			}

			# Trasferta verso direttore, bypassa il servizio <-- Valido solo per le chiamate
			# uscenti inizializzate dalla segretaria
			if($hdr(Replaces)) { $var(referrer) = $hdr(Replaces); } else { $var(referrer) = $fU + ";" + $rU; }

			# Controlla se il chiamante Ă un assistente del servizio IMA destinatario
			if(avp_db_query("SELECT username FROM `hunting_view` WHERE `group_name` = '$avp(hg_name)' AND username='$fU' AND available=1 LIMIT 1", "$avp(hg_assistant)")) {
				if($avp(hg_assistant) != null) {
					xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> IMA][0m                   >>> $fu is an assistant transferring a call to its manager ( $var(referrer) / $avp(bossecre) ) ...\n");
					return;
				}
			}

			# Looking for BS available members
			if(avp_db_query("SELECT username, available, delay, hunting_policy_id, cycle FROM `hunting_view` WHERE `group_name` = '$avp(hg_name)' AND available=1 ORDER BY
				CASE WHEN policy_name='linear' THEN priority END DESC, CASE WHEN policy_name='random' THEN RAND() END;", 
				"$avp(hg_secname);$avp(hg_secavail);$avp(hg_delay);$avp(hg_policy);$avp(hg_cycle)")) {

				$var(count) = 0;
                                $var(br_index)  = 0;
                                $var(hg_delay)  = 0;
                                $var(hg_policy) = 1;
                                $dlg_val(hg_ouri) = $ru;
			
				while($(avp(hg_secname)[$var(count)]) != NULL) {

					if($avp(hg_secname) && ($(avp(hg_secavail){s.int}) == 1)) {
						$var(tmp_qvalue) = null;
						$var(hg_secavail) = $(avp(hg_secavail)[$var(count)]);
						$var(hg_policy) = $(avp(hg_policy)[$var(count)]);
						$var(hg_secname) = $(avp(hg_name)[$var(count)]);
						$var(hg_cycle) = $(avp(hg_cycle)[$var(count)]);
						$var(hg_delay) = $(avp(hg_delay)[$var(count)]);
						# $var(tmp_uri) = "sip:" + $(avp(hg_secname)[$var(count)]) + "@" + $rd;
						$var(tmp_uri) = $(avp(hg_secname)[$var(count)]);
						
						if($(var(br_index){s.int}) == 0) {
							$var(tmp_qvalue) = 1;
							xlog("L_INFO", "^[[35m[$(fU{s.fill.left,'.',15}) -> IMA]^[[0m                   >>> Addin BS Main branch: $ru - Q main for $avp(hg_name)\n");
							if($(var(hg_policy){s.int}) != 3) { append_branch(); }
						} else {
							math_eval("1000 - ($var(br_index) * 100)", "$var(tmp_qvalue)");
							xlog("L_INFO", "^[[35m[$(fU{s.fill.left,'.',15}) -> IMA]^[[0m                   >>> Adding branch: $var(tmp_uri) - Q $(var(tmp_qvalue){s.int}) for $avp(hg_name)\n");
							append_branch();
						}
						
						# Save Hunting Member Delay
						$var(hg_delay) = $(var(hg_delay){s.int});
						# Save Hunting Policy
						$var(hg_policy) = $(var(hg_policy){s.int});
						# Change URI Branch
						# $ru = $var(tmp_uri);
						$rU = $var(tmp_uri);
						# Append Q-Value
						if($var(tmp_qvalue)) { $ru_q = $(var(tmp_qvalue){s.int}); }
						# Increment Branch Index
						$var(br_index) = $var(br_index) + 1;
					}
					
					$var(count) = $var(count) + 1;
                                }

				$var(x-loop) = 1;
				t_on_failure("BS");
				while($var(x-loop) > 0) {
					$T_fr_inv_timeout = $(var(hg_delay){s.int});
					if($(var(hg_policy){s.int}) != 3) {
						xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> IMA][0m                   >>> Sequential hunting ($(var(hg_policy){s.int})) for $avp(hg_name) with a per member timeout of $T_fr_inv_timeout secs\n");
						if($(avp(hg_cycle){s.int}) != 0) {
							xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> IMA][0m                   >>> Cycle enabled for $avp(hg_name)\n");
							serialize_branches(0);
						} else {
							xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> IMA][0m                   >>> Cycle disabled for $avp(hg_name)\n");
							serialize_branches(1);
						}
						if(next_branches()) {
							route(1);
						} else {
							drop();
						}
					} else {
						xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> IMA][0m                   >>> Parallel hunting ($(var(hg_policy){s.int})) for $avp(hg_name) with a per call timeout of $T_fr_inv_timeout secs\n");
						route(1);
					}

					exit;
				}
			}

		} else {
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> IMA][0m                   >>> $rU detected as Hunting Group service for domain $avp(domainid) / $avp(x-routedomain)\n");
		}

		exit;
	} else {
		# Debug
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> IMA][0m                   >>> $rU was not an IMA pilot service\n");
	}
}

route[CHKMME] {
	if(avp_db_query("SELECT m.bookid,m.confno,s.host FROM meetme as m, coresipserver as s 
		WHERE m.confno='$rU' AND m.coresipserver_id=s.id AND NOW() BETWEEN m.starttime AND m.endtime LIMIT 1",
		"$avp(bookid);$avp(confno);$avp(server)")) {

		# Aggiunge l'header di routing.
		# Questo serve per far capire all'Asterisk di
		# ancorare l'RTP per una  chiamata  entrante.
		$avp(x-service)  = "internal_service";
		$avp(x-servtype) = "conference";
		$avp(x-mme)      = "conf_" + $avp(bookid) + "_" + $avp(confno) + "_" + $avp(server);

		# Riscrive Host&Port di Destinazione
		$rd = $avp(server);
		rewriteport("5070");

		# Debug
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKMME][0m                >>> $rU is a conference(Bookid: $avp(bookid)) room on $rd\n");
		
		# Ruota
		route(1);
		
		# Interrompe lo script
		exit;
	}
}

route[CHKCFS] {
	if(avp_db_query("SELECT cf.number FROM call_forwarder cf INNER JOIN domain d ON (d.id = cf.domain_id) 
		WHERE cf.number='$rU' AND d.domain='$rd' LIMIT 1",
		"$avp(cfs_number)")) {

		# Aggiunge l'header di routing.
		# Questo serve per far capire all'Asterisk di
		# ancorare l'RTP per una  chiamata  entrante.
		$avp(x-service)  = "internal_service";
		$avp(x-servtype) = "callforwarder";

		# Debug
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKCFS][0m                >>> $ru is a Call Forwarder Service\n");
		
		# Ruota
		route(MTP);	
	
		# Interrompe lo script
		exit;
	} else {
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKCFS][0m                >>> $ru is not a Call Forwarder Service\n");
		
	}
}

route[CHKCAMPAIGN] {
	if(avp_db_query("SELECT c.name FROM campaign as c, domain as d
				WHERE c.trigger_by_call=1 AND c.trigger_number='$rU' AND d.id=c.domain_id  and d.domain='$rd' LIMIT 1",
				"$avp(campaign_name)")) {

		# Aggiunge l'header di routing.
		# Questo serve per far capire all'Asterisk di
		# ancorare l'RTP per una  chiamata  entrante.
		$avp(x-service)  = "internal_service";
		$avp(x-servtype) = "campaign";

		# Riscrive Host&Port di Destinazione
		$rd = $avp(server);
		rewriteport("5070");

		# Debug
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKCAMPAIGN][0m                >>> $rU triggers the campaign: '$avp(campaign_name)'\n");
		
		# Ruota
		route(MTP);	
		
		# Interrompe lo script
		exit;
	}
}

route[CHKINTERCOM] {
	# Debug
	xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> INTERCOM]              >>> Checking for intercom service ...\n");
	# Preventivamente Rimuove l'header di Call-Info se presente
	if($hdr("Call-Info")) { remove_hf("Call-Info"); }
	# Controlla se sorgente e destinazione fanno parte di un servizio Intercom
	if(avp_db_query("SELECT COUNT(*) FROM subscriber as s1, subscriber as s2, intercom as i WHERE
		i.src_id = s1.id and i.dst_id = s2.id and (s1.username = '$fU' and s1.domain = '$fd') and
		(s2.username = '$rU' and s2.domain = '$td')", "$avp(ret)")) {

		# E' un intercom
		if($avp(ret)) {
			$avp(x-intercom) = 1;
			# Debug
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> INTERCOM][0m              >>> Is an intercom call: $avp(ret)\n");
		}
	}
}

route[PICKUP] {
	# Debug
	xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> PICKUP][0m                >>> Pickupper Call Leg: $fu is tring to pickup a call ($ru)\n");

	# Crea la dialog
	create_dialog();

	# Preleva l'estensione cercata
	if($(rU{s.len}) > $(shv(code_pck){s.len}) ) {
		# Preleva l'estensione rimuovendo il codice di pickup
		$avp(pckcode) = $(rU{s.substr,$(shv(code_pck){s.len}),0});
		$rU = $avp(pckcode);
	}

	# Controlla che non ci siano altri pickup della stessa chiamata
	if(get_dialog_info("pckcaller", "$avp(pckcaller)", "pckby", "$rU")) {
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> PICKUP][0m                >>> Call already picked up\n");
		t_reply("404", "Chiamata prelevata da altro utente");
		exit;
	} else {
		$dlg_val(pckby) = $rU;
		xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> PICKUP][0m                >>> Call never picked up, marked with $dlg_val(pckby)\n");
	}

	# Aggiorna il remote uri prima di creare la dialog
	$ru = "sip:" + $rU + "@" + $td;	
	uac_replace_to("$ru");

	$var(contact) = $fU + "@" + $shv(default_domain);
	set_dlg_profile("outbound", "$var(contact)");

	# Imposta le variabili di dialog -- Imposta il dominio
	# di autenticazione di default (Alt: $td to imagicle.com)
	$avp(storeduser)    = $rU;
	$dlg_val(pckcaller) = $fU;

	# Invia la segnalazione di inoltro al pickupper
	append_to_reply("Contact: <$fu>\r\n");
	t_reply("181", "Call is Being Forwarded");

	# Determina la tipologia di pickup
	$avp(ret) = 0;
	if($avp(pckcode)) {
		if(avp_db_query("SELECT COUNT(*) from call_pickup_group_view WHERE pickup_enable=1 AND FIND_IN_SET('sip:$fU@$fd',nums) > 0 AND FIND_IN_SET('$ru',nums) > 0", "$avp(key)")) {

			# Termina la call leg e marchia la dialog corrente con il callerid della dialog abbattuta
			if($(avp(key){s.int}) > 0)  {

				# Individua la dialog da pickuppare
				exec_avp("/usr/local/bin/osipsexec pickup_ext '$fu' '$ru'", "$avp(ret);$avp(ckid);$avp(kuser)");
				
				if($avp(ckid)) {
					$rU = $avp(kuser);
					$dlg_val(pckcalled) = $avp(ckid);
				}
			} else {
					xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> PICKUP][0m                >>> Pickup not allowed!\n");
					send_reply("403", "Non autorizzato");
					route(CLEANER);
					exit();
			}
		}
	} else {
		if(avp_db_query("SELECT GROUP_CONCAT(nums) from call_pickup_group_view WHERE pickup_enable=1 AND FIND_IN_SET('sip:$fU@$fd',nums) > 0 group by domain_id LIMIT 1", "$avp(pckusers)")) {

			# Individua la dialog da pickuppare
			exec_avp("/usr/local/bin/osipsexec pickup_grp '$fu' '$avp(pckusers)'", "$avp(ret);$avp(ckid);$avp(kuser)");
			
			# Termina la call leg individuata e marchia la dialog corrente con il callerid
			# della dialog abbattuta
			if($(avp(ret){s.int}) > 0) { 
				$rU = $avp(kuser);
				$dlg_val(pckcalled) = $avp(ckid);
			}
		} else {
			xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> PICKUP][0m                >>> Pickup not allowed!\n");
			send_reply("403", "Non autorizzato");
			route(CLEANER);
			exit();
		}
	}

	# Debug
	xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> PICKUP][0m                >>> Found dialog to pickup --> callid: [36m$dlg_val(pckcalled)[0m / [36m$avp(ckid)[0m called: [36m$avp(kuser)[0m\n");

	# Controlla lo stato di ritorno dell'osipsexec
	if($(avp(ret){s.int}) > 0) {
		# Aggiunge la segnalazione
		avp_delete("$avp(x-rtpproxy)");
		$avp(x-service)  = "pk_rtp_anchor";
		$avp(x-parkme)   = $fU;

		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> PICKUP]                >>> Rerouting dialog [36m$dlg_val(pckcalled)[0m/[36m$avp(ckid)[0m and sending [36m$ru[0m to dispatcher for [36m$avp(x-parkme)[0m\n");

		# Aspetta un secondo per evitare il flood sulla fifo
		exec_avp("/usr/local/bin/osipsexec sleep 1", "$avp(ret)");

		# Killa la call leg della chiamata pickuppata
		exec_avp("/usr/local/bin/osipsexec kill_callid $avp(ckid)", "$avp(kill)");

		# Aspetta un altro secondo prima di render nuovamente disponibile
		# il pickup per la stessa estensione
		exec_avp("/usr/local/bin/osipsexec sleep 1", "$avp(ret)");

		# Routa ai dispatchers
		route(MTP);

		# Resetta la variabile
		$dlg_val(pckby) = "";

		# DEBUG
		xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> PICKUP][0m                >>> Call leg $avp(ckid) kill result: $avp(kill) - Killed: $avp(kill)\n");

		# Aggiorna il BLF
		if(!$fu =~ ".*@anonymous.invalid.*") {
			dialoginfo_set();
		}

		# Chiude la chiamata in caso di pickup non effettuato
		if($(avp(kill){s.int}) == 0) {
			t_reply("404", "Chiamata prelevata da altro utente");
			exit;
		}
	} else {
		t_reply("404", "Pickup non trovato");
		route(CLEANER);
	}

	exit;
}

route[PARK] {
	# Isola il ponte di parcheggio scelto
	if($(rU{s.len}) > $(shv(code_prk){s.len})) {
		$avp(prkcode) = $(rU{s.substr,$(shv(code_prk){s.len}),0});
	}

	$avp(x-service)  = "pr_rtp_anchor";

	# Se esiste un codice di parcheggio lo notifica
	if($avp(prkcode)) {
		$avp(x-parkme) = $avp(prkcode);

		# Debug
		xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> PARK][0m                  >>> Parking $ru to $avp(prkcode)\n");
	}

	route(MTP);
	exit;
}

## La rotta viene ingaggiata da una situazione di failure ed effettua un
## controllo sulla dialog per capire se e' stato effettuato un Pickup
route[CHKPCK] {
	# Controllo PICKUP
	$avp(check) = $ci;

	# Debug
	xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> CHKPCK][0m                >>> Pickupped Call Leg: Looking for a dialog containing $avp(check) in pckcalled\n");

	# Cerca, se presente una dialog compatibile da pickuppare
	if(get_dialog_info("pckcaller", "$avp(pckcaller)", "pckcalled", "$avp(check)")) {
		if($avp(pckcaller)) {
			# DEBUG
			xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> CHKPCK][0m                >>> Pickup Call Leg found for $avp(check) --> by $avp(pckcaller) --> $fu / $ru\n");

			# Pulisce la presentity
			avp_db_query("DELETE FROM presence.presentity WHERE username='$rU'", "$avp(ret)");

			# Notifica solo se le destinazioni sono locali
			if(avp_db_query("SELECT username FROM location WHERE username='$rU'", "$avp(found)")) {
				exec_avp("/usr/local/bin/osipsexec notifyall '$rU' '$shv(default_domain)' terminated '$shv(local_hostname)'", "$avp(ret)");
			}

			# Invia al client una notifica di forward
			t_reply("181", "Call is being forwarded");

			# Cambia il from user
			$avp(newid)  = "sip:" + $avp(pckcaller) + "@" + $fd;
			$avp(caller) = $avp(newid);

			# Scrive l'identificativo del pickupper nella dialog
			$dlg_val(pickupper) = $avp(newid);

			# Salva l'identificativo del pickupped per la pulizia in chiusura
			$dlg_val(pickupped) = $fU;

			# Riscrive il remote URI con il contatto del richiedente
			$ru = $avp(newid);
			uac_replace_to("$avp(newid)");

			# Aggiorna la Segnalazione
			$avp(x-service)  = "pk_rtp_anchor";
			$avp(x-parked)   = $avp(pckcaller);

			# Inoltra la chiamata
			route(MTP);

			# Per la segnalazione
			$avp(caller) = "sip:" + $fU + "@" + $fd;
			$avp(callee) = "sip:" + $avp(pckcaller) + "@" + $fd;

			# Esce
			exit();
		} else {
			# DEBUG
			xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> CHKPCK][0m                >>> No pickupper found in dialog\n");
		}
	}
}

route[EMERGENCY] {
	# Preleva la tipologia di numerazione digitata
        # Controlla se vi sono Call Classess associate alla chiamata
        if(avp_db_query(
                "SELECT MAX( `emergency` ) FROM cos_view WHERE '$rU' RLIKE `regexp` AND username = '$avp(username)' AND domain = '$avp(reg_domain)'
                 GROUP BY username, domain", "$avp(x-cos-emergency)"
        )) {
                if($(avp(x-cos-emergency){s.int}) > 0 ) {
                        # Scrive nei log un testo visibile
                        xlog("L_INFO", "\n[31m[$(fU{s.fill.left,'.',15}) -> EMERGENCY]             >>> !! ALERT !![0m");
                        xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> EMERGENCY]             >>> !! Emergency call requested from $avp(username)@$avp(reg_domain) to $rU !![0m");
                        xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> EMERGENCY]             >>> !! ALERT !![0m");

                        # Imposta flag di skip delle abilitazioni
                        setflag(29);
                }
        }
}

## Controlla se il chiamante e' abilitato alla chiamata che sta tentando di effettuare
route[CHKDST] {
	# Controlla che la numerazione non appartenga all'arco di emergenza
	if(!isflagset(29)) { route(EMERGENCY); }

	# Sorgente abilitata
	# if(check_source_address("1")) { return; }
	if(check_source_address("1") && !($dlg_val(is_forward))) { return; }

	## Salta il check qualora il flag 29 e' impostato (probabile chiamata di emergenza)
	if(!isflagset(29)) {
		# Avvalora l'utente da controllare
		$var(user)        = $fU;
		$var(domain)      = $fd;
		$var(dest_user)   = $tU;
		$var(dest_domain) = $td;

		# Nel caso di chiamata proveniente da dispatcher
		if($hdr(X-CoreSIP-RegisteredUser))   { $var(user)   = $hdr(X-CoreSIP-RegisteredUser);   }
		if($hdr(X-CoreSIP-RegisteredDomain)) { $var(domain) = $hdr(X-CoreSIP-RegisteredDomain); }

		# Controlla se il To header e' un alias
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> Checking for $tu alias mapping ...\n");
		if(alias_db_find("dbaliases", "$tu", "$var(resolved_dest)")) {
			# Rimappa user e host parts
			$var(dest_user) = $(var(resolved_dest){uri.user});
			$var(dest_domain) = $(var(resolved_dest){uri.host});

			# Debug
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> alias found, reverting to uri $var(dest_user)@$var(dest_domain)\n");
		}

		# Nel caso di inoltro innescato da centrale
		if($avp(x-forward-user))       { $var(user)        = $avp(x-forward-user);       }
		if($avp(x-forward-domain))     { $var(domain)      = $avp(x-forward-domain);     }
		if($avp(x-forward-destuser))   { $var(dest_user)   = $avp(x-forward-destuser);   }
		if($avp(x-forward-destdomain)) { $var(dest_domain) = $avp(x-forward-destdomain); }

		# Se il source domain e' un indirizzo ip lo converte nel default domain (questo succede solitamente per le chiamate
		# provenienti da destinazioni esterne
		if($var(domain) =~ "[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}") {
			if($avp(x-registeredomain)) {
				$var(domain) = $avp(x-registeredomain);
			} else {
				$var(domain) = $shv(default_domain);
			}

			# Debug
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> Source domain reverted from ip address to default domain: $var(domain)\n");
		}

		# Se il dest domain e' un indirizzo ip lo converte nel default domain (questo succede solitamente per le chiamate
		# provenienti da destinazioni esterne
		if($var(dest_domain) =~ "[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}") {
			if($avp(x-registeredomain)) {
				$var(dest_domain) = $avp(x-registeredomain);
			} else {
				$var(dest_domain) = $shv(default_domain);
			}

			# Debug
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> Destination domain reverted from ip address to default domain: $var(dest_domain)\n");
		}

		# Debug
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> Check matching COS for [32m$var(user)@$var(domain)[35m call to [32m$var(dest_user)@$var(dest_domain)[35m ... [0m\n");

		## Controlla se e' una chiamata in CUG
		if(avp_db_query("SELECT COUNT(*) from call_pickup_group_view WHERE pickup_enable=0 AND FIND_IN_SET('sip:$var(user)@$var(domain)',nums) > 0 AND FIND_IN_SET('sip:$var(dest_user)@$var(dest_domain)',nums) > 0", "$avp(ret)")) {
			if($(avp(ret){s.int}) >0){
				# Debug
				xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> User $var(user)@$var(domain) and $tU@$td are in same CUG ... placing call\n");
				return;
			} else {
				# Debug
				xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> User $var(user)@$var(domain) and $tU@$td [35mnot in same CUG[0m\n");
			}
		}
		
		## Controlla se e' solo una chiamata locale
		if(avp_db_query("SELECT attribute FROM usr_preferences WHERE username='$var(user)' AND domain='$var(domain)' AND attribute like 'dialplan_internal' AND '$var(dest_user)' RLIKE value", "$avp(ret)")) {
			if($avp(ret) != NULL || $avp(ret) == "true") {
				return;
			} else {
				# Debug
				xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> [31mUser $var(user)@$var(domain) not allowed to local calls[0m\n");
				send_reply("403", "Non autorizzato");
				route(CLEANER);
				exit();
			}
		}

		# Controlla se vi sono Call Classess associate alla chiamata
		if(avp_db_query(
			"SELECT MAX( `dial` ) AS `dial`, MAX( `ask_pin` ) AS `ask_pin`, MAX( `recall` ) AS `recall`, MAX( `forward` ) AS `forward` 
			 FROM cos_view WHERE '$var(dest_user)' RLIKE `regexp` AND username LIKE '$var(user)' AND domain LIKE '$var(domain)'
			 GROUP BY username, domain", "$avp(x-cos-dial);$avp(x-cos-pin);$avp(x-cos-recall);$avp(x-cos-forward)"
		)) {

			# Mosta le abilitazioni
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> User [32m$var(user)@$var(domain)[0m call to [32m$ru[0m results --> Can Dial:[31m $avp(x-cos-dial) [0mAsk Pin:[31m $avp(x-cos-pin) [0mCan Recall:[31m $avp(x-cos-recall) [0mCan Forward:[31m $avp(x-cos-forward)[0m \n");

			# Controlla se e' una chiamata e se e' abilitata
			if($(avp(x-cos-dial){s.int}) > 0) {
				if(!$dlg_val(is_forward)) {
					xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> [32mDial allowed[0m, go ahead!\n");
					return;
				}
			}

			# Controlla se e' un inoltro e se e' abilitato
			if($(avp(x-cos-forward){s.int}) > 0) {
				if($dlg_val(is_forward)) {
					xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> [32mForward allowed[0m, go ahead!\n");
					return;
				}
			}

			# Chiamata non abilitata
			if(is_avp_set("$avp(x-forward)")) {
				# Debug
				xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> [31mDial forbidden[0m!\n");
			} else {
				# Debug
				xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> [31mTransfer forbidden[0m!\n");
			}

			# Chiede il pin se il FAC Ă¨ abilitato in centrale
			if($shv(facenabled) && ($(avp(x-cos-pin){s.int}) > 0)) {
				xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> [35mFAC Enabled ... asking for PIN[0m\n");
				# Modella il servizio
				$avp(x-service)  = "internal_service";
				$avp(x-servtype) = "fac_request";
				$ru = $avp(originalruri);
				# Ruota al Dispatcher
				route(MTP);
			} else {
				send_reply("403", "Non autorizzato");
			}

			# Blocca la transazione
			exit;

		} else {
			# Utente non abilitato
			xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> User $var(user)@$var(domain) [31mnot allowed to place a call to[0m $var(dest_user)@$var(dest_domain)\n");
			send_reply("403", "Non autorizzato");
			route(CLEANER);
			exit();
		}
	}

	# Debug
	xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> CHKDST][0m                >>> $var(user)@$var(domain) [32mallowed to place a call to[0m $rU\n");
}

