####### Routing Logic ########
## In questa sezione viene definita la logica di routing delle sessioni SIP

route {

## In caso il data paylod eccede una certa dimensione viene inoltrato alla sorgente un reply
## di errore permanente (5XX).

	if ($ml > $shv(maxurilen)) {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DROP]                  >>> Message Size Exceeded \n");
		sl_send_reply("513", "Message Overflow");
		return;
	}

## In caso il pacchetto viene inoltrato troppe volte viene droppato di modo da evitare
## eventuali loops.

	if (!mf_process_maxfwd_header("10") && $retcode == -1) {
		sl_send_reply("483", "Too Many Hops");
		exit;
	}
	
## Previene gli attacchi flood, bruteforce a fingerprinting
	if (is_method("INVITE|REGISTER|OPTIONS") && !is_myself("$si")) {
		if (!pike_check_req()) {
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DROP]                  >>> Flood attempt from $si blocked \n");
			# In base al metodo utilizzato abbatte la chiamata
			if(is_method("INVITE")) { sl_send_reply("404", "Non trovato"); } 
			else { sl_send_reply("482", "Resource limit exceeded!"); }
			# Esegue un drop sulla sessione e esce
			drop();
			exit;
		}
	}

# UPDATE fake reply
	if(is_method("PRACK")) {
		sl_send_reply("200", "Ok");
		exit;
	}

	# Debug
	# xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DEBUG]                 >>> Incoming Request: $rm from $si:$sp on transport $proto\n");

# Genera un identificativo unico per la ricostruzione del flusso 
# lato CDR/Billing
	if(is_method("INVITE|REFER")) {
		if ($hdr(Referred-By)){
			if(get_dialog_info("uniqueid","$avp(uniqueid)","referredby","$hdr(Referred-By)")){
				# Fissa lo Unique identifier per questa dialog
				if($hdr(X-CoreSIP-UniqueId))   { remove_hf("X-CoreSIP-UniqueId");   }
				append_hf("X-CoreSIP-UniqueId: $avp(uniqueid)\r\n", "Contact");
				xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> ***ACCOUNTING][0m         >>> Call-ID: [35m$ci[0m (CSeq: $cs) Unique ID not needed: [35m$avp(uniqueid)[0m\n");
			}
		} else if($hdr(X-CoreSIP-UniqueId)) {
			$avp(uniqueid) = $hdr(X-CoreSIP-UniqueId);
			xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> ***ACCOUNTING][0m         >>> Call-ID: [35m$ci[0m (CSeq: $cs) Unique ID not needed: [35m$avp(uniqueid)[0m\n");
		} else {
			$avp(uniqueid) = "_" + $ci + "_";
			append_hf("X-CoreSIP-UniqueId: $avp(uniqueid)\r\n", "Contact");
			xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> ***ACCOUNTING][0m         >>> Call-ID: [35m$ci[0m (CSeq: $cs) Unique ID saved as: [35m$avp(uniqueid)[0m\n");
		}
	}

## Entra in questa sezione se il campo "To:" e' avvalorato con un parametro "tag=". Utile
## perche' solo le chiamate connesse hanno il parametro "tag=".

	if (has_totag()) {

# riscrive il request uri a partire dalla destinazione della dialog corrente
# utile per le Re-INVITE in scenari di NAT, dove il ruri puĂ˛ differire dal chiamato effettiv
                fix_route_dialog();

## La funzione "loose_route" viene utilizzata per gestire le richieste SIP che contengono
## direttive "Route:" nell'header (record-routing). Utile per la gestione di richieste in-dialog
## come ACK, BYE e re-INVITE.

		if (loose_route()) {

			# Salva la tipologia di trasporto impiegata
			$avp(x-proto) = $proto;
			# Se il protocollo Ă¨TLS cambia direttamente il trasporto anche se identificato come TCP
			if($(ru{uri.transport}) == "TLS" || $(ru{uri.transport}) == "tls") { $avp(x-proto) = "tls"; }

			# Gestisce scenari di NAT
			route(NATDIALOG);

## Se il metodo SIP e' di tipologia BYE (Hangup), marchia il il pacchetto per l'accounting.
			if (is_method("BYE")) {

				# Debug
				xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> INDIALOG::BYE][0m         >>> Call-ID: $ci (CSeq: $cs) got a BYE from $fu to $ru\n");

				# Abilita l'accounting per la transazione relativa a questa BYE
				if(($shv(cdrimagiclecompliancy) == 1)) {
					$avp(x-cdr) = 1;
				}

				# Rimuove la possibile Call-ID che rimane appesa nella trasferta
				if($dlg_val(refercid)) {
					exec_avp("/usr/local/bin/osipsexec kill_callid '$dlg_val(refercid)'");
				}

				# Killa la call leg della chiamata pickuppata
				if($dlg_val(x-pickupped-callid) && $dlg_val(x-pickupped-from) && $dlg_val(x-pickupped-to)) {
					t_reply("200", "OK");
					exec_avp("/usr/local/bin/osipsexec send_bye '$si' '5060' 'udp' '$dlg_val(x-pickupped-from)' '$dlg_val(x-pickupped-to)' '$mb'", "$avp(kill)");
					exit;
				}

				# Pulisce la memoria
				route(PURGE_PRXY);
				route(CLEANER);

				# Forwarda il bye
				route(1);
				exit();

			} else if (is_method("INVITE") || is_method("REFER") || is_method("UPDATE")) {
				# Aggiunge l'header di routing.
				# Questo serve per far capire all'Asterisk di
				# ancorare l'RTP per una  chiamata  entrante.
				$avp(x-service) = "ctr_rtp_anchor";

				# E' stato premuto il tasto di trasferimento
				# sul telefono (inviata una nuova dialog)
				if(is_method("REFER")) {
					
					# Check for aliases
					alias_db_lookup("dbaliases");

					# Debug
					xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> INDIALOG::REFER][0m       >>> $si requested a TRANSFER Referred by: $hdr(Referred-By) Referred To: $hdr(Refer-To) ($ci cseq $cs - req uri: $ru)\n");

					# Sanitizza il Tag di Replaces: se necessario
					if($hdr(Refer-To)) {
						# Debug
						xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> INDIALOG::REFER][0m       >>> TRANSFER to: $hdr(Refer-To)\n");

						# Parsa l'header Refer per estrapolarne i contatti
						exec_avp("/usr/local/bin/osipsexec hdr_san '$hdr(Refer-To)'", "$avp(parsedRt);$avp(boss);$avp(domn);$avp(clid);$avp(ttag);$avp(ftag)");

						# Debug
						xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> INDIALOG::REFER][0m       >>> TRANSFER Boss/Secre: $avp(parsedRt) - Boss: $avp(boss) - Domain: $avp(domn) - Clid: $avp(clid) - To Tag: $avp(ttag) - From Tag: $avp(ftag)\n");

						$avp(acc_transfer_dst) = $(avp(parsedRt){s.select,0,?});
						$avp(acc_transfer_src) = $hdr(Referred-By);

						if($avp(clid)) { $avp(acc_transfer_id) = $avp(clid); }
						
						# Si richiede il log immediato della REFER nei CDR
						acc_new_leg();
						route(CDR);
						
						# UPDATE: nel caso la chiamata non transita da asterisk la trasferta su boss/secre
						# non avrebbe funzionato perche' il contatto della segretaria sarebbe risultato il
						# numero pubblico e non l'interno.
						if($hdr(Referred-By)) {
							# Debug
							xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> INDIALOG::REFER][0m       >>> TRANSFER by: $hdr(Referred-By)\n");
							$var(refsrc) = $(hdr(Referred-By){nameaddr.uri}) ;
							$var(refdmn) = $(var(refsrc){uri.host}) ;
							$var(refsrc) = $(var(refsrc){uri.user}) ;

							$dlg_val(referredby) = $hdr(Referred-By);
							$dlg_val(uniqueid)   = "_" + $ci + "_";
							
							# Sanitizing REFER-TO domain part: if IP, substitute with the 'referred-by' domain
							$var(refto)=$(hdr(Refer-to){nameaddr.uri});
							$var(reftodmn)=$(var(refto){uri.host});
								
							if($(var(reftodmn){ip.isip}) == 1) {
								# If also 'referred-by' domain is IP, use $shv(default_domain)
								if($(var(refdmn){ip.isip}) == 1) $var(refdmn)= $shv(default_domain);
								
								$var(refto-port) = $(var(refto){uri.port});
								if($(var(refto-port){s.int}) > 0) {
									$var(refto-port) = $(var(refto){uri.port});
								} else {
									$var(refto-port) = "5060";
								}

								$avp(newrefto) = "<" + $(var(refto){uri.schema}) + ":" + $(var(refto){uri.user}) + "@" + $var(refdmn);
								if ($(var(refto){uri.port}) != null) $avp(newrefto) = $avp(newrefto) + ":" + $var(refto-port);
								if ($(var(refto){uri.params}) != null) $avp(newrefto) = $avp(newrefto) + ";" + $(var(refto){uri.params});
								if ($(var(refto){s.index,'?'})) $avp(newrefto)= $avp(newrefto) + "?" + $(var(refto){s.select,1,?});
								$avp(newrefto) = $avp(newrefto) + ">";
								
								xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> INDIALOG::REFER]       >>> REFER TO: replacing $hdr(Refer-to) with $avp(newrefto)\n");
							}
						}

						# UPDATE: le due call-legs coinvolte nel trasferimento
						if($avp(boss)) {
							$dlg_val(refercid) = $avp(clid);
							$var(referrer) = $avp(clid) + ";to-tag=" + $avp(ttag) + ";from-tag=" + $avp(ftag);
							if($var(refsrc)) { $var(bossecre) = $avp(boss) + ";" + $var(refsrc); } else { $var(bossecre) = $avp(boss) + ";" + $fU; }
						} else {
							$avp(bossecre) = $(hdr(Refer-To){s.select,1,:});
							$avp(bossecre) = $(avp(bossecre){s.select,0,@});
							$var(referrer) = $rU + ";" + $avp(bossecre);
							if($var(refsrc)) { $var(bossecre) = $avp(bossecre) + ";" + $var(refsrc); } else { $var(bossecre) = $avp(bossecre) + ";" + $fU; }
						}

						# UPDATE: Salve i riferimenti in memcache
						xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> INDIALOG::REFER][0m       >>> Storing in $var(referrer) bossecre var $var(bossecre)\n");
						cache_store("memcached:aor", "$var(referrer)", "$var(bossecre)", 10);

						# Aggiorna gli endpoints per le notify
						# -- RIVALUTARE PER IL MULTI TENANT
						$avp(caller) = "sip:" + $rU + "@" + $shv(default_domain);
						$avp(callee) = "sip:" + $avp(boss) + "@" + $shv(default_domain);

						# Propaga le notify
						dialoginfo_set();
					}
				} else {
					# Marchia la dialog per eventuali servizi (ad. es.: il call recording)
					$dlg_val(dialog_id)     = "dialog_" + $ct;
					$dlg_val(dialog_callee) = $ru;

					# Debug
					xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> ***INDIALOG::INVITE]   >>> Dialog ($DLG_did) marked with dialog_id == $dlg_val(dialog_id) and dialog_calee == $dlg_val(dialog_callee) -- Contact: $ct\n");

					### WORKAROUND -- Succede che il nuovo asterisk invia una reinvite per l'aggiornamento di direct media nello 
					###            -- scenario in cui venga richiesta  la blind transfer tra una call leg esterna e una interna.
					###            -- Propagare questa invite  rompe la  catena rtp  generata nel  flusso  chiamata (per qualche 
					###            -- motivo le porte RTP di questa invite di update sono errate).
#					if((ds_is_in_list("$si", "$sp")) && (($ct =~ "^<sip:.*-mtp@.*") || ($ct =~ "^<sip:192.168.4.121:5070>.*")) && ($hdr(User-Agent) =~ "^MonkeYmTP$")) {
#						xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> ***INDIALOG::INVITE]   >>> La solita reinvite del cazzo di ASTERISKKKKKK!!!!!!\n[0m");
#						sl_send_reply("200", "Ok");
#						exit;
#					}

#					# Gestisce la Music On Hold Punto-Punto
#					if(search_body("c=IN IP4 0.0.0.0") || search_body("a=sendonly") || search_body("a=inactive")) {
#						# Se non gia' coinvolto ingaggia il proxy RTP
#						if (!is_dlg_flag_set("11")) { rtpproxy_offer(); };
#						# Streamma la music on hold
#						rtpproxy_stream2uac("/var/lib/asterisk/moh/On_Hold_music_track_01", "-1");
#						# Marchia la Dialog per Evidenziare che e' stato coinvolto l'rtpproxy
#						set_dlg_flag("1");
#						if(search_body("a=inactive")) {replace_body("a=inactive", "a=sendonly");}
#						# Debug
#						xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> ***INDIALOG::INVITE]   >>> Caller Holded\n");
#					} else if(is_dlg_flag_set("1")) {
#						# Interrompe lo streaming della Music on Hold
#						rtpproxy_stop_stream2uac();
#						# Non rimouve il proxy RTP se richiesto da main route
#						if(!is_dlg_flag_set("11")) { rtpproxy_unforce(); }
#						# Elimina il mark di music on hold per la dialog
#						reset_dlg_flag("1");
#						# Debug
#						xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> ***INDIALOG::INVITE]   >>> Caller UnHolded\n");
#					}

					# Richiede il proxy anche per la seconda INVITE di un transferimento
					if(!search_body("a=sdpmangled:yes") && !is_dlg_flag_set("11")) {
						reset_dlg_flag("11");
						reset_dlg_flag("12");
						$avp(x-rtpproxy) = 1;
						xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> ***INDIALOG::INVITE]  >>> RESET PROXY\n");
                                        }

					# Notifica solo se le destinazioni sono locali
					if(avp_db_query("SELECT username FROM location WHERE username='$rU'", "$avp(found)")) {
						exec_avp("/usr/local/bin/osipsexec notifyall '$rU' '$shv(default_domain)' confirmed '$shv(local_hostname)'", "$avp(ret)");
					}
				}
			}

# HANDLE ACK by Cisco - preleva from e to originali da sostituire nella bye finale
# verso il telefono Cisco.
			if (is_method("ACK")) {
				if($hdr(User-Agent) =~ "^Cisco.*") {
					if(get_dialog_info("pickupped_callid","$avp(p_callid)","pickupped_callid","$ci")) {
						$dlg_val(x-pickupped-callid) = $avp(p_callid);
						$dlg_val(x-pickupped-from) = $hdr(From);
						$dlg_val(x-pickupped-to) = $hdr(To);
					}
				}
			}

## Finita l'analisi inoltra il messaggio SIP alla prima direttiva di routing (vedi di seguito)

			route(1);

		} else {

## Adesso si analizzano tutti i pacchetti di sessione SIP che non hanno una direttiva "Route:"
## nell'header. La transazione che ci interessa di instaurazione della sessione (SIP
## ACK Method).
			
			if (is_method("ACK")) {

## Controllo se la richiesta attuale e' associata ad una transazione. Nel nostro caso siamo nella
## casistica di ACK (quindi stiamo accettando un precedente INVITE).

				if (t_check_trans()) {

## Propaghiamo la risposta al destinatario specificato nell'URI.

					t_relay();
					exit;

				} else {

## In questo caso abbiamo un ACK non appartenente ad una transazione riconosciuta.
## Il messaggio verra' scartato.
					exit;
				}

# In questa sezione gestiamo gli INVITE

			} else if (is_method("INVITE")) {

				if (!validate_dialog())
			                fix_route_dialog();

# In questa sezione gestiamo i REFER

			} else if (is_method("REFER")) {

				# Debug
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> OUTDIALOG::REFER]      >>> REFER from $fu ($ci) to $ru (CSeq: $cs) \n");

				# Chiude la segnalazione
				t_reply("202", "Accepted");

				# Stoppa la transazione
				exit;

			} else if (is_method("CANCEL")) {

				xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> CANCEL::]        >>> Call-ID: $ci (CSeq: $cs) got a CANCEL from $fu to $ru[0m\n");

				t_relay();
				exit;

			} else if (is_method("BYE")) {

				# Debug
				xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> OUTDIALOG::BYE]        >>> Call-ID: $ci (CSeq: $cs) got a BYE from $fu to $ru[0m\n");

				# Rimuove Eventuali RTP Proxy
				route(PURGE_PRXY);

				# Chiude la segnalazione
				t_reply("200", "OK");

				# Stoppa la transazione
				exit();

# In questa sezione gestiamo i refresh di presenza (es.: SUBSCRIBE Cseq: 2)

			} else if (is_method("PUBLISH|SUBSCRIBE|NOTIFY|MESSAGE")) {
				# Ruota alla rotta di presence
				route(PRESENCE);
				exit;
			}

## Tutte le altre combinazioni non loose-route, non verranno considerate. Rimandiamo come
## reply un 404 Not Found.

			sl_send_reply("404", "Non trovato");
		}

		exit;
	}

## Di seguito verranno processate le richieste iniziali (senza "tag=" nel campo "To:").
## In caso di CANCEL inoltro il messaggio solo se fa parte di una transazione in corso,
## altrimenti scarto il messaggio

	if (is_method("CANCEL")) {
		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NOTOTAG::CANCEL]       >>> Call-ID: $ci (CSeq: $cs) got a BYE from $fu to $ru\n");

		# Avaya - Signaling Enhancement
		if($shv(avayaenabled))
                if($hdr(User-Agent) =~ "^Avaya.*" && $ru =~ "^.*;avaya-cm-fnu=off-hook") {
			sl_send_reply("200", "OK");
			drop;
		}

		# Check for Transaction
		if (t_check_trans()) {
			t_relay();
		}
		exit;
	}

	t_check_trans();

## Imposta il Record Routing

	if (!is_method("REGISTER|MESSAGE"))
		record_route();

## Elabora tutte le altre richieste di BYE (senza To tag)

	if (is_method("BYE")) {
		# Debug
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> NOTOTAG::BYE]          >>> Call-ID: $ci (CSeq: $cs) got a BYE from $fu to $ru[0m\n");
		# Go Clean
		route(CLEANER);
		route(1);
		exit();
	}

## Il blocco seguente e' utilizzato unicamente per il publishing della presenza

	if (is_method("PUBLISH|SUBSCRIBE|NOTIFY|MESSAGE")) {
		route(NATTRANSACTION);
		# Ruota alla rotta di presence
		route(PRESENCE);
		exit;
	}

## Gli utenti che richiedono la registrazione vengono rediretti alla rotta 2

	if (is_method("REGISTER")) {
		route(NATTRANSACTION);
		route(REGISTER);
		exit;
	}

## Scarta richieste con URL incomplete (mancanti di username in questo caso)

	if ($rU==NULL) {
		# Segnalazione generata dal MONIT locale
		if (is_method("OPTIONS")) {
			options_reply();
			exit();
		} else {
			sl_send_reply("484", "Address Incomplete");
			exit();
		}
	}

## Seguente regola gestisce i pacchetti di tipo OPTIONS destinati all'OpenSIPs (solitamente
## le richieste di qualify da parte di Asterisk).

	if (is_method("OPTIONS")) {
		options_reply();
		exit();
	}

## Gestisco la richiesta di chiamata (INVITE) rimandando la chiamata alla rotta di DIALPLAN
## dinamico.

	if(is_method("INVITE")) {
		
		# Gestisce scenari di NAT
		route(NATDIALOG);

		# Se presente salva i riferimenti del servizio FAC nei record acc_extra
		# Arriveranno sempre come  una nuova invite da un indirizzo autorizzato
		# perche' la logica del FAC e' gestita da un dispatcher
		if(check_source_address("1") && ($hdr(X-CoreSIP-FacUser) && $hdr(X-CoreSIP-FacDomain))) {
			# Debug
			xlog("L_INFO", "[33m[$(fU{s.fill.left,'.',15}) -> NEWDIALOG::FAC][0m         >>> Is a FAC from [35m$hdr(X-CoreSIP-FacUser)@$hdr(X-CoreSIP-FacDomain)[0m to $ru\n");
		} else {
			# Salva il  tempo di call placing a livello di CDR
			# basato su quanto riportato nelle specifiche ETSI
			# ETR 138
			$var(ts)  = $Ts;
			$var(tsm) = $Tsm;
			$var(tsm) = $(var(tsm){s.fill.left,0,6});
			$var(ts)  = $(var(ts){s.escape.common});
			$var(tsm) = $(var(tsm){s.escape.common});
			$avp(x-callstart) = $var(ts) + "" + $var(tsm);

			# Debug
			xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> ***NEWDIALOG::INVITE][0m  >>> New incoming call from $fu to $ru (Transport: $(hdr(Via)[0]{via.transport}{s.tolower}) - Time: $avp(x-callstart) - Source: $si:$sp)\n");
		}

		# Gestisce l'off hooking dei telefoni Avaya
		if($shv(avayaenabled))
		if($hdr(User-Agent) =~ "^Avaya.*" && $ru =~ "^.*;avaya-cm-fnu=off-hook") {
			# sl_send_reply("100", "Trying");
			sl_send_reply("183", "Session Progress");
			exit;
		}

		# Se marchiato significa che il pacchetto e' stato gia' ruotato per
		# l'uscita da questo gateway. In tal caso si sta potenzialmente
		# Generando un loop. La sessione viene chiusa.
		if($(hdr(X-CoreSIP-HopCount){s.int})) {
			$avp(x-hopcount) = $(hdr(X-CoreSIP-HopCount){s.int});
			$avp(x-hopcount) = $(avp(x-hopcount){s.int}) + 1;
		} else {
			$avp(x-hopcount) = "0";
		}

		# Route to Dialplan
		route(DIALPLAN);
	}
}

#####################################################################################
#                                                                                    #
#    SEZIONE DELLE MAIN ROUTES                                                       #
#                                                                                    #
#####################################################################################
  #///////////////////////////////////////////////////////////////////////////////////>

## Di seguito vengono descritte le rotte di smistamento del traffico SIP. La route[1] e' la
## rotta di default in quanto smista verso la destinazione specificata nel dest URI tutti i
## pacchetti passati.
route[1] {
	# DEBUG
	xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> RELAY]                 >>> Frames from $fu to $ru ($rd - $fd)\n");

	if(is_method("INVITE")) {
		t_on_reply("1");
		if(!isflagset(10)) { 
			t_on_failure("1");
		}
	}

	# Controlla il protocollo di relay
	if(isflagset(28)) {
		# Imposta il destination URI con Transport TCP
		# Il $du, qualora settato, viene preferito al
		# $ru
		$du = $ru + ";transport=tcp";
	}

	# Imposta la rotta di Branch
	t_on_branch("1");

	# Effettua il relay delle frame SIP
	if (!t_relay()) {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> RELAY]                 >>> ERROR on relay call from $fu to $ru \n");
		sl_reply_error();

		# Ritorna un valore negativo
		return(-1);
	}
	
	# Ritorna un valore positivo su transazione inviata
	return(1);
}

# La Rotta di Branch e' l'ultimo posto dove la trama SIP transita prima di uscire
# definitivamente dal proxy. Tutte le segnalazioni ausiliarie andranno apposte qui
branch_route[1] {
	# Debug
	xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> BRANCH]                >>> Handling branch message to $ru \n");

	# Check for NAT
	route(NATDIALOG);
	
	# Ripulisce la segnalazione custom (X-CoreSIP-*) se richiesto
	$var(x-cust-hdr-forbidden) = null; 
	if(goes_to_gw("10","sp")  || goes_to_gw("10","sp") || goes_to_gw("13","spn") || goes_to_gw("13","spn")) { $var(x-cust-hdr-forbidden) = 1; }

	# Rimuove i custom  headers in caso di invite di replace
	# TODO -- questo e' richiesto per i terminali Cisco 7912
	# bisogna controllare se gli altri terminali necessitano
	# o meno dell'header
	if($hdr(Replaces)) { $var(x-cust-hdr-forbidden) = 1; }

	# Rimuove qualunque call/alert info che non sia stata impostata da centrale
	if($hdr(Call-Info))  { remove_hf("Call-Info"); }
	if($hdr(Alert-Info)) { remove_hf("Alert-Info"); }

	# Billing: preserva il dst_user su call_leg differenti di una stessa dialog
	$avp(dst_user) = $rU;
	if (($avp(originalru) != null) && ($shv(cdrimagiclecompliancy) == 1)) {
		$avp(dst_user) = $avp(originalru);
	}
	
	$avp(dst_domain) = $rd;
	if($avp(dst_domain) == null){
		$avp(dst_domain) = $(avp(originalruri){uri.host});
	}
	
	$avp(dst_port) = $rp;
	if($avp(dst_port) == null){
		$avp(dst_port) = $(avp(originalruri){uri.port});
	}

	# Espone il protocollo di trasporto
	if($hdr(X-CoreSIP-Protocol)) { remove_hf("X-CoreSIP-Protocol"); }
	if((!$var(x-cust-hdr-forbidden)) && ($avp(x-proto) != null)) append_hf("X-CoreSIP-Protocol: $avp(x-proto)\r\n", "Contact");

	# Aggiorna l'host di provenienza
	if($hdr(X-CoreSIP-From)) { remove_hf("X-CoreSIP-From"); }
	if(!$var(x-cust-hdr-forbidden)) append_hf("X-CoreSIP-From: $shv(local_hostname)\r\n", "Contact");

	# Imposta il differentiate ringtone se richiesto
	if($hdr(Alert-Info)) { remove_hf("Alert-Info"); }
	avp_db_query("SELECT distinctive_ringtone FROM subscriber WHERE username='$rU' and domain='$shv(default_domain)';", "$avp(distring)");
	if($avp(distring)) {
		# Rimuove l'header se gia' esiste
		if($avp(fromlocal))  { 
			append_hf("Alert-Info: <http://127.0.0.1>;info=ring1\r\n", "Contact"); 
		} else {
			if ($hdr(X-CoreSIP-ServiceType) =~ "hunting_group") {
				append_hf("Alert-Info: <http://127.0.0.1>;info=ring3\r\n", "Contact");
				append_hf("Alert-Info: <http://127.0.0.1>;info=ring2\r\n", "Contact"); 
			}
		}
	}

	# Salva il Registered User Name
	if($hdr(X-CoreSIP-RegisteredUser))   { remove_hf("X-CoreSIP-RegisteredUser");   }
	if((!$var(x-cust-hdr-forbidden)) && ($avp(x-registereduser) != null)) {
		append_hf("X-CoreSIP-RegisteredUser: $avp(x-registereduser)\r\n", "Contact");
	}

	# Salva il Registered Domain Name
	if($hdr(X-CoreSIP-RegisteredDomain)) { remove_hf("X-CoreSIP-RegisteredDomain"); }
	if((!$var(x-cust-hdr-forbidden)) && ($avp(x-registeredomain) != null)) {
		append_hf("X-CoreSIP-RegisteredDomain: $avp(x-registeredomain)\r\n", "Contact");
	}

	# Salva il contatto originale pre futuri ripristini
	if($hdr(X-CoreSIP-CallerOriginalContact)) { remove_hf("X-CoreSIP-CallerOriginalContact"); }
	if(!($var(x-cust-hdr-forbidden)) && ($avp(x-origcallerct) != null)) {
		append_hf("X-CoreSIP-CallerOriginalContact: $avp(x-origcallerct)\r\n", "Supported");
	}

	# Capisce se la chiamata deve essere anonimizzata
	if($avp(x-anonymizer) != null) {
		# Change R-PID
		$avp(x-rpid) = $avp(x-anonymizer);
		
		# Remove Privacy Header if Present
		if($hdr("Privacy")) { remove_hf("Privacy"); }
		append_hf("Privacy: id\r\n", "Contact");
		
		# Rimpiazza il caller-ID in Privacy-Mode
		# uac_replace_from("anonymous", "sip:anonymous@anonymous.invalid");
	}

	# Imposta il Remote Party ID
	if($avp(x-rpid) != null && ($avp(x-rpid-override) == null || $(avp(x-rpid-override){s.int}) != 1)) {
		if($hdr(Remote-Party-ID)) { remove_hf("Remote-Party-ID"); }
		if($hdr(P-Asserted-Identity)) { remove_hf("P-Asserted-Identity"); }
		append_hf("Remote-Party-ID: $avp(x-rpid)\r\n", "Contact");
		append_hf("P-Asserted-Identity: $avp(x-rpid)\r\n", "Contact");
		
		# Rimpiazza il caller-ID in Privacy-Mode
		if($avp(x-privacy-ct) != null) {
			subst('/^Contact:\s*<sip:(.*)@(.*)>(.*)$/Contact: <sip:$avp(x-privacy-ct)@\2>\3/ig');
		}
		
		# Rimpiazza il From
		if($avp(x-privacy-from) != null) {
			uac_replace_from("$avp(x-privacy-ct)", "sip:$avp(x-privacy-from)");
		}
	}
	
	# Aggiorna il servizio se utilizzato
	if($hdr(X-CoreSIP-Service)) { remove_hf("X-CoreSIP-Service"); }
	if($hdr(X-CoreSIP-2Redial)) { remove_hf("X-CoreSIP-2Redial"); }
	if($hdr(X-CoreSIP-ServiceType)) { remove_hf("X-CoreSIP-ServiceType"); }
	if($hdr(X-CoreSIP-MME)) { remove_hf("X-CoreSIP-MME"); }
	if($hdr(X-CoreSIP-HGT)) { remove_hf("X-CoreSIP-HGT"); }
	if($hdr(X-CoreSIP-FAC)) { remove_hf("X-CoreSIP-FAC"); }
	if($hdr(X-CoreSIP-Recording)) { remove_hf("X-CoreSIP-Recording"); }
	if($hdr(X-CoreSIP-Parked)) { remove_hf("X-CoreSIP-Parked"); }
	if($hdr(X-CoreSIP-Parkme)) { remove_hf("X-CoreSIP-Parkme"); }
	if($hdr(X-CoreSIP-ServiceArgs)) { remove_hf("X-CoreSIP-ServiceArgs"); }

	if((!($var(x-cust-hdr-forbidden))) && ($avp(x-service) != null)) {
		# Aggiunge l'header di Service
		
		append_hf("X-CoreSIP-Service: $avp(x-service)\r\n", "Contact");

		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> BRANCH]                >>> Service: $avp(x-service)\n");
		
		# Il servizio di Call Redial necessita di un Header in piu'
		if($avp(x-service) == "call_redial") {
			append_hf("X-CoreSIP-2Redial: $avp(x-redial)\r\n", "Contact");
		} else if($avp(x-service) == "internal_service" || $avp(x-service) == "hg_rtp_anchor") {
			append_hf("X-CoreSIP-ServiceType: $avp(x-servtype)\r\n", "Contact");
			if($avp(x-servtype) == "conference") {
				append_hf("X-CoreSIP-MME: $avp(x-mme)\r\n", "Contact");
			} else if($avp(x-servtype) == "hunting_group") {
				append_hf("X-CoreSIP-HGT: $T_fr_inv_timeout\r\n", "Contact");
			} else if($avp(x-servtype) == "fac_request") {
				append_hf("X-CoreSIP-FAC: $rU\r\n", "Contact");
			} else if($avp(x-servtype) == "recording") {
				append_hf("X-CoreSIP-Recording: $avp(x-recording)\r\n", "Contact");
			}
		} else if(($avp(x-service) == "pk_rtp_anchor") || ($avp(x-service) == "pr_rtp_anchor")) {
			if($avp(x-parked) != null) {
				# Debug
				append_hf("X-CoreSIP-Parked: $avp(x-parked)\r\n", "Contact");
			} else {
				# Debug
				append_hf("X-CoreSIP-Parkme: $avp(x-parkme)\r\n", "Contact");
			}
		}

		# Aggiunge eventuali argomenti
		if($avp(x-servargs) != null) {
			append_hf("X-CoreSIP-ServiceArgs: $avp(x-servargs)\r\n", "Contact");
		}
		
		# WA: Evita il propagarsi di eventuali segnalazioni di trasferimento
		# generate su opensips verso asterisk
		# if($avp(x-dspt)) { if($hdr(Replaces)) { remove_hf("Replaces"); } }	
	}

	# E' stato impostato l'intercom
	if($hdr(Call-Info)) { remove_hf("Call-Info"); }
	if($avp(x-intercom) != null) {
		append_hf("Call-Info: <sip:$td>;answer-after=0\r\n", "Contact");
		append_hf("Alert-Info: Ring Answer\r\n", "Contact");
	}

	# Inserisce il numero di Hop per intercettare i loop
	if($hdr(X-CoreSIP-HopCount)) { remove_hf("X-CoreSIP-HopCount"); }
	if((!($var(x-cust-hdr-forbidden))) && ($avp(x-hopcount) != null)) {
		append_hf("X-CoreSIP-HopCount: $avp(x-hopcount)\r\n", "Contact");
	}

	# Imposta la segnalazione di trasferimento
	if($hdr(X-CoreSIP-Transfer)) { remove_hf("X-CoreSIP-Transfer"); }
	if((!($var(x-cust-hdr-forbidden))) && ($avp(x-transfer) != null)) {
		append_hf("X-CoreSIP-Transfer: $avp(x-transfer)\r\n", "Contact");
	}

	# Imposta la destinazione di routing
	if($hdr(X-CoreSIP-RoutingAction)) { remove_hf("X-CoreSIP-RoutingAction"); }
	if((!($var(x-cust-hdr-forbidden))) && ($avp(x-destination) != null)) { 
		append_hf("X-CoreSIP-RoutingAction: $avp(x-destination)\r\n", "Contact");
	}

	# Salva l'utlimo gateway ricevuto
	if($hdr(X-CoreSIP-LastGW)) { remove_hf("X-CoreSIP-LastGW"); }
	if((!($var(x-cust-hdr-forbidden))) && ($avp(x-lastgw) != null)) {
		append_hf("X-CoreSIP-LastGW: $avp(x-lastgw)\r\n", "Contact");
	}

	# Gateway List per il Dynamic Routing
	if($hdr(X-CoreSIP-DList)) { remove_hf("X-CoreSIP-DList"); }
	if((!($var(x-cust-hdr-forbidden))) && ($avp(x-gwlist) != null)) {
		append_hf("X-CoreSIP-DList: $avp(x-gwlist)\r\n", "Contact");
	}

	# In caso di redirect riporta il destination uri originale
	if($hdr(X-CoreSIP-OrigRU)) { remove_hf("X-CoreSIP-OrigRU"); }
	if((!($var(x-cust-hdr-forbidden))) && ($avp(x-orig-ru) != null)) {
		append_hf("X-CoreSIP-OrigRU: $avp(x-orig-ru)\r\n", "Contact");
	}

	# Alcuni header non sono stati considerati nell'implementazione dei servizi
	# e non vengono rimossi qualora richiesto. Lo statement seguente serve a
	# questo
	if($var(x-cust-hdr-forbidden)) {
		if($hdr(X-CoreSIP-Routed)) { remove_hf("X-CoreSIP-Routed"); }
		if($hdr(X-CoreSIP-UniqueId)) { remove_hf("X-CoreSIP-UniqueId"); }
		if($hdr(X-CoreSIP-ComingFrom)) { remove_hf("X-CoreSIP-ComingFrom"); }
		if($hdr(Require)) { remove_hf("Require"); }
	}

	if($hdr(X-CoreSIP-Domain)) { remove_hf("X-CoreSIP-Domain"); }
	if(!($var(x-cust-hdr-forbidden)) && ($avp(x-routedomain) != null)) {
		append_hf("X-CoreSIP-Domain: $avp(x-routedomain)\r\n", "Contact");
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> BRANCH]                >>> Sending X-CoreSIP-Domain to: $avp(x-routedomain)\n");
	}

	# Refer-To manipulation
	if($avp(newrefto) != null) {
		if($hdr(Refer-To)) { remove_hf("Refer-To"); }
		append_hf("Refer-To: $avp(newrefto)\r\n", "Contact");
	}
	
	# Esegue l'accounting, se richiesto
	if($avp(x-cdr) != null) {
		route(CDR);
	}

	# Enables db accounting
	$var(destinationgw)= $rd + ":" + $rp;
	if(avp_db_query("SELECT * from dr_gateways WHERE address ='$var(destinationgw)'", "$avp(isgoingtogw)")) {
		$avp(xcdr_direction) = "OUTGOING";
		$avp(xcdr_gateway) = $rd+":"+$rp;
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> BRANCH]                >>> Call going to $dd:$dp gateway detected: producing CDR\n");
		route(DO_CDR);
	}
}

# Route di risposta in seguito ad un'INVITE - Answer
onreply_route[1] {

	# Debug
	# xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DEBUG]                 >>> Incoming Reply: $rs from $si:$sp on transport $proto\n");

	# Esamina scenari di NAT
	route(NATTRANSACTION);

	# Imposta il  tempo di call setup a livello di CDR
	# basato su quanto riportato nelle specifiche ETSI
	# ETR 138
	if ($rs =~"(180)|(183)|(200)" && !$avp(x-callsetup)) {
		$var(ts)  = $Ts;
		$var(tsm) = $Tsm;
		$var(tsm) = $(var(tsm){s.fill.left,0,6});
		$var(ts)  = $(var(ts){s.escape.common});
		$var(tsm) = $(var(tsm){s.escape.common});
		$avp(x-callsetup) = $var(ts) + "" + $var(tsm);
		$dlg_val(x-callsetup) = $avp(x-callsetup);
		
		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> ONREPLY]               >>> Call setup time: $avp(x-callsetup)/$var(ts)/$var(tsm) on [32mreply code[0m: [31m$rs[0m\n");
	}

	# DO_CDR
	# Recupera il valore dell'ultima translation effettuata in dialplan per le dialog aventi questo stesso uniqueid
	if(get_dialog_info("xcdr_translated_called","$avp(xcdr_translated_called)","uniqueid","$avp(uniqueid)")){
		$acc_extra(xcdr_translated_called) = $avp(xcdr_translated_called);
	}

	# Gestisce la privacy sul reply
	if ($rs =~ "(180)|(183)|(200)") {
		if($hdr(Remote-Party-ID) || $hdr(P-Asserted-Identity)) {
			$var(rpidpriv) = null;
			if($hdr(Remote-Party-ID)) { $var(rpidpriv) = $(hdr(Remote-Party-ID){s.select,1,>}{param.value,privacy}); }
			
			if(($var(rpidpriv) == "full" || $var(rpidpriv) == "uri") || $hdr(Privacy) == "id") {
				# Debug
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> ONREPLY]               >>> Privacy requested on reply!\n");
				
				remove_hf("Remote-Party-ID");
				remove_hf("Privacy");
				remove_hf("P-Asserted-Identity");
			}
		}
	}

	# Gestione delle reply interessanti
	if ($rs =~"(180)|(183)|(200)") {

		#Â Risolve l'identificativo chiamante 
		if(!$hdr(Remote-Party-ID) && !$hdr(P-Asserted-Identity)) {
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> ONREPLY]               >>> Checking RPID for $fu -> $tu\n");

			# Retrieving Cached RPID
			cache_fetch("memcached:aor", "label_$tu", $avp(x-local-rpid));
			# If Empty Retrieve Database RPID
			if(!$avp(local-rpid)) { avp_db_query("SELECT `display_label` FROM `subscriber` WHERE `username`='$tU' AND `domain`='$td'", "$avp(x-local-rpid)"); }

			# Handle It
			if($avp(x-local-rpid)) {
				$var(local-rpid) = "\"" + $avp(x-local-rpid) + "\" <" + $tu + ">";
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> ONREPLY]               >>> Got Progress RPID: [31m$var(local-rpid)[0m\n");
				append_hf("Remote-Party-ID: $var(local-rpid)\r\n", "Contact");
				append_hf("P-Asserted-Identity: $var(local-rpid)\r\n", "Contact");
			}
		}

		# Music on Hold
		if (has_body("application/sdp")) {

#			# Coinvolge il proxy RTP - BRIDGE MODE
#			if(is_dlg_flag_set("11") && !is_dlg_flag_set("12")) {
#				if($Ri == "{FCINTIF}") {
