## Rotta Generica di Errore
error_route {
	xlog("[!!ERROR!!] --- DETAIL: class=$(err.class) level=$(err.level) info=$(err.info) rcode=$(err.rcode) rreason=$(err.rreason) ---\n");
	xlog("[!!ERROR!!] --- FROM: [$si:$sp] TO: [$ru - $tu]\n+++++\n$mb\n++++\n");
	sl_send_reply("$err.rcode", "$err.rreason");
	route(CLEANER);
	exit;
}

## Gestisce la segnalazione iniziata localmente
local_route {

	# Gestisce gli eventi di presenza generati dai telefoni Avaya
	if($shv(avayaenabled))
	if(!($hdr(User-Agent) =~ "^Avaya.*") && (is_method("PUBLISH"))) {
		# DEBUG
		# xlog("L_INFO", "[$fU -> INFO::LOCAL_ROUTE]           >>> Routing Avaya PUBLISH/NOTIFY to PPM Emulator\n");
		
		# Retrieving AV-Global-Session-Id, Contact Infos and Append IT
		# to signaling for Avaya PPM Emulator
		cache_fetch("memcached:aor", "avgsid_$fu", $avp(x-avgsid));
		cache_fetch("memcached:aor", "avctreg_$fu", $avp(x-avctreg));
		
		# Append Avaya formatted header to Request
		append_hf("Av-Global-Session-Id: $avp(x-avgsid)\r\n", "Contact");
		append_hf("X-PPMEmulator-CTInfo: $avp(x-avctreg)\r\n", "Contact");
		append_hf("X-CoreSIP-Presence: $si $sp\r\n", "Contact");
		
		# Send to MonkeY Monitor
		if(
			$hdr(Event) != "message-summary" # &&
			# $hdr(Event) != "dialog"
		) {
			# Set Destination
			$du = $shv(avayappmserver);
		}
	}

	# Invia lo stato dei messaggi di un subscriber all'atto della sottoscrizione
	# del servizio message-summary al fine di gestire correttamente l'MWI.
	if(is_method("NOTIFY")) {
		if($hdr(Event) == "message-summary") {
			if(!has_body("application/sdp")) {
				if(avp_db_query("SELECT COUNT(IF(`dir` LIKE '%Old%', 1, NULL)) as `old`, COUNT(IF(`dir` NOT LIKE '%Old%', 1, NULL)) as `new`,
					COUNT(`msg_id`) as `total` FROM `voicemail_messages` WHERE `mailboxuser` = '$fU' AND `mailboxcontext` = '$fd'",
					"$avp(vmold);$avp(vmnew);$avp(vmtot)")) {
			
					$avp(mwi) = "no";
					if($(avp(vmnew){s.int}) > 0) { $avp(mwi) = "no"; }
						add_body_part("Messages-Waiting: $avp(mwi)\nMessage-Account: $fd\nVoice-Message: $avp(vmnew)/$avp(vmold) (0/0)", "application/simple-message-summary");
				}
			}
		} else if($hdr(Event) == "presence") {

			# Parse needed attributes from originally generated body
			exec_avp("/usr/local/bin/osipsexec get_cisco_presence_info '$rb'", "$avp(x-pres-timestamp);$avp(x-pres-entity)");

			$var(codepart) = $(fU{s.substr,0,$(shv(code_bossfwd){s.len})});
			$var(groupnam) = $(fU{s.substr,$(var(codepart){s.len}),$(fU{s.len})});
			if(!$avp(domainid)) { $avp(domainid) = 1; }

			# Retrieve status
			$avp(fwdunc) = "closed";
			if (avp_db_query("SELECT forward_unc FROM `hunting_group` WHERE `group_name`='$var(groupnam)' AND `domain_id`='$avp(domainid)' AND `boss_secretary`=1", "$avp(fwdunc)")) {
				if($avp(fwdunc)) {
					if($(avp(fwdunc){s.int}) > 0) {
						$avp(fwdunc) = "open";
					} else {
						$avp(fwdunc) = "closed";
					}
				} else {
					$avp(fwdunc) = "closed";
				}
			}

			# Riscrive il payload del pacchetto di presence cisco-compliant
			$var(x-pres-nbody) = "<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"no\" ?><presence xmlns=\"urn:ietf:params:xml:ns:pidf\" entity=\"" + $avp(x-pres-entity) + "\" xmlns:e=\"urn:ietf:params:xml:ns:pidf:status:rpid\" xmlns:dm=\"urn:ietf:params:xml:ns:pidf:data-model\" xmlns:ce=\"urn:cisco:params:xml:ns:pidf:rpid\" xmlns:sc=\"urn:ietf:params:xml:ns:pidf:servcaps\"><dm:person><status><basic>" + $avp(fwdunc) + "</basic></status><e:activities></e:activities></dm:person><tuple id=\"cmp-1-1205294\"><status><basic>" + $avp(fwdunc) + "</basic></status><sc:servcaps><sc:audio>true</sc:audio></sc:servcaps><contact priority=\"0.8\">" + $avp(x-pres-entity) + "</contact><timestamp>" + $avp(x-pres-timestamp)+ "Z</timestamp></tuple></presence>";
			remove_body_part();
			add_body_part("$var(x-pres-nbody)", "application/pidf+xml");
		}
	}
}

route[RECALL] {
	# Controlla che non sia un evento di richiamata
	if(!$hdr(X-CoreSIP-Recall)) {
		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> RECALL]                >>> RECALL -> Status: $DLG_status - $T_reply_code - $avp(username) @ $avp(domain) - $avp(caller)/$avp(callee)\n");

		# Controlla se vi sono Call Classess associate alla chiamata
		if(avp_db_query(
			"SELECT MAX( `recall` ) AS `recall` FROM cos_view WHERE '$rU' RLIKE `regexp` AND username = '$avp(username)' AND domain = '$avp(domain)'
			 GROUP BY username, domain", "$avp(x-cos-recall)"
		)) {
			# Controlla la tipologia di servizio
			if($(avp(x-cos-recall){s.int}) > 0) {
				# Modella il servizio
				$avp(x-service) = "call_redial";
				$avp(x-redial)  = $rU;
				$dlg_val(transf) = "1";
				
				# Ruota al Dispatcher
				route(MTP);

				# Stoppa la transazione e non continua nello script
				exit;
			}
		}
	}
}

failure_route[1] {
	# Debug
	xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> FALLBACK][0m              >>> Transaction failure -> [31m Reply SIP Code: $T_reply_code [0m\n");

	# In caso di branch multipli ricerca il successivo
 	if(next_branches()) {
 		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> FALLBACK]              >>> Hunting next $ru branch\n");
		t_on_failure("1");
		route(1);
 		exit;
 	} else {
		# Questo viene utilizzato unicamente per il servizio IMA
		if($dlg_val(hg_ouri) != null && $(avp(hg_cycle){s.int})) {
 			xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> FALLBACK][0m              >>> [32mNo more branches left for $dlg_val(hg_ouri) but cycle is enabled, reinjecting call[0m\n");
			$ru = $dlg_val(hg_ouri);
			route(CHKHG);
			exit;
		} else if($dlg_val(hg_ouri) != null) {
			t_reply("487", "No one answered");
			drop();
			exit;
		}
	}

	# Imposta le call leg nell'accounting per tener traccia
	# di eventuali trasferimenti di chiamata
	$avp(src)	= $fU;
	$avp(dst)	= $rU;

	# Recupera il valore dell'ultima translation effettuata in dialplan per le dialog aventi questo stesso uniqueid
	if(get_dialog_info("xcdr_translated_called","$avp(xcdr_translated_called)","uniqueid","$avp(uniqueid)")){
		$acc_extra(xcdr_translated_called) = $avp(xcdr_translated_called);
	}
  
	# Controlla se e' stato effettuato un Pickup di Chiamata
	route(CHKPCK);

	# Aggiorna la presence
	exec_avp("/usr/local/bin/osipsexec notifyall '$rU' '$shv(default_domain)' confirmed '$shv(local_hostname)'", "$avp(ret)");

	# Transazione cancellata ripulisce tutto
	if (t_was_cancelled()) {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> FALLBACK (CNC)]        >>> Transaction Cancelled\n");
		t_reply("487", "Richiesta Cancellata");
		route(CLEANER);
		exit;
	}

	# E' un forward
	if (t_check_status("302")) {

		# Salva il contatto orginale
		$var(storeduser) = $rU;
		$avp(x-orig-ru)  = $rU;

		# Preleva i redirects dalla frame
		get_redirects("*");
		
		# Crea una nuova leg di accounting per tenere traccia degli estremi del trasferimento (callid, trasferente, trasferito)
		$avp(acc_transfer_src)=$fu;
		$avp(acc_transfer_dst)=$ru;
		route(CDR);

		# Debug
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> FALLBACK (302)][0m        >>> [35mForward enabled client side:[0m [33m$var(storeduser)@$rd --> $rU[0m\n");

		# Controlla se il redirect e' equivalente all'uri originario
		if($rU == $var(storeduser) || $fU == $var(storeduser) || $fU == $rU) {
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> FALLBACK (302)]        >>> [31mCaller is the forward destination: Loop Blocked![0m\n");
			t_reply("403", "Deviazione non permessa");
			route(CLEANER);
			exit();
		}

		# Controlla se le deviazioni sono abilitate
		if(avp_db_query(
			"SELECT MAX( `forward` ) AS `forward` FROM cos_view WHERE '$rU' RLIKE `regexp` AND username = '$var(storeduser)' AND domain = '$rd'
			 GROUP BY username, domain", "$avp(x-cos-forward)"
		)) {
			if ($(avp(x-cos-forward){s.int}) <= 0) {
				xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> FALLBACK (302)][0m        >>> [33mForward ($fU -> $avp(dst) -> $rU):[0m [31mNOT Authorized!!![0m\n");
				t_reply("403", "Non abilitato");
				exit();
			}
		}

		# Se presente l'header Contact probabilmente bisogna forwardare la richiesta
		# --- Ma che mi ero fumato per scrivere ste cazzate???
		if($hdr(Contact)) {
			# Riscrive la destinazione
			$ru = "sip:" + $rU + "@"  + $td;

			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> FALLBACK (302)]        >>> Handling forward as redirect server from: $fu to: $hdr(Contact) ru: $ru\n");
		
			# Reinoltra il Session Progress al posto del Moved Temporarily
			append_to_reply("Contact: <$fu>\r\n");
			
			# Questo genera dei ringback fasulli con gli Yealink in fase
			# di forward verso altro numero.
			# t_reply("181", "Call is Being Forwarded");

			# Il seguente blocco di codice "maschera" il chiamante originale
			#Â con il forwarder. Questo serve soprattutto su inoltri verso
			# destinazioni pubbliche
			# TODO -- da rendere impostabile on demand
			$var(x-fwd-from) = "sip:" + $var(storeduser)+ "@" + $rd;
			uac_replace_from("$var(storeduser)", "$var(x-fwd-from)");
			avp_delete("$avp(x-rpid)");

			# Essendo una nuova chiamata comunica all'MTP di azzerare l'HopCount
			avp_delete("$avp(x-rtpproxy)");
			$dlg_val(transf) = "1";
			$avp(x-transfer) = 1;

			# Esegue il relay del trasferimento
			route(MTP);
		} else {
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> FALLBACK (302)]        >>> Handling forward by phone: $fu to: $ru \n");
			route(1);
		}

		# Stoppa la transazione
		exit();
	}

	if(is_from_local()) {
		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> FALLBACK]              >>> Checking Status for: $rU ");

		# Evita la risoluzione dell'URI visto che all'asterisk va passato
		# l'alias per effettuare il controllo in voicemail
		revert_uri();
	} else {
		# Rimpiazza l'URI Sorgente con l'URI del chiamato
		uac_replace_from("$ru");
	}
	
	# Gestisce i vari stati di ritorno
	if (t_check_status("404") || t_check_status("410")) {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> FALLBACK (404|410)]    >>> User Not Found");

		# Inoltra una chiamata se presente il forward
		route(CHKFWDONOTFOUND);
	} else if (t_check_status("408")) {
		# Transaction timed out
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> FALLBACK (408)]        >>> Transaction timed out");

		# Controlla se abilitare il richiamo automatico
		# per l'evento di non risposta
		if(is_from_local()) { route(RECALL); }

		# Controlla se sono presenti voicemail
		# o forward su timeout
		route(CHKFWDONUNAV);
	} else if (t_check_status("486|487")) {
		# User Busy send to MTP
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> FALLBACK (486|487)]    >>> User busy --> $avp(callee) -- $avp(dst)\n");

		# Controlla se abilitare il richiamo automatico
		# per l'evento di utente occupato
		if(is_from_local()) { route(RECALL); }

		# Controlla se sono presenti voicemail
		# o forward su occupato
		route(CHKFWDONBUSY);
	} else if (t_check_status("480")) {
		t_reply("480", "Non disponibile");
	} else if (t_check_status("603")) {
		# User Unavailable send to MTP
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> FALLBACK (603)]        >>> User unavailable ");
		route(DESTUNAVAILABLE);
	} else {
		# Unhandled Status
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> FALLBACK]              >>> Unhandled Status ");
		t_reply("604", "Non supportato");
	}

	# Stops transaction
	exit;
}

## La rotta gestisce eventuali redirect alla VoiceMail
route[CHKFWDONUNAV] {
	# Se il subscriber ha dei forward abilitati
	# si comporta di conseguenza
	if($T_fr_inv_timeout > 0 && $avp(onunav) != null) {
		# Avvalora le avp per i controlli sui forward lato centrale
		$dlg_val(is_forward)       = "1";
		$avp(x-forward-user)       = $avp(dst);
		$avp(x-forward-domain)     = $td;
		$avp(x-forward-destdomain) = $td;
		$avp(x-forward-destuser)   = $avp(onunav);
		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> CHKFWDONUNAV]          >>> User $avp(x-forward-user)@$avp(x-forward-domain) not available, checking COS for forwarding call to $avp(x-forward-destuser)@$avp(x-forward-destdomain)\n");
		# Controlla le classi di servizio
		route(CHKDST);

		# Rimuove la lista dei Gateway
		if($hdr(X-CoreSIP-DList)) { remove_hf("X-CoreSIP-DList"); }
		# Costruisce il Moved Temporarily
		$var(newcontact) = "sip:" + $avp(onunav) + "@" + $fd;
		# Cambia il  remote uri  in  modo che
		# venga correttamente applicato nella
		# t_reply
		$ruri = $var(newcontact);

		# Tiene traccia degli estremi del fwd (trasferente, trasferito)
		$avp(acc_transfer_src) = $fu;
		$avp(acc_transfer_dst) = $ru;
		$avp(x-cdr) = 1;
        
	        # salva il contatto originale destinatario per il servizio fax
	        $avp(x-orig-ru)  = $avp(x-forward-user);
        
		# Genera la nuova 302
		#t_reply("302", "Redirect on User Unavailable");
		route(MTP);
	} else if($(avp(cfufme){s.int})) {
		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> CHKFWDONUNAV::FOLLOWME]      >>> Sending to followme service id: $avp(subid)\n");
		route(FOLLOWME);
	} else {
		# Controlla la Voicemail (prima  era abilitato il check solo per le  frame provenienti
		# da myself, ma con un dispatcher in linea sul gateway PSTN non avrebbe mai funzionato
		# !!! DA TENERE SOTTO CONTROLLO !!!)
		if(
			# uri == myself && 
			avp_db_query("SELECT sp.`vm_on_unavailable_enabled`, sp.`vm_only_internal_enabled` FROM `subscriber_properties` as sp, subscriber AS sbr
				WHERE sbr.`username`='$avp(dst)' AND sbr.`id`=sp.`subscriber_id`", "$avp(vmena),$avp(vmint)")
		) {
			if(
				( is_contact_registered("location", "$fu",,) && $avp(vmena)) ||
				(!is_contact_registered("location", "$fu",,) && $avp(vmena)  && !$avp(vmint))
			) {
				$rU = $avp(dst);
				$dlg_val(transf) = "1";
				route(DESTUNAVAILABLE);
			} else {
				t_reply("408", "Richiesta scaduta");
			}
		} else {
			t_reply("408", "Richiesta scaduta");
		}
	}
}

## La rotta gestisce eventuali forward numerici
route[CHKFWDONBUSY] {
	# Se il subscriber ha dei forward abilitati
	# si comporta di conseguenza
