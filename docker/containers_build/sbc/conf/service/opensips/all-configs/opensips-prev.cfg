######################################################################################
route[CDR] {
	# Logging to logfile to allow Imagicle compliancy
	# For debugging purpose
	# xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> CDR]                   >>> CDR invoked by $rm on $ci/$fu/$tu call \n");
	# xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> CDR]                   >>> Entering routine params: 	uniqueid=$acc_extra(uniqueid); fu=$acc_extra(fu); tu=$acc_extra(tu); ua=$acc_extra(ua); fU=$acc_extra(fU); si=$acc_extra(si); sp=$acc_extra(sp); dst_user=$acc_extra(dst_user); rd=$acc_extra(rd); rp=$acc_extra(rp); x-gwipaddress=$acc_extra(x-gwipaddress); x-callstart=$acc_extra(x-callstart); x-callsetup=$acc_extra(x-callsetup); rs=$acc_extra(rs); fn=$acc_extra(fn); ds=$acc_extra(ds); contact=$acc_extra(contact); fac_user=$acc_extra(fac_user); fac_domain=$acc_extra(fac_domain) \n");

	if( !$acc_extra(uniqueid) && $avp(uniqueid) ){
		$acc_extra(uniqueid)=$avp(uniqueid);
	}
	if( !$acc_extra(fu) ){
		$acc_extra(fu)=$fu;
	}
	if( !$acc_extra(tu) ){
		$acc_extra(tu)=$tu;
	}
	if( !$acc_extra(fu) ){
		$acc_extra(fu)=$fu;
	}
	if( !$acc_extra(ua) ){
		$acc_extra(ua)=$ua;
	}
	if( !$acc_extra(fU) ){
		$acc_extra(fU)=$fU;
	}
	if( !$acc_extra(si) ){
		$acc_extra(si)=$si;
	}
	if( !$acc_extra(sp) ){
		$acc_extra(sp)=$sp;
	}
	if( !$acc_extra(dst_user) && $avp(dst_user) ){
		$acc_extra(dst_user)=$avp(dst_user);
	}	
	if( !$acc_extra(rd) ){
		$acc_extra(rd)=$rd;
	}
		if( !$acc_extra(rp) ){
		$acc_extra(rp)=$rp;
	}
	if( !$acc_extra(x-gwipaddress) && $avp(x-gwipaddress)){
		$acc_extra(x-gwipaddress)=$avp(x-gwipaddress);
	}
	if( !$acc_extra(x-callstart) && $avp(x-callstart)){
		$acc_extra(x-callstart)=$avp(x-callstart);
	}
	if( !$acc_extra(x-callsetup) && $dlg_val(x-callsetup)){
		$acc_extra(x-callsetup)=$dlg_val(x-callsetup);
	}
	if( !$acc_extra(rs) ){
		$acc_extra(rs)=$rs;
	}
	if( !$acc_extra(fn) ){
		$acc_extra(fn)=$fn;
	}
	if( !$acc_extra(ds) ){
		if($avp(x-cdr-billto) != null) {
			$acc_extra(ds)=$avp(x-cdr-billto);
		} else {
			$acc_extra(ds)=$ds;
		}
	}	
	if( !$acc_extra(contact) && $ct){
		$acc_extra(contact)=$ct.fields(uri);
	}
	if( !$acc_extra(fac_user) && $hdr(X-CoreSIP-FacUser)){
		$acc_extra(fac_user)=$hdr(X-CoreSIP-FacUser);
	}
	if( !$acc_extra(fac_domain) && $hdr(X-CoreSIP-FacDomain)){
		$acc_extra(fac_domain)=$hdr(X-CoreSIP-FacDomain);
	}
	
	# For debugging purpose
	# xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> CDR]                   >>> Logging extra params: 	uniqueid=$acc_extra(uniqueid); fu=$acc_extra(fu); tu=$acc_extra(tu); ua=$acc_extra(ua); fU=$acc_extra(fU); si=$acc_extra(si); sp=$acc_extra(sp); dst_user=$acc_extra(dst_user); rd=$acc_extra(rd); rp=$acc_extra(rp); x-gwipaddress=$acc_extra(x-gwipaddress); x-callstart=$acc_extra(x-callstart); x-callsetup=$acc_extra(x-callsetup); rs=$acc_extra(rs); fn=$acc_extra(fn); ds=$acc_extra(ds); contact=$acc_extra(contact); fac_user=$acc_extra(fac_user); fac_domain=$acc_extra(fac_domain) \n");
	

	if( !$acc_leg(transfer_id) && $avp(acc_transfer_id)){
		$acc_leg(transfer_id)=$avp(acc_transfer_id);
	}
	if( !$acc_leg(leg_src) && $avp(acc_transfer_src)){
		$acc_leg(leg_src)=$avp(acc_transfer_src);
	}
	if( !$acc_leg(leg_dst) && $avp(acc_transfer_dst)){
		$acc_leg(leg_dst)=$avp(acc_transfer_dst);
	}
	
	# For debugging purpose
	# xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> CDR]                   >>> Logging leg params: 	transfer_id=$acc_leg(transfer_id); leg_src=$acc_leg(leg_src); leg_dst=$acc_leg(leg_dst) \n");
	
	if(is_method("INVITE")){
		do_accounting("log","cdr|failed|missed");
	} else if(is_method("BYE") && ($shv(cdrimagiclecompliancy) == 1)){
		# add to cdr a single line for a BYE transaction to the "acc" log file 
		acc_log_request(" ");
	} else if(is_method("REFER") ){
		# add to cdr a single line for a REFER transaction to the "acc" log file 
		acc_log_request(" ");
	}
}

route[DO_CDR] {
	# Logging to DB in order to use new monkeyvoice billing system
	$acc_extra(xcdr_domain) = $avp(x-routedomain);
	$acc_extra(xcdr_caller) = $avp(xcdr_caller);
	$acc_extra(xcdr_original_called) = $avp(xcdr_original_called);
	
	$acc_extra(xcdr_translated_called) = "";
	if($avp(xcdr_translated_called))
		$acc_extra(xcdr_translated_called) = $avp(xcdr_translated_called);

	$acc_extra(xcdr_direction) = "";
	if($avp(xcdr_direction))
		$acc_extra(xcdr_direction) = $avp(xcdr_direction);
	
	$acc_extra(xcdr_gateway) = "";
	if($avp(xcdr_gateway))
		$acc_extra(xcdr_gateway) = $avp(xcdr_gateway);
	
	do_accounting("db","cdr|missed|failed");
}
