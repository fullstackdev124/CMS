		# Cambia il  remote uri  in  modo che
		# venga correttamente applicato nella
		# t_reply
		$ruri = $var(newcontact);
		$avp(onbusy) = null;

		# Tiene traccia degli estremi del fwd (trasferente, trasferito)
		$avp(acc_transfer_src) = $fu;
		$avp(acc_transfer_dst) = $ru;
		$avp(x-cdr) = 1;

	        # salva il contatto originale destinatario per il servizio fax
	        $avp(x-orig-ru)  = $avp(x-forward-user);
        
		# Genera la nuova 302
		#t_reply("302", "Redirect on User Busy");
		route(MTP);
	} else if($(avp(cfbfme){s.int})) {
		# Debug
		xlog("L_INFO", "[$fU -> CHKFWDONBUSY::FOLLOWME]      >>> Sending to followme service id: $avp(subid)\n");
		route(FOLLOWME);
	} else {
		# Controlla la Voicemail (prima  era abilitato il check solo per le  frame provenienti
		# da myself, ma con un dispatcher in linea sul gateway PSTN non avrebbe mai funzionato
		# !!! DA TENERE SOTTO CONTROLLO !!!)
		if(
			# uri == myself && 
			avp_db_query("SELECT sp.`vm_on_busy_enabled`, sp.`vm_only_internal_enabled` FROM `subscriber_properties` as sp, subscriber AS sbr 
					WHERE sbr.`username`='$avp(dst)' AND sbr.`id`=sp.`subscriber_id`", "$avp(vmena),$avp(vmint)")
		) {
			if(
				( is_contact_registered("location", "$fu",,) && $avp(vmena)) ||
				(!is_contact_registered("location", "$fu",,) && $avp(vmena)  && !$avp(vmint))
			) {
				$rU = $avp(dst);
				$dlg_val(transf) = "1";
				route(DESTBUSY);
			} else {
				t_reply("486", "Numero Occupato");
			}
		} else {
			t_reply("486", "Numero Occupato");
		}
	}
}

# La rotta gestisce una deviazione su utenza non trovata
route[CHKFWDONOTFOUND] {
	# Se il subscriber ha dei forward abilitati
	# si comporta di conseguenza
	if($(avp(cfnr){s.int}) && !$(avp(cfnrfme){s.int})) {
		# Avvalora le avp per i controlli sui forward lato centrale
		$dlg_val(is_forward)       = "1";
		$avp(x-forward-user)       = $avp(dst);
		$avp(x-forward-domain)     = $td;
		$avp(x-forward-destdomain) = $td;
		$avp(x-forward-destuser)   = $avp(cfnrtrg);
		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> CHKFWDONNOTFOUND]      >>> User $avp(x-forward-user)@$avp(x-forward-domain) is not registered, checking COS for forwarding call to $avp(x-forward-destuser)@$avp(x-forward-destdomain)\n");
		# Controlla le classi di servizio
		route(CHKDST);

		# Rimuove la lista dei Gateway
		if($hdr(X-CoreSIP-DList)) { remove_hf("X-CoreSIP-DList"); }
		# Costruisce il Moved Temporarily
		$var(newcontact) = "sip:" + $avp(cfnrtrg) + "@" + $fd;
		# Cambia il  remote uri  in  modo che
		# venga correttamente applicato nella
		# t_reply
		$ruri = $var(newcontact);
		
		# Tiene traccia degli estremi del fwd (trasferente, trasferito)
		$avp(acc_transfer_src) = $fu;
		$avp(acc_transfer_dst) = $ru;
		$avp(x-cdr) = 1;
	        # salva il contatto originale destinatario per il servizio fax
	        $avp(x-orig-ru)  = $avp(x-forward-user);

		# Genera la nuova 302
		# t_reply("302", "Redirect on User not Found");
		
		# Con la 302 non sembra essere possibile reinoltrare la chiamata
		# in quanto il redirect sull'asterisk interno fa in modo che
		# il remote uri venga ripristinato al contatto originale e non
		# al contatto del trasferimento.
		avp_delete("$avp(x-rtpproxy)");
		avp_delete("$avp(x-hopcount)");
		#uac_replace_to("$var(newcontact)");
		append_to_reply("Contact: <$fu>\r\n");
		route(MTP);
	} else if($(avp(cfnrfme){s.int})) {
		# Debug
		xlog("L_INFO", "[$fU -> CHKFWDONOTFOUND::FOLLOWME]   >>> Sending to followme service id: $avp(subid)\n");
		
		avp_delete("$avp(x-rtpproxy)");
		append_to_reply("Contact: <$fu>\r\n");
		route(FOLLOWME);
	} else {
		t_reply("404", "Non trovato");
	}
}

# Inoltra la chiamata al servizio di followme
route[FOLLOWME] {
	# Definisce il servizio followme
	$avp(x-service)  = "internal_service";
	$avp(x-servtype) = "followme";
	$avp(x-servargs) = $avp(subid);
	# Ruota al Dispatcher
	route(MTP);
}

## La rotta si occupa di ripulire le sessioni e le entry database una volta ricevuto il
## BYE da una determinata estensione -- Questo e' per evitare inconsistenze sui BLF
route[CLEANER] {
	# Pulisce le dialog di Pickup
	if($dlg_val(pickupper) || $dlg_val(pickupped)) {
		# Preleva lo username dal Pickupper
		$var(pickupper) = $(dlg_val(pickupper){s.select,0,@});
		$var(pickupper) = $(var(pickupper){s.select,1,:});
		
		# Chiude la segnalazione
		t_reply("200", "OK");
		
		# Notifica solo se le destinazioni sono locali
		if(avp_db_query("SELECT username FROM location WHERE username='$var(pickupper)' OR username='$dlg_val(pickupped)'", "$avp(found)")) {
			exec_avp("/usr/local/bin/osipsexec notifyall '$var(pickupper)','$dlg_val(pickupped)' '$shv(default_domain)' terminated '$shv(local_hostname)'", "$avp(ret)");
		}
	} else {
		# Costruisce i contatti
		$var(caller) = $fU + "@" + $shv(default_domain);
		$var(called) = $fU + "@" + $shv(default_domain);

		# Preleva il profilo chiamate per gli utenti coinvolti
		get_profile_size("outbound", "$var(caller)", "$avp(fosize)");
		get_profile_size("inbound",  "$var(caller)", "$avp(fisize)");
		get_profile_size("outbound", "$var(called)", "$avp(rosize)");
		get_profile_size("inbound",  "$var(called)", "$avp(risize)");
		
		# Ripulisce solo se non ci sono dialog presenti per il chiamante
		if(!$avp(fosize) && !$avp(fisize)) {
			# avp_db_query("DELETE FROM presence.presentity WHERE username='$fU'");
			# Notifica solo se le destinazioni sono locali
			if(avp_db_query("SELECT username FROM location WHERE username='$fU'", "$avp(found)")) {
				exec_avp("/usr/local/bin/osipsexec notifyall '$fU' '$shv(default_domain)' terminated '$shv(local_hostname)'", "$avp(ret)");
			}
		}
		
		# Ripulisce solo se non ci sono dialog presenti per il chiamato
		if(!$avp(rosize) && !$avp(risize)) {
			# avp_db_query("DELETE FROM presence.presentity WHERE username='$rU'");
			# Notifica solo se le destinazioni sono locali
			if(avp_db_query("SELECT username FROM location WHERE username='$rU'", "$avp(found)")) {
				exec_avp("/usr/local/bin/osipsexec notifyall '$rU' '$shv(default_domain)' terminated '$shv(local_hostname)'", "$avp(ret)");
			}
		}
	}
}

## Route di autenticazione degli utenti locali. Il sistema utilizzato e' basato sul caching
## locale delle credenzali di accesso. Questo permette la gestione di un numero massivo di
## utenti registrati.
route[REGISTER] {
	# Crea il contatto senza le parentesi
	$var(contact) = $hdr(Contact);
	$var(contact) = $(var(contact){nameaddr.uri});

	# Refusing register having in contact header the IP of a gataway (Poisoning suspected)
	if (dr_is_gw("$var(contact)", "0","in")) {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Register coming from the IP of GW $avp(gw_id): forbidden (poisoning suspected)!\n");
		t_reply("403", "Registration forbidden");
		exit;
	}

	# Controlla se l'utente e' ancora presente in cache e recupera le credenziali necessarie
	if(cache_fetch("memcached:aor", "userna_$tu", $avp(username))) {

		cache_fetch("memcached:aor", "passwd_$tu", $avp(password));
		cache_fetch("memcached:aor", "domain_$tu", $avp(domain));
		cache_fetch("memcached:aor", "label_$tu",  $avp(label));
		cache_fetch("memcached:aor", "rpid_$tu",   $avp(rpid));
		cache_fetch("memcached:aor", "pin_$tu",    $avp(pin));

		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Cached credentials are still valid: $avp(username) - $avp(password) - $avp(domain)!");
	}

	#Prova l'autenticazione con le credenziali prese dalla cache
	$var(try_db_auth) = 0;
	if(!$avp(username)){
		$avp(username)="";
	}
	
	if (!pv_www_authorize("")) {

		switch($retcode) {
			case -5:
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Some generic error occurred and no reply was sent out\n");
				break;
			case -4:
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Credentials were not found in request\n");
				break;
			case -3:
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Stale nonce\n");
				break;
			case -2:
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Valid user, but wrong password\n");
				$var(try_db_auth) = 1;
				break;
			case -1:
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Authentication user does not exist\n");
				$var(try_db_auth) = 1;
				break;
			default:
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> NOT DEFINED: $retcode\n");
		} 

		if ($var(try_db_auth) == 0) {
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Rechallenging\n");
			www_challenge("", "0");
			exit;
		
		} else {
			if (!www_authorize("", "subscriber")){
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Authentication failed against DB credentials\n");
				www_challenge("", "0");
				exit;
			} else {
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Authentication succeeded against DB credentials\n");
			}
			
			
			# Updating cache
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Updating cache info: $avp(username)\n");
			cache_remove("memcached:aor", "$var(contact)");
			cache_remove("memcached:aor", "userna_$tu");
			cache_remove("memcached:aor", "passwd_$tu");
			cache_remove("memcached:aor", "domain_$tu");
			cache_remove("memcached:aor", "label_$tu");
			cache_remove("memcached:aor", "rpid_$tu");
			cache_remove("memcached:aor", "pin_$tu");
			
			cache_store("memcached:aor", "$var(contact)", "sip:$avp(username)@$avp(domain):$sp", 7200);
			cache_store("memcached:aor", "userna_$tu",    "$avp(username)", 7200);
			cache_store("memcached:aor", "passwd_$tu",    "$avp(password)", 7200);
			cache_store("memcached:aor", "domain_$tu",    "$avp(domain)",   7200);
			cache_store("memcached:aor", "label_$tu",     "$avp(label)",    7200);
			cache_store("memcached:aor", "rpid_$tu",      "$avp(rpid)",     7200);
			cache_store("memcached:aor", "pin_$tu",       "$avp(pin)",      7200);
		}
	} else {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>> Authentication succeeded against cache credentials\n");
	}

	# Imposta l'ambiente di presenza in base alla user location
	# per i devices che non supportano la presence
	pua_set_publish();

	# -- Snom WorkAround
	if($hdr(User-Agent) =~ "^snom.*") {
		if($hdr(Expires)) {
			append_to_reply("Expires: $hdr(Expires)\r\n");
		} else {
			append_to_reply("Expires: 3600\r\n");
		}
	}

	# -- Avaya WorkAround
	if($shv(avayaenabled))
	if($hdr(User-Agent) =~ "^Avaya.*") {
		# Request a Global Session ID
		exec_avp("/usr/local/bin/osipsexec get_avaya_gsessid", "$avp(x-avgsid)"); 
		# Store It
		cache_store("memcached:aor", "avgsid_$fu", "$avp(x-avgsid)", 7200);
		
		# Let it known everywhere (aor too)
		$avp(attr) = $avp(x-avgsid);
		
		# Store and modify header
		$var(x-avctreg) = $hdr(Contact);
		$var(x-avctreg) = $(var(x-avctreg){re.subst,/q=1/q=1.0/g});
		
		# Append to reply needed headers
		append_to_reply("Contact: $var(x-avctreg)\r\n");
		append_to_reply("Feature-Caps: *;+sip.avaya-sips-handling\r\n");
		append_to_reply("Av-Global-Session-ID: $avp(x-avgsid)\r\n");
		append_to_reply("Server: Avaya-SM-6.3.8.0.638018\r\n");
		append_to_reply("Date: $time(%a, %d %b %Y %T %Z)\r\n");
		
		# Store It
		$var(x-avctreg) = $ct.fields(params);
		$var(x-avctreg) = $(var(x-avctreg){re.subst,/q=1/q=1.0/g});
		cache_store("memcached:aor", "avctreg_$fu", "$var(x-avctreg)", 7200);
	}

	# WORKAROUND -- OpenSIPS 2.2-dev registrar/save non sembra gestire correttamente l'expires=0  
        # - nel contact header. In tal caso chiamo direttamente il remove dell'AOR. 
        # - Potrebbe essere piĂą preciso aggiungere anche il contact uri. 
        $var(avexpires) = 3600; if($ct.fields(expires)) { $var(avexpires) = $ct.fields(expires); } 
        if(($(var(avexpires){s.int}) <= 0) || ($hdr(User-Agent) =~ "^Avaya.*")) { 
                remove("location", "$fu"); 
                t_reply("200", "OK"); 
        } else { 
                # Save Authentication 
                if (!save("location")) { 
                        # Error Reply 
                        sl_reply_error(); 
                        # Debug 
                        xlog("L_INFO", "[$fU -> INFO::REGISTER]              >>> Error creating local AOR!\n"); 
                } 
        }

	# Debug - Questo e' utile ai fini del logging/debug
	if (!$var(avexpires) || $(var(avexpires){s.int}) <= 0) {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> UNREGISTER]            >>> UNREGISTERED Username: $avp(username) / Password: $avp(password) / Domain: $avp(domain) / RPID: $avp(rpid) / Label: $avp(label) / PIN: $avp(pin)");
	} else {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REGISTER]              >>>   REGISTERED Username: $avp(username) / Password: $avp(password) / Domain: $avp(domain) / RPID: $avp(rpid) / Label: $avp(label) / PIN: $avp(pin)");
	}
}

## Gestisce il routing del dialogo SIP che avviene per gli endpoint dietro NAT
route[NATDIALOG] {

	if($shv(natenabled)) {

		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATDIALOG]             >>> Looking for NAT on $rm ($rs - $rr) from $fu to $tu (ru: $ru)");

		route(NATTRANSACTION);
		
		if(isflagset(5)){
			if(!match_dialog())
				create_dialog();
			
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATDIALOG]             >>> NAT found on dialog: setting per dialog flag \n");
			set_dlg_flag("5");
		# } else {
			# xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATDIALOG]             >>> NAT not found on dialog: passing over \n");
		}

		if(is_dlg_flag_set("5")){

			# xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATDIALOG]             >>> NAT dialog set, evaluating rtp proxy \n");
			
			# Decide se la dialog utilizzerĂ  l'rtp proxy o meno
			if( has_body("application/sdp") && (!is_dlg_flag_set("11")) ) {
				# DEBUG
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATDIALOG]             >>> NAT discovered: requiring rtpproxy... \n");

				avp_delete("$avp(x-rtpproxy)");
				$avp(x-rtpproxy)=1;
			# } else {
				# xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATDIALOG]             >>> NAT discovered: rtpproxy not needed\n");
			}
		# } else {
			# xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATDIALOG]             >>> NAT was not set on this dialog\n");
		}
	}
}

route[NATTRANSACTION] {
	
	if($shv(natenabled)) {
	
		if( ($fd != "localhost") &&
			($td != "localhost") &&
			($Ri != "127.0.0.1") ) {
			
			# checking $si and $sp for nat against VIA header (flag 16+2 = 18), only on request methods (escaping answers)
			if ( !($rs) && $hdr(Via) && nat_uac_test("18") ) {
				# aggiungendo la rport al VIA header, mi vincolo a rispondere sulla porta dalla quale ho ricevuto i pacchetti
				force_rport();
				setflag(5);
				#xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATTRANSACTION]             >>> NAT DETECTED on $rm from $fu to $tu (ru: $ru): Via match \n");
			}
			
			# checking $si and $sp for nat against Contact header (flag 16+2 = 18)
			if ( $hdr(Contact) && nat_uac_test("96")) {
				# aggiungendo la rport al VIA header, mi vincolo a rispondere sulla porta dalla quale ho ricevuto i pacchetti
				fix_nated_contact(";nat=yes");
				setflag(5);
				#xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATTRANSACTION]             >>> NAT DETECTED on $rm from $fu to $tu (ru: $ru) : Contact match\n");
			}
			
			# Qualora esista il tag nat=yes viene settato il flag 
			if (subst_uri('/(sip:.*);nat=yes/\1/')) {
				setflag(5);
				#xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATTRANSACTION]             >>> NAT DETECTED on $rm from $fu to $tu (ru: $ru) : nat tag found\n");
			}
			
			# chiamata destinata o proveniente da un subscriber la cui register Ă¨ marchiata come proveniente da NAT
			if(isbflagset(NAT_BFLAG)){
				setflag(5);
				#xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATTRANSACTION]             >>> NAT DETECTED on $rm from $fu to $tu (ru: $ru) : nat flag set found\n");
			}
			
			# NAT Contact header manipulations
			if (isflagset(5)){
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> NATTRANSACTION]             >>> NAT detected on transaction $rm ($rs - $rr) from $fu to $tu (ru: $ru)\n");
				
				if (is_method("REGISTER")) {
					#Imposta i bflag di rilevazione nat per la location (6) e di nat ping via sip (7)
					setbflag(NAT_BFLAG);
					setbflag(SIP_PING_BFLAG);
					fix_nated_register();
				}
			}
		}
	}
}

##n1##################################################################################
#                                                                                    #
#    PRIMO LIVELLO DELLA LOGICA DI ROUTING (DIALPLAN)                                #
#                                                                                    #
#####################################################################################
  #///////////////////////////////////////////////////////////////////////////////////>

## Route che esamina il flusso logico del dialplan. Per il routing tra gli utenti registrati
## localmente o per il  dialplan di outbound. La  sorgente deve essere autenticata affinche'
## l'invite vada a buon fine.

route[DIALPLAN] {

	# Se marchiato significa che il pacchetto e' stato gia' ruotato per
        # l'uscita da questo gateway. In tal caso si sta potenzialmente
        # Generando un loop. La sessione viene chiusa.
	if($(avp(x-hopcount){s.int})) {
		$avp(x-hopcount) = $(avp(x-hopcount){s.int}) + 1;
	} else if($(hdr(X-CoreSIP-HopCount){s.int})) {
		$avp(x-hopcount) = $(hdr(X-CoreSIP-HopCount){s.int});
		$avp(x-hopcount) = $(avp(x-hopcount){s.int}) + 1;
	} else {
		$avp(x-hopcount) = "0";
	}

	# Abilita l'accounting per ogni chiamata che transiti per il dialplan
	$avp(x-cdr) = 1;

	# Preleva la dialog-id  dal  campo replaces  qualora 
	# ci si trovi in caso di trasferta con consultazione
	# Cosi' facendo si possono ricostruire  piu' dialogs
	# con un unico identificativo.
	if($hdr(Replaces)) { $avp(dialogid) = "_" + $(hdr(Replaces){s.select,0,;}) + "_"; }

	# Salva l'URI originale prima di qualunque conversione
	$avp(originalru)	= $rU;
	$avp(originalfu)	= $fU;
	$avp(originalruri)	= $ru;
	$avp(originalfuri)	= $fu;
	$avp(xcdr_caller)	= $fU;
	$avp(xcdr_original_called)	= $rU;

	# Controlla che il Caller non cerchi di chiamare se stesso
	if($fu == $ru) {
		# DEBUG
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> $fu is calling itself aborting \n");
		
		# Invia il Busy Indication
		t_reply("486", "Numero Occupato");
		exit;
	}

	# Controlla che il Caller ID non ecceda in lunghezza
	if($(fU{s.len}) > 18) {
		# DEBUG
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Malformed URI ($fu) hanging up \n");
		
		# Invia il Busy Indication
		t_reply("603", "Chiamata rifiutata");
		exit;
	}

	# Preleva il domainID di appartenenza -- In caso di fallimento utilizza
	# quello di default
	$avp(domainid) = 1;
	$avp(x-routedomain) = $shv(default_domain);
	
	# In prima battuta si affida a quanto richiesto da segnalazione e ne ricava il relativo domain id
        if(avp_db_query("SELECT d.id, d.domain FROM domain AS d WHERE d.domain='$td'", "$avp(didid)")) {
                $avp(domainid) = $avp(didid);
                $avp(x-routedomain) = $td;
        }

        # Ricava il tenant di chiamata controllando se il numero chiamato appartiene ad un dominio specifico
        $var(did) = "^" + $rU + ".*";
        if(avp_db_query("SELECT d.id, d.domain FROM domain AS d, gnr AS g WHERE g.number RLIKE '$var(did)' AND g.default_domain=d.domain", "$avp(didid),$avp(dfldomain)")) {
                $avp(domainid) = $avp(didid);
                $avp(x-routedomain) = $avp(dfldomain);
        }

	# Debug
	xlog("L_INFO", "[44m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Call routed through domain id: [44m$avp(domainid) / $avp(x-routedomain)[0m\n");

	# Salva il contatto chiamante per
	# controlli/modifiche future
	$avp(registeredaor) = $fu;
	$var(callercontact) = $(ct.fields(uri){s.tolower});

	# Controlla per eventuali forward lato server
	# if (db_does_uri_exist()) { route(CHKFWD); }

	# Salva la tipologia di trasporto impiegata
	$avp(x-proto) = $proto;

	######################################################################################
	#                                                                                    #
	#    CHIAMATA INIZIALIZZATA DA UN LOCAL AOR (Endpoint registrato al proxy locale)    #
	#                                                                                    #
	######################################################################################
	#////////////////////////////////////////////////////////////////////////////////////>
	xlog("L_INFO", "[34m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Checking if CALLER ($avp(registeredaor) - $fu/$si) is a local AOR\n");

	# Controlla se la chiamata proviene da una sorgente locale
	if (
		is_contact_registered("location","$avp(registeredaor)",,) ||
		is_ip_registered("location", "$fu", "$si") || is_registered("location","$avp(registeredaor)")
	) {
		# Controlla se il contatto locale e' autenticato
		# Il dominio di riferimento e' il base (1)
		if(!check_source_address("1")) {

			if (!proxy_authorize("","subscriber")) {
				proxy_challenge("","0");
				exit;
			} else 
	
			# Controlla se il contatto e' registrato
			if (!db_check_from()) {
				sl_send_reply("403", "Non autorizzato");
				exit;
			}

			# Rimuove il tag "Authorize:" dall'header perche' autenticato
			consume_credentials();

			# Scrive nella segnalazione le informazioni relative al contatto
			# qualora l'INVITE dovesse coinvolgere un MTP
			$avp(x-registereduser)  = $avp(username);
			$avp(x-registeredomain) = $avp(domain);
		} else {
			# Debug
			xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Incoming INVITE from authorized source address ($si:$sp)\n");
		}

		# Ricava il tenant di chiamata sulla base del dominio di registrazione se presente
		if($avp(reg_domain) != null && $avp(reg_domainid) != null) {
			$avp(domainid) = $avp(reg_domainid);
			$avp(x-routedomain) = $avp(reg_domain);
			# DEBUG
			xlog("L_INFO", "[44m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Call domain id remapped to: [44m$avp(domainid) / $avp(x-routedomain)[0m\n");
		}

		# Controlla se l'F-URI e' un dbalias e lo sostituisce con
		# il relativo subscriber
		alias_db_lookup("dbaliases");

		# Salva il contatto reale per il call Pickup
		# prima di qualunque modifica
		$avp(internalcid) = $rU;

		# Controlla se la dupla chiamate/chiamato figura tra le Black List
		route(CHKRBL);

		# Gestisce gli action button delle station Avaya
		if($shv(avayaenabled))
		if($hdr(User-Agent) =~ "^Avaya.*" && $ru =~ "^.*;avaya-cm-fnu=team.*") {
			if($(ru{param.exist,avaya-cm-action})) {
				# Get Team Button Action
				$var(x-cm-action) = $(ru{param.value,avaya-cm-action});
				$var(x-cm-dest)   = $(ru{param.value,avaya-cm-destination});
				$var(x-cm-ci)     = $(ru{param.value,avaya-call-id});
				
				# Debug
				xlog("L_INFO", "[$fU -> INFO::DIALPLAN]              >>> AVAYA Team Button: $var(x-cm-action) for $var(x-cm-dest) callid: $var(x-cm-ci)!\n");
				
				# Avaya - Gestisce un eventuale Call Pickup
				if($var(x-cm-action) == "pickup") {

					if(get_dialog_info("dlg_peer", "$avp(dest)", "callid", "$var(x-cm-ci)")) {
						# Preleva solo la user part dell'uri
						$avp(dest) = $(avp(dest){uri.user});
						
						# Modifica la request uri
						# $var(newcontact) = "sip:" + $shv(code_pck) + $avp(dest) + "@" + $fd;
						# uac_replace_to("$var(newcontact)");
						# $ruri = $var(newcontact);
						
						$rU = $shv(code_pck) + $avp(dest);
						route(PICKUP);
						
						# Debug
						xlog("L_INFO", "[$fU -> INFO::DIALPLAN]              >>> AVAYA Pickup for $var(newcontact)!\n");
					} else {
						# Debug
						xlog("L_INFO", "[$fU -> INFO::DIALPLAN]              >>> NO AVAYA Pickup available for $var(x-cm-ci)!\n");
						t_reply("404", "Pickup non Trovato");
					}

				# Avaya - Gestisce un eventuale Speed Dial
				} else if($var(x-cm-action) == "speeddial") {

					# Modifica la request uri
					$var(newcontact) = "sip:" + $var(x-cm-action) + "@" + $fd;
					
					# Cambia il  remote uri  in  modo che
					# venga correttamente applicato nella
					# t_reply
					$ruri = $var(newcontact);
					
					# Debug
					xlog("L_INFO", "[$fU -> INFO::DIALPLAN]              >>> AVAYA Speed Dial for $var(newcontact)!\n");
					
					# Cambia il  remote uri  in  modo che
					# venga correttamente applicato nella
					# t_reply
					$ruri = $var(newcontact);
					
					# Appende Il From URI Corretto al Contact
					append_to_reply("Contact: <$fu>\r\n");
					# Elimina l'eventualitĂ  che venga ingaggiato l'rtp proxy
					avp_delete("$avp(x-rtpproxy)");
					# Ruota la segnalazione al dispatcher
					route(MTP);
				}

				# Blocca lo script
				exit;
			}
		}

		# Codice di Call Pickup
		$var(codepart) = $(rU{s.substr,0,$(shv(code_pck){s.len})});
 		if($var(codepart) == $shv(code_pck)) {
			route(PICKUP);
		}

		# Codice di Call Park
		$var(codepart) = $(rU{s.substr,0,$(shv(code_prk){s.len})});
 		if($var(codepart) == $shv(code_prk)) {
			route(PARK);
		}
		
		# Codice di Call Anonymizer
		$var(codepart) = $(rU{s.substr,0,$(shv(code_anon){s.len})});
		if( $var(codepart) == $shv(code_anon) ) {
			# Strip Anonymizer Code
			$rU = $(rU{s.substr,$(shv(code_anon){s.len}),0});
			# Aggiorna l'original R-URI
			$avp(originalruri) = $ru;
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN]              >>> ANONYMIZER: $ru - $du \n");
			# Set Anonymizer R-PID
			$avp(x-anonymizer) = "\"anonymous\" <sip:anonymous@anonymous.invalid>;party=calling;privacy=full;screen=no";
		}

		# Codice di Abilitazione Disabilitazione delle Regole Dialplan 
		$var(codepart) = $(rU{s.substr,0,$(shv(code_ruletoggle){s.len})});
		if($var(codepart) == $shv(code_ruletoggle)) {
				# Definisce il servizio Rule Toggle
				$avp(x-service)  = "internal_service";
				$avp(x-servtype) = "ruletoggle";
				$avp(x-servargs) = $(rU{s.substr,$(shv(code_ruletoggle){s.len}),0});
				# Ruota al Dispatcher
				route(MTP);
				exit;
		}

		# Codice di Deviazione Boss/Secretary
		$var(codepart) = $(rU{s.substr,0,$(shv(code_bossfwd){s.len})});
		if($var(codepart) == $shv(code_bossfwd) ) {
			$var(grouppart) = $(rU{s.substr,$(shv(code_bossfwd){s.len}),0});
			if (avp_db_query("SELECT `hg`.`id`, `hg`.`group_name`, `s`.`id` FROM `hunting_group` as `hg`, `boss` AS `b`, `subscriber` AS `s`
				WHERE (`hg`.`domain_id`='$avp(domainid)' AND `hg`.`boss_secretary`=1) AND (`s`.`username`='$fU' AND `hg`.`group_name` = '$var(grouppart)')", "$avp(gpid);$avp(gpname);$avp(manid)")) {
				if($avp(gpid) != null && $(avp(gpid){s.int}) > 0) {
					avp_db_query("UPDATE `hunting_group` SET `forward_unc` = (NOT `forward_unc`), `forward_unc_target` = '$avp(gpname)' WHERE `id` = '$avp(gpid)'", "$avp(gpidret)");
					if(avp_db_query("SELECT `hg`.`forward_unc` FROM `hunting_group` as `hg` WHERE `hg`.`id` = '$avp(gpid)'", "$avp(fwdunc)")) {
						$var(entity) = "sip:" + $rU + "@" + $Ri + ":" + $Rp;
						if($avp(fwdunc) && ($(avp(fwdunc){s.int}) == 1)) {
							$var(state) = "close";
							xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Boss/Secretary $avp(gpname) (id: $avp(gpid)) filter dectivated!\n");
						} else {
							$var(state) = "open";
							xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Boss/Secretary $avp(gpname) (id: $avp(gpid)) filter activated!\n");
						}

						$var(command) = "/usr/bin/curl -sSf \"http://localhost:3001/notify?entity=" + $var(entity) + "&state=" + $var(state) + "&managerid=" + $avp(gpid) + "\"";
						exec("$var(command)",, "$var(stdout)", "$var(stderr)");

						xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Boss/Secretary filter notify status: $var(stdout) - $var(stderr)\n");
					}
				}
			}

			send_reply("486", "Action done");
			drop();
			exit;
		}

		# Controlla se la numerazione e' uno speedial
		route(CHKSPD);

		# Controlla se appartiene ad un servizio di intercom
		route(CHKINTERCOM);

		# Aggiorna la presentation se necessario
		route(UPDCTC);

		# Controlla se il chiamato figura tra gli Hunting Group
		route(CHKHG);

		# Controlla se il chiamato figura tra le Stanze di Conferenza
		route(CHKMME);
		
		# Controlla se il chiamato figura tra i Call Forward Services
		route(CHKCFS);
		
		# Controlla se il chiamato figura tra le Campagne
		route(CHKCAMPAIGN);

		# Crea una dialog e Imposta il Profilo - Questo serve per poter conteggiare
		# il numero di chiamate che un'utenza locale sta servendo.
		create_dialog();

		# Store Caller Id for Avaya Call Pickup
		$dlg_val(callid) = $ci;
		$dlg_val(uniqueid) = $avp(uniqueid);

		# Imposta la Dialog Info
		if(!$fu =~ ".*@anonymous.invalid.*") {
			# Preleva il chiamante
			if($hdr(X-CoreSIP-RegisteredUser) && $hdr(X-CoreSIP-RegisteredDomain)) {
				$avp(caller) = "sip:" + $hdr(X-CoreSIP-RegisteredUser) + "@" + $hdr(X-CoreSIP-RegisteredDomain);
			} else if($hdr(X-CoreSIP-Recall)) {
				# In caso di Recal preleva l'header preposto e ne splitta le parti
				# Accrocco  dovuto al fatto che  asterisk non supporta il multiple
				# header add a livello di call files
				$var(cepart) = $(hdr(X-CoreSIP-Recall){s.select,0,_});
				$var(ceuprt) = $(var(cepart){s.select,0,@});
				$var(cedprt) = $(var(cepart){s.select,1,@});
				$var(crpart) = $(hdr(X-CoreSIP-Recall){s.select,1,_});
				$var(cruprt) = $(var(crpart){s.select,0,@});
				$var(crdprt) = $(var(crpart){s.select,1,@});
				$avp(caller) = "sip:" + $var(cruprt) + "@" + $var(crdprt);
				# Debug
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN]              >>> RECALL Service From $avp(caller)\n");
			} if($avp(username) && $avp(domain)) {
				$avp(caller) = "sip:" + $avp(username) + "@" + $avp(domain);
			} else {
				$avp(caller) = $fu;
			}

			$avp(callee) = $tu;
			dialoginfo_set();
		}

		# Salva il contatto reale per il call Pickup
		# nella dialog
		$dlg_val(viaheader)   = $hdr(Via);
		$dlg_val(internalcid) = $avp(internalcid);

		# Crea il contatto riferimento per le dialog
		$var(contact) = $avp(caller);

		# Avvalora il profilo di outbounding se non ruotato da un dispatcher
		if(!$hdr(X-CoreSIP-Routed)) { set_dlg_profile("outbound", "$var(contact)"); }

		# Preleva il profilo chiamate per l'utente chiamato
		get_profile_size("outbound", "$var(contact)", "$avp(callerosize)");
		get_profile_size("inbound",  "$var(contact)", "$avp(callerisize)");

		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN]              >>> CALLER IS A LOCAL AOR ( $var(contact) --> Out Calls: $avp(callerosize) In Calls: $avp(callerisize) )\n");
		$dlg_val(local_caller) = $var(contact);

		# Capisce se il contatto in questione ha  gia' una dialog ruotata attraverso
		# un MTP. nel qual caso anche la dialog attuale viene ruotata tramite MTP ai
		# fini delle trasferte con consultazione
#		get_profile_size("mtp",, "$avp(mtpsize)");
#		get_dialog_info("was_dsptched", "$avp(was_dsptched)", "was_dsptched", "$hdr(Contact)");
#		if($avp(was_dsptched) || $(avp(mtpsize){s.int}) > 0) {
#			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN]              >>> Caller $var(contact) own a dialog already dispatched through an MTP, doing same ...\n");
#			route(MTP);
#			exit;
#		}

		# Aggiorna il contatto originale
		$avp(originalfuri) = $var(contact);
		set_dlg_profile("outbound", "$avp(originalfuri)");
		set_dlg_profile("extcall",  "$avp(originalfuri)");

		# Definisce il possibile contatto del chiamato locale
		$avp(registeredaor) = "sip:" + $tU + "@" + $td;
		
		# Codice per il registratore di chiamata
		$var(codepart) = $(rU{s.substr,0,$(shv(code_recording){s.len})});
		if($var(codepart) == $shv(code_recording)) {

			# Si accerta che ci sia solo una chiamata in corso
			$avp(totalcalls) = 0;
			math_eval("$avp(callerosize) + $avp(callerisize)", "$avp(totalcalls)");
			if($avp(callerosize{s.int}) > 3 || $avp(callerisize{s.int}) > 3 || $avp(totalcalls{s.int}) > 3) {
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> RECORDING]             >>> Not Allowed - Too many calls: $avp(totalcalls)\n");
				t_reply("403", "Too many calls");
				exit;
			}
			
			$avp(recena) = 0;
			if ($avp(username) && $avp(domain)) {
				avp_db_query("SELECT sbp.recording_enabled FROM subscriber as sbr, subscriber_properties as sbp WHERE sbr.username='$avp(username)' and `sbr`.`domain`='$avp(domain)' AND `sbr`.`id`=`sbp`.`subscriber_id`;", "$avp(recena)");
			}

			if ($avp(recena) == 0) {
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> RECORDING]             >>> Not Allowed - Recording disabled for user: $avp(username) domain: $avp(domain))\n");
				t_reply("403", "Recording forbidden");
				exit;
			}
			
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> RECORDING]             >>> $avp(callerosize) + $avp(callerisize) = $avp(totalcalls)\n");
			
			# Tipologia di Servizio da iniettare al Dispatcher
			$avp(x-service)     = "internal_service";
			$avp(x-servtype)    = "recording";
			
			# Preleva il chiamato dalla dialog principale
			$var(dialog_id) = "dialog_" + $ct;
			get_dialog_info("dialog_callee", "$avp(x-recording)", "dialog_id", "$var(dialog_id)");
			
			# Preformatta il contatto chiamato
			if(!$avp(x-recording)) {
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> RECORDING]             >>> Dialog marked undefined\n");
				$avp(x-recording) = "undefined";
			} else {
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> RECORDING]             >>> Dialog marked parsing: $avp(x-recording) / $(avp(x-recording){uri.user})\n");
				$avp(x-recording) = $(avp(x-recording){uri.user});
			}
			
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> RECORDING]             >>> Dialog ($DLG_did) marked with dialog_id == $var(dialog_id) and dialog_calee == $avp(x-recording)\n");
			
			# Inoltra la chiamata al dispatcher
			route(MTP);
			exit;
		}

		# Check if an AOR record exists for R-URI
		cache_fetch("memcached:aor", "<$ru>", $avp(aor));
		if($avp(aor)) { $avp(registeredaor) = $avp(aor); }

		# Debug
		xlog("L_INFO", "[34m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Checking if CALLED ($avp(registeredaor)) is a local AOR\n");

		# Il chiamato non e' un AOR locale (PSTN/Trunk/Servizio).
		if(!lookup("location",,"$avp(registeredaor)")) {

			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN]              >>> CALLED IS NOT A LOCAL AOR ( $(tu{s.select,0,;}) )\n");

			# Se il chiamato non e' un local AOR ma si eccede il numero di 
			# Hop la segnalazione deve essere interrotta.
			if($avp(x-hopcount) != NULL) {
				if($(avp(x-hopcount){s.int}) > $shv(maxloopcount)) {
					# Debug
					xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Routed But Not Found\n");
					sl_send_reply("404", "Numero non trovato");
					exit;
				}
			}

			# Preleva eventuali limiti in uscita da device pool se abilitato
			if(avp_db_query("SELECT sg.name, sg.max_out_chan, sg.privileged_out_chan, s.subscriber_groups_privilege FROM subscriber AS s, subscriber_groups AS sg
					WHERE s.subscriber_groups_id=sg.id AND s.username='$avp(username)' and domain='$avp(domain)';", "$avp(gname);$avp(dpmoc);$avp(dppoc);$avp(ispriv)")) {

				# Aggiunge la chiamata in corso al profilo di
				# outbounding del gruppo
				set_dlg_profile("dpoutmark", "$avp(gname)");
				
				# Preleva le attuali dimensioni di outbounding del gruppo
				get_profile_size("dpoutmark", "$avp(gname)", "$avp(gosize)");

				# Calcola l'effettivo limite del gruppo
				$var(msize) = $(avp(dpmoc){s.int}); # Anche nel caso di utenza privilegiata
				if($(avp(ispriv){s.int})) { $var(msize) = ($(avp(dpmoc){s.int}) + $(avp(dppoc){s.int})); }

				# Controlla l'abilitazione
				if($(avp(gosize){s.int}) > $(var(msize){s.int})) {
					xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::GLIMIT]      >>> User $avp(username)@$avp(domain) exceeds $avp(gname) group oubound limits ($(avp(gosize){s.int}) of $(var(msize){s.int}))\n");
					sl_send_reply("480", "Limite risorse raggiunto");
					exit;
				} else {
					xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::GLIMIT]      >>> User $avp(username)@$avp(domain) get an outbound slot for $avp(gname) group ($(avp(gosize){s.int}) of $(var(msize){s.int}))\n");
				}
			}

			# Preleva la destinazione in base al dialplan nel database
			# e rilancia in base alla destinazione
			if(!dp_translate("$avp(domainid)","$rU/$rU","$avp(dest)")) {
				# Debug
				xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Dialed number doesn't matches dialplan\n");
				send_reply("404", "Numero non valido");
				route(CLEANER);
				exit;
			} else {
				# Debug
				xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> $avp(originalruri) translated to $ru by dialplan rule: $avp(dp_ruleid)\n");
				
				$dlg_val(xcdr_translated_called)=$rU;
			}

			# Salva nella dialog il numero chiamato
			$dlg_val(extcaller) = $avp(originalfuri);
			$dlg_val(viaheader) = $hdr(Via);
			$dlg_val(extcalled) = $rU + "|" + $avp(originalru);

			# Controlla se la numerazione digitata appartiene all'arco di emergenza
			route(EMERGENCY);

			# Controlla eventuali forward
			route(CHKFWD);
			
			# Se la chiamata attuale e' stata gia' ruotata non la ruota ulteriormente
			# Hint: Dagli endpoints locali potrebbe essere un check superfluo.
			if($hdr(X-CoreSIP-DList) && ($(avp(x-hopcount){s.int}) > $shv(maxloopcount))) {
				# Debug
				xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN][0m              >>> Call routing exceeded: $hdr(X-CoreSIP-DList) - $(avp(x-hopcount){s.int}) \n");

				# Chiude la chiamata verso l'endpoint
				t_reply("404", "Numero non trovato");
				exit;
			} else {
				# Analizza la tipologia di servizio scelta
				route(DIALPLANSWITCH);
			}

		# Il chiamato e' un AOR Locale
		} else {
			# Controlla se l'utente e' abilitato alla chiamata locale
			route(CHKDST);			

			# Crea una dialog per il telefono chiamato
			create_dialog();
			$dlg_val(uniqueid) = $avp(uniqueid);

			# Imposta la Dialog Info
			if(!$fu =~ ".*@anonymous.invalid.*") {
				# Preleva il chiamante
				if($hdr(X-CoreSIP-RegisteredUser) && $hdr(X-CoreSIP-RegisteredDomain)) {
					$avp(caller) = "sip:" + $hdr(X-CoreSIP-RegisteredUser) + "@" + $hdr(X-CoreSIP-RegisteredDomain);
					$avp(callee) = $tu;
				} else if($hdr(X-CoreSIP-Recall)) {
					$avp(callee) = "sip:" + $var(ceuprt) + "@" + $var(cedprt);
				} else {
					$avp(caller) = "sip:" + $avp(username) + "@" + $avp(domain);
					$avp(callee) = $tu;
				}
	
				dialoginfo_set();
			}

			# CDR INFO
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN]    >>> Internal call from $avp(caller) to $avp(callee) detected: producing CDR");
			$avp(xcdr_caller) = $(avp(caller){uri.user});
			$avp(xcdr_original_called) = $tU;
			$avp(xcdr_translated_called) = $(avp(callee){uri.user});
			$avp(xcdr_direction) = "INTERNAL";
			$avp(xcdr_gateway) = "";
			route(DO_CDR);
			# Preleva eventuali limiti in ingresso/uscita se i devices pools sono differenti e abilitati
			if(avp_db_query("SELECT sg.name, sg.max_out_chan, sg.privileged_out_chan, s.subscriber_groups_privilege FROM subscriber AS s, subscriber_groups AS sg
					WHERE s.subscriber_groups_id=sg.id AND s.username='$avp(username)' and domain='$avp(domain)';", "$avp(gname);$avp(dpmoc);$avp(dppoc);$avp(ispriv)")) {

				# Separa la user part dal "sip:" protocol handler
				$var(upart) = $(avp(callee){s.select,0,@});
				$var(upart) = $(var(upart){s.select,1,:});
				if(avp_db_query("SELECT sg.name, sg.max_inc_chan FROM subscriber AS s, subscriber_groups AS sg
						WHERE s.subscriber_groups_id=sg.id AND s.username='$var(upart)' and domain='$(avp(callee){s.select,1,@})';", "$avp(giname);$avp(dpmic);")) {

					# Controlla se il chiamante e il chiamato appartengono
					# allo stesso device pool
					if($avp(gname) != $avp(giname)) {
						# Aggiunge la chiamata in corso al profilo di
						# outbounding del gruppo
						set_dlg_profile("dpoutmark", "$avp(gname)");
						
						# Preleva le attuali dimensioni di outbounding del gruppo
						get_profile_size("dpoutmark", "$avp(gname)", "$avp(gosize)");
		
						# Calcola l'effettivo limite del gruppo
						$var(msize) = $(avp(dpmoc){s.int}); # Anche nel caso di utenza privilegiata
						if($(avp(ispriv){s.int})) { $var(msize) = ($(avp(dpmoc){s.int}) + $(avp(dppoc){s.int})); }
		
						# Controlla l'abilitazione
						if($(avp(gosize){s.int}) > $(var(msize){s.int})) {
							xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::GLIMIT]      >>> Caller user $avp(username)@$avp(domain) exceeds $avp(gname) group oubound limits ($(avp(gosize){s.int}) of $(var(msize){s.int}))\n");
							sl_send_reply("480", "Limite risorse raggiunto");
							exit;
						} else {
							# Aggiunge la chiamata in corso al profilo di
							# outbounding del gruppo
							set_dlg_profile("dpincmark", "$avp(giname)");
							
							# Preleva le attuali dimensioni di outbounding del gruppo
							get_profile_size("dpincmark", "$avp(giname)", "$avp(gosize)");
			
							# Controlla l'abilitazione
							if($(avp(gosize){s.int}) > $(avp(dpmic){s.int})) {
								xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::GLIMIT]      >>> Callee user $avp(callee) exceeds $avp(giname) group oubound limits ($(avp(gosize){s.int}) of $(avp(dpmic){s.int}))\n");
								sl_send_reply("480", "Limite risorse raggiunto");
								exit;
							} else {
								xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::GLIMIT]      >>> Caller user $avp(username)@$avp(domain) get an outbound slot for $avp(gname) group ($(avp(gosize){s.int}) of $(var(msize){s.int}))\n");
								xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::GLIMIT]      >>> Callee user $avp(callee) get an outbound slot for $avp(giname) group ($(avp(gosize){s.int}) of $(avp(dpmic){s.int}))\n");
							}
						}
					}
				}
			}

			# Crea il contatto riferimento per le dialog
			$var(contact) = $avp(callee);
	
			# Avvalora il profilo di inbounding
			set_dlg_profile("inbound", "$var(contact)");
	
			# Preleva il profilo chiamate per l'utente chiamato
			get_profile_size("outbound", "$var(contact)", "$avp(calledosize)");
			get_profile_size("inbound",  "$var(contact)", "$avp(calledisize)");
	
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN]              >>> CALLED IS A LOCAL AOR ( $var(contact) --> Out Calls: $avp(calledosize) In Calls: $avp(calledisize) )\n");
			$dlg_val(local_callee) = $var(contact);

	#####################################################################################
	############# Abilitare questa sezione solo se si vuole far gestire il callwaiting  #
	############# lato server                                                           #
	#####################################################################################
	#		# L'utente locale ha gia' una chiamata in corso - Non Creo la Dialog
	#		if($avp(osize) > 0 || $avp(isize) > 2) {
	#			route(DESTBUSY);
	#		} else {
	#			route(LOCAL);
	#		}
	#####################################################################################
	  #///////////////////////////////////////////////////////////////////////////////////>

			# Marchia la chiamata come locale per il Distinctive Ringtone
			$avp(fromlocal) = 1;

			# Relay verso local AOR
			route(LOCAL);
	
		}

	#####################################################################################
	#                                                                                    #
	#    CHIAMATA INIZIALIZZATA ESTERNAMENTE (Endpoint non registrato al proxy locale)   #
	#                                                                                    #
	#####################################################################################
	  #///////////////////////////////////////////////////////////////////////////////////>

	} else {

		# DEBUG
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL]    >>> CALLER IS AN EXTERNAL AOR  => From: $fu To: $ru [ $fd ]\n");

		# Creo la dialog
		create_dialog();
		$dlg_val(uniqueid) = $avp(uniqueid);

		# Controlla se nell'R-URI e' presente un db alias
		alias_db_lookup("dbaliases");

		# Controlla se la dupla chiamante/chiamato figura tra le Black List
		route(CHKRBL);

		# Controlla per eventuali speedial lato server
		route(CHKSPD);
		
		# Codice di Call Park
		$var(codepart) = $(rU{s.substr,0,$(shv(code_prk){s.len})});
		if($var(codepart) == $shv(code_prk)) {
			route(PARK);
		}

		# Enables db accounting
		if(is_from_gw()){
			$avp(xcdr_direction) = "INCOMING";
			$avp(xcdr_gateway) = $si+":"+$sp;
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL]    >>> Call coming from $si:$sp gateway detected: producing CDR\n");
			route(DO_CDR);
        }
		# Controlla se il gateway di provenienza e' tipologia PSTN(3)
		# Nel qual caso aggancia l'MTP nel flusso
		$var(ismtpgw) = 0;
		$avp(gw3)="3";
		$avp(gw13)="13";
		$avp(zeroval)="0";
		
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL]    >>> Checking frame coming from ($si:$sp):\n");

		if(
			(is_from_gw("$avp(gw3)","sp","$avp(gw_attrs)")  || is_from_gw("$avp(gw13)","sp","$avp(gw_attrs)")) ||
			(is_from_gw("$avp(gw3)","spn","$avp(gw_attrs)") || is_from_gw("$avp(gw13)","spn","$avp(gw_attrs)")) ||
			# - Questo serve perchĂ©, qualora dovesse essere richiesto l'MTP per il gateway, il primo ingresso viene corrisposto
			# - dalle is_from_gw, ma il secondo deve essere corrisposto sulle tabelle dei dispatcher
			#
			# N.B.: Il controllo della source port funziona solo con trasporto connection-less (UDP)
			# ds_is_in_list("$si", "$sp", "$avp(domainid)")
			ds_is_in_list("$si", "", "$avp(domainid)")
		) {
			# Proviene da un gateway che richiede l'MTP
			$var(ismtpgw) = 1;
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL]    >>> Incoming from known MTP Gateway ($si:$sp)\n");
		# Controlla comunque se proviene da un gateway
		# conosciuto al fine  di prelevare la  GWAttrs
		} else if(is_from_gw("$avp(zeroval)","sp","$avp(gw_attrs)") || is_from_gw("$avp(zeroval)","spn","$avp(gw_attrs)")) {
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL]    >>> Incoming from known Gateway ($si:$sp)\n");
		}

		# Implementa il CAC sul gateway e ne valida determinati campi
		if($avp(gw_attrs)) {
			# Traccia se conteggiare il canale o meno
			$var(setcounter) = 0;
		
			# Preleva i limiti del gateway
			$var(micstr) = $(avp(gw_attrs){s.select,4,,});
			$var(micval) = $(var(micstr){s.select,1,=});
		
			# Imposta l'id univoco per il riconoscimento del gateway
			$var(gwuid)  = $oP + ":" + $si + ":" + $sp;
		
			# Preleva l'impegno attuale del gateway
			get_profile_size("gwincmark", "gwmk=$var(gwuid)", "$avp(gwincsize)");

			# Preleva un eventuale preffisso da apporre per le chiamate entranti
			$var(ipxstring) = $(avp(gw_attrs){s.select,7,,});
			$var(incprefix) = $(var(ipxstring){s.select,1,=});

			# Appone il prefisso alla numerazione entrante
			if($var(incprefix)) {
				# Appende il Remote Party ID
				$avp(x-rpid) = "\"" + $fU + "\" <sip:" + $var(incprefix) + $fU + "@" + $fd + ">";
			}

			### N.B.: ######################################
			# Sostituisce la domain part con il dominio di #
			# default qualora espresso                     #
			################################################

			# Preleva il dominio di default se esistente
			$var(dfdstring) = $(avp(gw_attrs){s.select,8,,});
			$var(dfldomain) = $(var(dfdstring){s.select,1,=});

			# Salva il dominio calcolato da notificare in routing
			$avp(x-routedomain) = $var(dfldomain);
	
			# Riscrive il Remote Party ID con il dominio impostato
			if($fu =~ ".*@anonymous.invalid.*") {
				$avp(x-rpid) = "\"" + $fU + "\" <sip:" + $fU + "@" + $fd + ">";
				
				#  add the default domain, if set, also for incoming anonymous
		                if($var(dfldomain)) {
					# Sostituisce il dominio entrante se presente
					$avp(x-registeredomain) =  $var(dfldomain);
					$ru = "sip:" + $rU + "@" + $var(dfldomain);
				}

			} else if($var(dfldomain)) {
				# Sostituisce il dominio entrante se presente
				$avp(x-registeredomain) =  $var(dfldomain);
				$ru = "sip:" + $rU + "@" + $var(dfldomain);
				
				# Riscrive l'RPIID/PAI con il dominio impostato
				# Avaya WA (Introducing PAI) Riscrive il RPID/PAI con il dominio impostato 
				if($hdr(Remote-Party-ID)) { $avp(x-rpid) = $hdr(Remote-Party-ID); }
				if($hdr(P-Asserted-Identity)) { $avp(x-rpid) = $hdr(P-Asserted-Identity); }
				if($avp(x-rpid)) {
					$var(regexp) = "/(.*)?\s*<sip:(.*)@(.*)>(.*)?/\1<sip:\2@$var(dfldomain)>\4/ig";

					$avp(x-rpid) = $(avp(x-rpid){re.subst,$var(regexp)});
				} else {
					# Appone il prefisso alla numerazione entrante
					if($var(incprefix)) {
						# Appende il Remote Party ID
						$avp(x-rpid) = "\"" + $fU + "\" <sip:" + $var(incprefix) + $fU + "@" + $var(dfldomain) + ">";
					} else {
						$avp(x-rpid) = "\"" + $fU + "\" <sip:" + $fU + "@" + $var(dfldomain) + ">";
					}
				}

				# Debug
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL]    >>> Default domain: $avp(x-registeredomain) new contact: $ru / RPID: $avp(x-rpid)\n");
			}
	
			# Controllo il limite sui canali
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL]    >>> [ $var(gwuid) ] -- MiC: $var(micval) Unpriv: $var(unpriv) IncChans: $avp(gwincsize) [ Attrs: $avp(gw_attrs) ]\n");

			# Controlla se l'attuale limite e' stato superato
			if(($(avp(gwincsize){s.int}) < $(var(micval){s.int})) || ($(var(micval){s.int}) == 0)) {
				set_dlg_profile("gwincmark", "gwmk=$var(gwuid)");
			} else {
				xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> Channels resource exceeded\n");
				t_reply("480", "Blocco risorse");
				exit();
			}
		}

		# Salva il R-URI originale
		$avp(originalruri) = $ru;

		# Controlla nel database se sono presenti delle regole per la
		# trasformazione della R-URI
		if(!dp_translate("$avp(domainid)","$rU/$rU","$avp(dest)")){
			# Debug
			xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> Dialed number doesn't matches dialplan \n");
			send_reply("404", "Numero non valido");
			route(CLEANER);
			exit;
		} else {
			# Debug
			xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> $avp(originalruri) translated to $ru by dialplan rule: $avp(dp_ruleid)\n");
			$dlg_val(xcdr_translated_called)=$rU;
		}

		# Salva il contatto translato
		$dlg_val(extcalled) = $rU;

		# Controlla se nell'R-URI e' presente un db alias
		if(alias_db_lookup("dbaliases")) { $var(alias) = 1; }

		# Codice di Deviazione Boss/Secretary
		$var(codepart) = $(rU{s.substr,0,$(shv(code_bossfwd){s.len})});
		if($var(codepart) == $shv(code_bossfwd) ) {
			$var(grouppart) = $(rU{s.substr,$(shv(code_bossfwd){s.len}),0});
			if (avp_db_query("SELECT `hg`.`id`, `hg`.`group_name`, `s`.`id` FROM `hunting_group` as `hg`, `boss` AS `b`, `subscriber` AS `s`
				WHERE (`hg`.`domain_id`='$avp(domainid)' AND `hg`.`boss_secretary`=1) AND (`s`.`username`='$fU' AND `hg`.`group_name` = '$var(grouppart)')", "$avp(gpid);$avp(gpname);$avp(manid)")) {
				if($avp(gpid) != null && $(avp(gpid){s.int}) > 0) {
					avp_db_query("UPDATE `hunting_group` SET `forward_unc` = (NOT `forward_unc`), `forward_unc_target` = '$avp(gpname)' WHERE `id` = '$avp(gpid)'", "$avp(gpidret)");
					if(avp_db_query("SELECT `hg`.`forward_unc` FROM `hunting_group` as `hg` WHERE `hg`.`id` = '$avp(gpid)'", "$avp(fwdunc)")) {
						$var(entity) = "sip:" + $rU + "@" + $Ri + ":" + $Rp;
						if($avp(fwdunc) && ($(avp(fwdunc){s.int}) == 1)) {
							$var(state) = "close";
							xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> Boss/Secretary $avp(gpname) (id: $avp(gpid)) filter dectivated!\n");
						} else {
							$var(state) = "open";
							xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> Boss/Secretary $avp(gpname) (id: $avp(gpid)) filter activated!\n");
						}

						$var(command) = "/usr/bin/curl -sSf \"http://localhost:3001/notify?entity=" + $var(entity) + "&state=" + $var(state) + "&managerid=" + $avp(gpid) + "\"";
						exec("$var(command)",, "$var(stdout)", "$var(stderr)");

						xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> Boss/Secretary filter notify status: $var(stdout) - $var(stderr)\n");
					}
				}
			}

			send_reply("486", "Action done");
			drop();
			exit;
		}

		# Avvalora eventuali forward (HINT: Forward on not registered)
		route(CHKFWD);

		# Controlla se il gateway di provenienza e' tipologia
		# PSTN(3) Nel qual caso aggancia l'MTP nel flusso
		if(!($hdr(X-CoreSIP-Routed) =~ $shv(local_hostname))) {
			if($var(ismtpgw)) {
				# Debug
				xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> Requesting RTP Proxy\n");

				# Richiede il coinvolgimento dell'RTP Proxy
				$avp(x-rtpproxy) = 1;

				# Aggiunge l'header di routing.
				# Questo serve per far capire all'Asterisk di
				# ancorare l'RTP per una  chiamata  entrante.
				$avp(x-service) = "inc_rtp_anchor";

				# Ripristina il contatto originario
				$ru = $avp(originalruri);
                                
				# Invia la chiamata verso la rotta di Dispatching
#				route(MTP);
#				exit;
			} else {
			
				# Allows Loop detection when no MTP is engaged
				if($avp(x-hopcount)) {
					$avp(x-hopcount) = $(avp(x-hopcount){s.int}) + 1;
				}
			}
		}

		# Salva il contatto reale per il call Pickup
		# prima di qualunque modifica
		$avp(internalcid) = $rU;

		# Controlla se il chiamato figura tra gli Hunting Group
		route(CHKHG);

		# Controlla se il chiamato figura tra le Stanze di Conferenza
		route(CHKMME);
		
		# Controlla se il chiamato figura tra le Stanze di Conferenza
		route(CHKCFS);

		# Controlla se il chiamato figura tra le Campagne
		route(CHKCAMPAIGN);

		# Definisce il possibile contatto del chiamato locale
		$avp(registeredaor) = $ru;

		# Check if an AOR record exists for R-URI
		cache_fetch("memcached:aor", "<$ru>", $avp(aor));
		if($avp(aor)) { $avp(registeredaor) = $avp(aor); }

		# Debug
		xlog("L_INFO", "[34m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> Checking if $avp(registeredaor) is a local AOR: $avp(aor)\n");

		# Non e' una destinazione locale ma un servizio
		if (!lookup("location",,"$avp(registeredaor)")) {

			# Debug
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> $rU@$rd is not a local AOR, checking for external subscriber!\n");

#			# Controlla se il subscriber Ă¨ di tipo external
#			if(avp_db_query("SELECT is_external FROM subscriber WHERE username='$rU' AND domain='$rd'", "$avp(isexternal)")) {
#				if(($avp(isexternal) != null) && ($(avp(isexternal){s.int}) == 1)) {
#					xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> $avp(registeredaor) is an External Subscriber!\n");
#					if(!dp_translate("$avp(domainid)","$rU/$rU","$avp(dest)")) {
#						# Debug
#						xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> Dialed number doesn't matches dialplan\n");
#						send_reply("404", "Numero non valido");
#						route(CLEANER);
#						exit;
#					} else {
#						# Debug
#						xlog("L_INFO", "[32m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> $avp(originalruri) translated to $ru by dialplan rule: $avp(dp_ruleid)\n");
#						$dlg_val(xcdr_translated_called)=$rU;
#					}
#				} else {
#					t_reply("410", "Gone");
#					exit;
#				}
#			}

			# Controlla se la sorgente esterna risulta essere
			# autorizzata
			if(check_source_address("1") || is_from_gw()) {
				# Se proviene da un servizio ruotato significa che si
				# sta cercando un local AOR. In questo caso si abbatte
				# la chiamata
				if($avp(x-hopcount) != NULL) {
					#if(
					#	($(hdr(X-CoreSIP-HopCount){s.int}) > $shv(maxloopcount)) ||
					#	($hdr(X-CoreSIP-DList) == NULL && $(hdr(X-CoreSIP-HopCount){s.int}) > 0)
					#) {
					if(
						($(avp(x-hopcount){s.int}) > $shv(maxloopcount))
					) {
						# Debug
						xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL][0m    >>> Routed But Not Found\n");
						sl_send_reply("404", "Numero non trovato");
						exit;
					}
				}
	
				# Analizza la tipologia di servizio scelta
				route(DIALPLANSWITCH);
			} else {
				t_reply("403", "Non Autorizzato");
				exit;
			}
		} else {
			# Imposta la Dialog Info
			if(!$fu =~ ".*@anonymous.invalid.*") {
				$avp(caller) = "sip:" + $fU + "@" + $td;
				$avp(callee) = $avp(registeredaor);
				dialoginfo_set();
			}

			# Divide la user part dal "sip:" protocol handler
			$var(upart) = $(avp(callee){s.select,0,@});
			$var(upart) = $(var(upart){s.select,1,:});

			# Preleva eventuali limiti in ingresso del device pool se abilitato
			if(avp_db_query("SELECT sg.name, sg.max_inc_chan FROM subscriber AS s, subscriber_groups AS sg
					WHERE s.subscriber_groups_id=sg.id AND s.username='$var(upart)' and domain='$(avp(callee){s.select,1,@})';", "$avp(gname);$avp(dpmic);")) {

				# Aggiunge la chiamata in corso al profilo di
				# outbounding del gruppo
				set_dlg_profile("dpincmark", "$avp(gname)");
				
				# Preleva le attuali dimensioni di outbounding del gruppo
				get_profile_size("dpincmark", "$avp(gname)", "$avp(gosize)");

				# Controlla l'abilitazione
				if($(avp(gosize){s.int}) > $(avp(dpmic){s.int})) {
					xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXT::GLIMIT] >>> User $avp(callee) exceeds $avp(gname) group oubound limits ($(avp(gosize){s.int}) of $(avp(dpmic){s.int}))\n");
					sl_send_reply("480", "Limite risorse raggiunto");
					exit;
				} else {
					xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXT::GLIMIT] >>> User $avp(callee) get an outbound slot for $avp(gname) group ($(avp(gosize){s.int}) of $(avp(dpmic){s.int}))\n");
				}
			}

			# Salva il contatto reale per il call Pickup
			# nella dialog
			$dlg_val(bydispatchers) = "true";
			$dlg_val(viaheader)     = $hdr(Via);
			$dlg_val(internalcid)   = $avp(internalcid);

			# Crea il contatto riferimento per le dialog
			$var(contact) = $avp(callee);
	
			# Avvalora il profilo di inbounding
			set_dlg_profile("inbound", "$var(contact)");
	
			# Preleva il profilo chiamate per l'utente chiamato
			get_profile_size("outbound", "$var(contact)", "$avp(calledosize)");
			get_profile_size("inbound",  "$var(contact)", "$avp(calledisize)");

			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLAN::EXTERNAL]    >>> CALLED $ru IS A LOCAL AOR ( $var(contact) --> Out Calls: $avp(calledosize) In Calls: $avp(calledisize) )\n");

	#####################################################################################
	############# Abilitare questa sezione solo se si vuole far gestire il callwaiting  #
	############# lato server                                                           #
	#####################################################################################
	#		# L'utente locale ha gia' una chiamata in corso - Non Creo la Dialog
	#		if($avp(calledosize) > 0 || $avp(calledisize) > 2) {
	#			route(DESTBUSY);
	#		} else {
	#			route(LOCAL);
	#		}
	#####################################################################################
	  #///////////////////////////////////////////////////////////////////////////////////>

			# Relay verso local AOR
			route(LOCAL);
		}
	}
}

route[DIALPLANSWITCH] {

	# Debug
	xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLANSWITCH]        >>> Selecting action based on destination: $avp(dest) \n");

	# Analizza la tipologia di Dialplan
	if($avp(dest)) {
		# Salva i riferimenti del servizio
		$var(type)	= $(avp(dest){s.select,0,_});
		$avp(destid)	= $(avp(dest){s.select,1,_});
	} else {
		sl_send_reply("404", "Numero non valido");
		route(CLEANER);
		exit;
	}

	# Controlla per eventuali Loop
	xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DIALPLANSWITCH]        >>> Loop Preventing based on Hop Count ($avp(x-hopcount)), UniqueID ($hdr(X-CoreSIP-UniqueId)), Action ($avp(dest)) \n");

	if($hdr(X-CoreSIP-RoutingAction)) {
		if(
			( $hdr(X-CoreSIP-DList) && ($(avp(x-hopcount){s.int}) > $shv(maxloopcount)) && ($hdr(X-CoreSIP-RoutingAction) == $avp(dest))) ||
			(!$hdr(X-CoreSIP-DList) && ($(avp(x-hopcount){s.int}) > $shv(maxloopcount)) && ($hdr(X-CoreSIP-RoutingAction) == $avp(dest)))
		) {
			xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLANSWITCH][0m        >>> Loop Detected!\n");
			t_reply("404", "Numero non trovato");
			exit;
		}
	} else {
		$avp(x-destination) = $avp(dest);
	}

	# Discrimina sulla destinazione
	switch($var(type)) {
		case "intr":
			switch($avp(destid)) {
				# Chiamata abbattuta lato dialplan
				case "drop":
					xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> DIALPLANSWITCH][0m        >>> Call dropped by dialplan rule!\n");
					t_reply("406", "Chiamata rifiutata");
					exit;
				break;

				case "translation":
					# Ruota verso il contesto di Translation
					route(TRANSLATION);
				break;

				case "interoute":
					# Ruota verso il contesto di Interouting
					route(INTEROUTE);
				break;

				case "pstn":
					# Routa la richiesta verso la PSTN
					route(PSTN);
				break;

				# Ruota la richiesta verso i Servizi
				case "service":
					route(SERVICE);
				break;

				case "voicemail":
					$avp(x-servtype) = "voicemail";
					route(SERVICE);
				break;

				case "voicemail-anon":
					$avp(x-servtype) = "voicemail-anon";
					route(SERVICE);
				break;

				case "voicemailfwd":
					$avp(x-servtype) = "voicemailfwd";
					route(SERVICE);
				break;

				case "mailbox":
					$avp(x-servtype) = "mailbox";
					route(SERVICE);
				break;
				
				case "auto-conference":
					$avp(x-servtype) = "auto-conference";
					route(SERVICE);
				break;

				case "queue":
					$avp(x-servtype) = "queue-handle";
					route(SERVICE);
				break;

				case "agent":
					$avp(x-servtype) = "agent-login";
					route(SERVICE);
				break;

				case "fax":
					$avp(x-servtype) = "fax-rx";
					 route(SERVICE);
				break;
				
				case "faxfwd":
					$avp(x-servtype) = "faxfwd";
					route(SERVICE);
				break;
			} 
		break;
		case "drul":
			# Ruota la richiesta verso la rotta specifica
			route(TODRULE);
		break;

		case "drgw":
			# Ruota la richiesta verso il gateway specifico
			route(TOGW);
		break;

		case "dspt":
			# Ruota la richiesta verso la rotta specifica
			route(TODSPT);
		break;

		case "conf":
		break;

		case "hngr":
		break;

		default:	
			sl_send_reply("404", "Numero non valido");
			route(CLEANER);
			exit;
	}
}

