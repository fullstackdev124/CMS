		$avp(x-forward-destuser)   = $avp(onbusy);
		# Debug
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> CHKFWDONBUSY]          >>> User $avp(x-forward-user)@$avp(x-forward-domain) is busy, checking COS for forwarding call to $avp(x-forward-destuser)@$avp(x-forward-destdomain)\n");
		# Controlla le classi di servizio
