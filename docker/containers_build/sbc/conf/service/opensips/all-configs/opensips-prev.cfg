## Routa le chiamate tra gli OpenSIPs appartenenti al dominio.
route[INTEROUTE] {

	# Controlla che la numerazione non appartenga all'arco di emergenza
	if(!isflagset(29)) { route(EMERGENCY); }

	# Controlla le abilitazioni alla INTEROUTE
	if($hdr(X-CoreSIP-Service) || $hdr(X-CoreSIP-Routed) || check_source_address("0") || db_is_user_in("Credentials", "interoute")) {
		# Controlla le abilitazioni alla rotta
		route(CHKDST);

		# Routa La richiesta al modulo di Dynamic Routing.
		route(GATEWAYS);
		exit;
	} else {
		# Debug
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> INTEROUTE][0m             >>> USER $fu NOT AUTHORIZED to INTEROUTE rules!\n");
		send_reply("403", "Non autorizzato");
		exit;
	}

}

## Routa le chiamate verso i gateway PSTN.
route[PSTN] {
	# Controlla che la numerazione non appartenga all'arco di emergenza
	if(!isflagset(29)) { route(EMERGENCY); }

	# Controlla le abilitazioni alla PSTN
	if($hdr(X-CoreSIP-Service) || $hdr(X-CoreSIP-Routed) || check_source_address("0") || db_is_user_in("credentials", "pstn")) {
		# Controlla le abilitazioni alla rotta
		route(CHKDST);

		# Routa La richiesta al modulo di Dynamic Routing.
		route(GATEWAYS);
		exit;
	} else {
		# Debug
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> PSTN][0m                  >>> USER $fu NOT AUTHORIZED to PSTN rules!\n");
		send_reply("403", "Non autorizzato");
		exit;
	}
}

## Routa le chiamate verso i servizi definiti (MeetMe, FollowME, Voicemail, etc.).
route[SERVICE] {
	if ($hdr(X-CoreSIP-Service) || $hdr(X-CoreSIP-Routed) || check_source_address("0")|| db_is_user_in("credentials", "service")) {
		# Marchia la frame come Servizio
		$avp(x-service) = "internal_service";

		# Ripulisce da eventuali RTP Proxy in linea
		route(PURGE_PRXY);

		# Nel caso di forward su voicemail
		if($avp(x-servtype) == "voicemailfwd" && $hdr(X-CoreSIP-OrigRU)) {
			# reimposta il tipo di servizio
			$avp(x-service) = "srv_vmr_unavailable";
			$rU = $hdr(X-CoreSIP-OrigRU);
			xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> SERVICE][0m               >>> CALLER $fu forwarded to $rU voicemail by CALLED!\n");
		}

		# Nel caso di forward al servizio fax
		if($avp(x-servtype) == "faxfwd" && $hdr(X-CoreSIP-OrigRU)) {
			 # mantiene internal_service ma reimposta il tipo
			 $avp(x-servtype) = "fax-rx";	
			 $rU = $hdr(X-CoreSIP-OrigRU);
			 xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> SERVICE][0m               >>> CALLER $fu forwarded to $rU Fax by CALLED!\n");
		}


		# Routa La richiesta al modulo di Dispatching.
		route(MTP);
	} else {
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> SERVICE][0m               >>> USER $fu NOT AUTHORIZED to Service rules!\n");
		send_reply("403", "Non autorizzato");
		exit;
	}
}

## La rotta disimpegna eventuali RTP Proxy abilitati nella segnalazione
route[PURGE_PRXY] {
	if (is_dlg_flag_set("1")) {
		#rtpproxy_stop_stream2uac();
					 
		reset_dlg_flag("1");
	}
	
	if (is_dlg_flag_set("2")) {
		#rtpproxy_stop_stream2uas();
					 
		reset_dlg_flag("2");
	}
	
	if(is_dlg_flag_set("11")){
		reset_dlg_flag("11");
	} else {
		#rtpproxy_unforce();
	}
}

#####################################################################################
#                                                                                    #
#    TERZO LIVELLO DELLA LOGICA DI ROUTING (SMISTAMENTO PER SERVIZIO)                #
#                                                                                    #
#####################################################################################
  #///////////////////////////////////////////////////////////////////////////////////>

## Gestisce il routing dinamico tra i gateways
route[GATEWAYS] {
	# Controlla se l'attuale Dialog Ă¨stata ruotata da questo proxy
	# In tal caso abbatte la sessione con un NOT Found
	if($hdr(X-CoreSIP-LastGW) == $shv(local_hostname)) {
		# Debug
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> GATEWAYS][0m              >>> Already locally routed, block!\n");
		t_reply("483", "Loop detected");
		exit;
	} else {
		$avp(x-lastgw) = $shv(local_hostname);
	}

	xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> GATEWAYS][0m              >>> Lookin for gateway in domain: $avp(domainid)!\n");

	# Preleva il/i gateway/s relativi al match in dr_rules
	if(do_routing("$avp(domainid)","F",,"$avp(rule_attrs)","$avp(gw_attrs)")) {
		if(!is_myself("$rd")) {
			# Imposta la route di failure
			t_on_failure("GATEWAYS");
					
			# Controlla gli attributi impostati sul gateway
			route(CHKGWATTRS);
	
			# Rimpiazza il "To Header" con il Destination Uri
			uac_replace_to("$ru");
	
			# Richiede la rotta
			setflag(10);
	
			# Debug
			xlog("L_INFO", "[36m[$(fU{s.fill.left,'.',15}) -> GATEWAYS][0m              >>> Call from $fu routed to selected $ru gateway\n");

			# Inoltra sul gateway
			route(1);
		} else {
			# Debug
			xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> GATEWAYS][0m              >>> Possible loop detected!!\n");
			t_reply("483", "Impossibile inoltrare la chiamata");
			exit;
		}

	} else {
		# Debug
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> GATEWAYS][0m              >>> No matching gateways found!!\n");
		send_reply("404", "Numero non disponibile");
		route(CLEANER);
		exit;
	}

}

# Inoltra la chiamata verso la rotta specifica
route[TODRULE] {
	# Debug
	xlog("L_INFO", "[44m[$(fU{s.fill.left,'.',15}) -> TODRULE][0m               >>> Call-Id: $ci sent to Dynamic Rule Group: $var(id)\n");

	# Controlla le classi di servizio
	route(CHKDST);

	# Controlla che la variabile non sia gia' stata impostata
	if((!$hdr(X-CoreSIP-DList) || ($hdr(X-CoreSIP-DList) && $hdr(X-CoreSIP-Routed) != $shv(local_hostname))) && !$avp(gwlist)) { 

		# Preleva tutte le destinazioni previste per la rotta richiesta
		if(!avp_db_query("SELECT g.id, rg.`rulesId`, FIND_IN_SET(g.id, r.gwlist) AS priority FROM dr_rules 
			AS r, dr_gateways AS g, `rules_gateways` AS rg WHERE rg.`rulesId`='$avp(destid)'  
			AND rg.`gatewaysId`=g.id AND r.ruleId=rg.rulesId ORDER BY `priority` ASC", "$avp(gwid)")) {

			# Ritorna un errore
			send_reply("404", "Numero non disponibile");
			route(CLEANER);
			exit;
		} else {
			if(!$avp(gwid)) { 
				# Ritorna un errore
				send_reply("404", "Numero non disponibile");
				route(CLEANER);
				exit;
			}
		}

		# Immagazzina i Gateways ID in una variabile
		$avp(gwlist) = "";
		while($avp(gwid)) {
			# Accoda il GWID
			$avp(gwlist) = $avp(gwlist) + "" + $avp(gwid);

			# Rimuove il Gateway Attuale
			avp_delete("$avp(gwid)");

			# Se ci sono altri gateway in coda li divide con una virgola
			if($avp(gwid)) { $avp(gwlist) = $avp(gwlist) + ","; }
		}

	} else {

		# Preleva il contenuto dell'header solo se non gia'
		# impostata la lista
		if(!$avp(gwlist)) {
			$avp(gwlist) = $hdr(X-CoreSIP-DList);
		}
	
		# Controlla che non sia stato ruotato da un MTP
		# in caso affermativo non rimuove il primo gateway
		# della lista
		if(!$hdr(X-CoreSIP-Routed) && !$avp(gwlist)) {
			route(GWLISTSTRIP);
		}

	}

	# Smista alla Rotta
	route(TODRULEGW);
}

route[TODRULEGW] {

	$avp(cont) = 1;
	while($(avp(cont){s.int})) {

		# Preleva il primo GatewayID dalla Lista
		$avp(gwid) = $(avp(gwlist){s.select,0,,});

		# Preleva lo stato del Gateway. Se disabilitato passa avanti
		exec_avp("/usr/local/bin/osipsexec chk_gateway $avp(gwid)", "$avp(status)");

		# Se non raggiungibile rimuove il primo gateway dalla lista e
		# passa al successivo ... se presente
		if(!$(avp(status){s.int}) && ($avp(gwid) && $avp(gwlist))) { 
			route(GWLISTSTRIP);
			$avp(cont) = 1;
		} else {
			$avp(cont) = 0;
		}

	}
	
	# La Destinazione non e' stata trovata
	if(!$(avp(status){s.int})) {
		t_reply("404", "Non trovato");
		exit;
	}

	# Debug
	xlog("L_INFO", "[44m[$(fU{s.fill.left,'.',15}) -> TODRULEGW][0m             >>> Trying routing to gateway id: $avp(gwid)\n");

	# Preseleziona il gateway richiesto dall'ID --
	# TO DO: ADESSO ACCETTA DI DEFAULT UN LISTA DI GATEWAY SEPARATA DA VIRGOLE!!! VA ADATTATO LO SCRIPT
	if (route_to_gw("$avp(gwid)","$avp(gw_attrs)")) {

		# Debug
		xlog("L_INFO", "[38m[$(fU{s.fill.left,'.',15}) -> TODRULEGW][0m             >>> Call-Id: $ci routed through $avp(gwid) gateway for $ru\n");

		# Appende l'header di DRouting
		$avp(x-gwlist) = $avp(gwlist);

		# Imposta il flag di routing
		setflag(10);

		# Controlla gli attributi impostati sul gateway
		route(CHKGWATTRS);

		# Rimpiazza il "To Header" con il Destination Uri
		# uac_replace_to("$ru");

		# Imposta la rotta di failure
		t_on_failure("TODRULE");

		# Nel momento in cui inoltro la chiamata ad un dispatcher o a un gw,
		# eventualmente usando una drule, demando la gestione dei forward a chi sta a valle
		if($T_fr_inv_timeout{s.int} > 0) {
			$T_fr_inv_timeout = NULL;
			# DEBUG
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> TODRULEGW]             >>> Oversizing timeout to $T_fr_inv_timeout\n");
		}

		# Inoltra sul gateway
		route(1);

	} else {
		# Debug
		xlog("L_INFO", "[[31m[$(fU{s.fill.left,'.',15}) -> TODRULEGW][0m             >>> Failure to route call by $avp(gwid) gateway\n");
	}

}

# Inoltra la chiamata verso il gateway specifico
route[TOGW] {

	# Preseleziona il gateway richiesto dall'ID
	if (route_to_gw("$avp(destid)","$avp(gw_attrs)")) {

		if(!is_myself("$rd")) {
			# Richiede la rotta
			setflag(10);
	
			# Controlla gli attributi impostati sul gateway
			route(CHKGWATTRS);

			# Rimpiazza il "To Header" con il Destination Uri
			# uac_replace_to("$ru");
	
			# Nel momento in cui inoltro la chiamata ad un dispatcher o a un gw,
			# eventualmente usando una drule, demando la gestione dei forward a chi sta a valle
			if($T_fr_inv_timeout{s.int} > 0) {
				$T_fr_inv_timeout = NULL;
				# DEBUG
				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> TODRULEGW]             >>> Oversizing timeout to $T_fr_inv_timeout\n");
			}

			# Inoltra sul gateway
			route(1);
			exit;
		}

	}

	# Se nulla e' stato trovato torna un messaggio di errore
	send_reply("404", "Numero non disponibile");
	route(CLEANER);
	exit;

}

# Rimuove il primo gateway dalla lista 
route[GWLISTSTRIP] {

	$avp(cont)	= 1;
	$avp(count)	= 1;
	$avp(newgwlist)	= "";

	while($avp(cont)) {
		# Preleva il gateway successivo
		$avp(gw) = $(avp(gwlist){s.select,$avp(count),,});

		# Se e' valido costruisce la nuova lista
		if($(avp(gw){s.len}) > 0) {
			$avp(count) = $(avp(count){s.int}) + 1;
			if($avp(newgwlist)) {
				$avp(newgwlist) = $avp(newgwlist) + "," + $avp(gw);
			} else {
				$avp(newgwlist) = $avp(gw);
			}
		} else {
			# Richiede l'uscita dal while
			$avp(cont) = null;
		}
	}

	# Sostituisce la vecchia lista con la nuova
	$avp(gwlist) = $avp(newgwlist);

	if($(avp(gwlist){s.len}) > 0) {
		# Rimuove il vecchio header e lo aggiorna
		$avp(x-gwlist) = $avp(gwlist);
	
		# Ritorno
		return(1);
	} else {
		# Ritorna lo stato errato
		return(-1);
	}

}

# Controlla gli attributi impostati su uno specifico gateway
route[CHKGWATTRS] {

	# Se impostato disabilita il Trunk2Trunk su eventuali gateway
	$avp(skiptrk) = 0;
	avp_db_query("SELECT sp.`cfwd_trunk2trunk_enabled` FROM `subscriber_properties` AS sp, subscriber AS s WHERE s.`username`='$fU' AND s.`id`=sp.`subscriber_id`", "$avp(skiptrk)");

	# Traccia se conteggiare il canale o meno
	$var(setcounter) = 0;

	# Preleva i limiti del gateway
	$var(mocstr) = $(avp(gw_attrs){s.select,5,,});
	$var(opcstr) = $(avp(gw_attrs){s.select,6,,});
	$var(mocval) = $(var(mocstr){s.select,1,=});
	$var(opcval) = $(var(opcstr){s.select,1,=});

	# Imposta l'id univoco per il riconoscimento del gateway
	$var(gwuid)  = $rP + ":" + $rd + ":" + $rp;

	# Calcola il numero di canali non privilegiati
	$var(unpriv) = $(var(mocval){s.int}) - $(var(opcval){s.int});

	# Preleva l'impegno attuale del gateway
	get_profile_size("gwoutmark", "gwmk=$var(gwuid)", "$avp(gwoutsize)");

	# Debug
	xlog("L_INFO", "[33m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> [ $var(gwuid) ] -- MoC: $var(mocval) oPC: $var(opcval) Unpriv: $var(unpriv) OutChans: $avp(gwoutsize)\n");
	xlog("L_INFO", "[33m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> [ $var(gwuid) ] -- [ T2T: $avp(skiptrk) - Attrs: $avp(gw_attrs) ]\n");

	# Controlla se l'attuale limite e' stato superato
	if(($(avp(gwoutsize){s.int}) < $var(unpriv)) || ($var(unpriv) == 0)) {
		$var(setcounter) = 1;
	} else {
		# Controlla i limiti per un'utenza privilegiata
		avp_db_query("SELECT sg.`id` FROM `subscriber_gateways` AS sg, subscriber AS s WHERE sg.`id`='$avp(gw_id)' AND s.`id`=sg.`subscriber_id`", "$avp(priv)");

		if($avp(priv) && ($(avp(gwincsize){s.int}) < $(var(mocval){s.int}))) {
			$var(setcounter) = 1;
		} else {
			# Debug
			xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> Channels resource exceeded\n");
			t_reply("483", "Blocco risorse");
			exit();
		}
	}

	# Controlla se il gateway ha il trasporto TCP
	$avp(x-proto) = $proto;
	if($avp(gw_attrs) =~ ".*TCP=1.*" && $proto != "tls") {
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> Setting transport as TCP!\n");
		setflag(28);
	} else {
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> Reverting transport to $proto!\n");
	}

	# Controlla se le chiamate TRK2TRK devono essere bloccate
	# dal gateway selezionato.
	if(
		(($avp(gw_attrs) =~ ".*FBRIDGE=0.*") && ($(avp(skiptrk){s.int}) == 0)) ||
		(($avp(gw_attrs) =~ ".*FBRIDGE=1.*") && ($(avp(skiptrk){s.int}) == 0)) ||
		($(avp(skiptrk){s.int}) == 0)
	) {

		# Get PSTN External Calls Profile Size
		$avp(tmp) = "sip:" + $avp(originalfu) + "@" + $td;
		get_profile_size("extcall", "$avp(tmp)", "$avp(extsize)");

		# Preleva dalle precedenti dialog l'altro contatto chiamato
		if($(avp(extsize){s.int}) > 1) {
			if(get_dialog_info("extcalled", "$avp(extcalled)", "extcaller", "$avp(tmp)")) {
				if($avp(originalru) =~ ".*$avp(extcalled).*") {
					avp_delete("$avp(extcalled)");
				}
			}
		}

		if($avp(extcalled)) {

			# Controlla se vi sono Call Classess associate alla chiamata
			if(avp_db_query(
				"SELECT MAX( `internal` ) AS `internal` FROM cos_view WHERE '$rU' RLIKE `regexp` AND username = '$var(user)' AND domain = '$var(domain)'
				 GROUP BY username, domain", "$avp(x-cos-internal)"
			)) {
				# Controlla che la tipologia di chiamata effettuata non sia interna
				if($(avp(x-cos-internal){s.int}) == 0) {
	
					# Se il numero di chiamate esterne eccede il limite blocca
					if(!$(avp(extsize){s.int}) > 1) {
						set_dlg_profile("extcall", "$avp(tmp)");
					} else {
						# Debug
						xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> TRK2TRK calls [31m($avp(extcalled) and $rU)[0m not allowed on this gateway for [31m$avp(username)@$avp(domain)[0m\n");
						t_reply("403", "Non autorizzato");
						exit;
					}
				}
			} else {
				# Debug
				xlog("L_INFO", "[33m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS]            >>> No TRK2TRK matching on previous dialog based on $avp(key)/$avp(value) couple!!![0m\n");
			}
		}
	}

	# Controlla se l'MTP e' necessario
	if($avp(gw_attrs) =~ ".*MTP=1.*") {
		# La dialog non e' ruotata da alcun MTP
		if(!$hdr(X-CoreSIP-Routed)) {
			# Debug
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> MTP Requested for $ru (restoring contact) - $Ri\n");

			# Ripristina il Remote URI
			$ru = $avp(originalruri);
			
			# Sostituisce il contatto
			uac_replace_from("", "$avp(originalfuri)");
			
			# Ruota al Dispatcher
			$avp(x-service) = "out_rtp_anchor";
			route(MTP);
			exit;
		} else {
			# Coinvolge l'RTP Proxy
			$avp(x-rtpproxy) = 1;

			# Debug
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> Requesting RTP Proxy\n");
		}
	}

	# Controlla se le chiamate inoltrate sul gateway richiedono la 
	# rescrittura del caller ID
	if($avp(gw_attrs) =~ ".*USRCID=1.*") {
		# Avvalora l'utente da controllare
		$var(user) = $fU;
		if($hdr(X-CoreSIP-RegisteredUser)) { $var(user) = $hdr(X-CoreSIP-RegisteredUser); }

		# Debug
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> Checking if user $var(user) / $td needs for caller id presentation\n");
		
		# Preleva la tipologia di numerazione digitata 
		if(avp_db_query("SELECT cid FROM subscriber WHERE username='$var(user)' AND domain='$td'", "$avp(x-cid)")) {

			if(($avp(x-cid) != null) && ($(avp(x-cid){s.len}) > 0)) {
				# Numerazione Nascosta
				if($avp(x-cid) =~ "private") {
					if($hdr("Remote-Party-ID")) { remove_hf("Remote-Party-ID"); }
					if($hdr("Privacy")) { remove_hf("Privacy"); }
	
					# Rimpiazza il caller-ID in Privacy-Mode
					uac_replace_from("Anonymous", "sip:anonymous@anonymous.invalid");
	
					# Aggiorna il Remote Party ID
					$avp(x-rpid) = "\"Anonymous\" <sip:anonymous@anonymous.invalid>;party=calling;privacy=full;screen=no";
					
					# Debug
					xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> Private caller id detected!\n");
	
				} else if(!$hdr(Privacy) || $hdr(Privacy) == "none") {
					# Modifico il contatto di presentazione con il caller-ID
					# Impostato nelle User Preferences.
					$var(did) = $(avp(x-cid){s.select,0,-});
					if(!$var(did)) { $var(did) = ""; }
					$var(pfx) = $(avp(x-cid){s.select,1,-});
					if(!$var(pfx)) { $var(pfx) = ""; }
					$var(dmn) = $shv(default_domain);
	
					# Preleva il dominio di Registrazione se Presente
					if($hdr(X-CoreSIP-RegisteredDomain) != NULL) {
						$var(dmn) = $hdr(X-CoreSIP-RegisteredDomain);
					}
	
					# Rimpiazza il From
					$avp(x-rpid) = "\"" + $var(did) + $var(pfx) + "\" <sip:" + $var(did) + $var(pfx) + "@" + $var(dmn) + ">";
	
					# Debug
					xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> Public caller id detected: $avp(x-rpid)\n");
	
					$avp(x-privacy-ct) = $var(did)+$var(pfx);
					$avp(x-privacy-from) = $var(did)+$var(pfx)+"@"+$var(dmn);
				}
			}
		}
	}
		
	if($avp(gw_attrs) =~ ".*CDC=.*") {
		# Preleva la codec list
		$var(codeclist) = $(avp(gw_attrs){s.select,9,,});
		$var(codeclist) = $(var(codeclist){s.select,1,=});
		
		# Debug
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> Gateway Allowed Codecs List: $var(codeclist)\n");
		
		# Preleva il primo codec dalla lista
		$var(count) = 0;
		$var(codec) = $(var(codeclist){s.select,$var(count),:});
		
		# Costruisce la codec mask
		$var(codecmask) = "";
		while($var(codec))  {

			$var(map) = "";
			switch($var(codec)) {
				case "0":
					if(codec_exists("PCMU")) { $var(map) = "PCMU"; if($var(count) == 0) {codec_move_up("PCMU");} else {codec_move_down("PCMU");}}
				break;
				case "3":
					if(codec_exists("GSM") ) { $var(map) = "GSM" ; if($var(count) == 0) {codec_move_up("GSM") ;} else {codec_move_down("GSM") ;}}
				break;
				case "4":
					if(codec_exists("G723")) { $var(map) = "G723"; if($var(count) == 0) {codec_move_up("G723");} else {codec_move_down("G723");}}
				break;
				case "8":
					if(codec_exists("PCMA")) { $var(map) = "PCMA"; if($var(count) == 0) {codec_move_up("PCMA");} else {codec_move_down("PCMA");}}
				break;
				case "9":
					if(codec_exists("G722")) { $var(map) = "G722"; if($var(count) == 0) {codec_move_up("G722");} else {codec_move_down("G722");}}
				break;
				case "18":
					if(codec_exists("G729")) { $var(map) = "G729"; if($var(count) == 0) {codec_move_up("G729");} else {codec_move_down("G729");}}
				break;
				case "31":
					if(codec_exists("H261")) { $var(map) = "H261"; if($var(count) == 0) {codec_move_up("H261");} else {codec_move_down("H261");}}
				break;
				case "34":
					if(codec_exists("H263")) { $var(map) = "H263"; if($var(count) == 0) {codec_move_up("H263");} else {codec_move_down("H263");}}
				break;
			}
			# Debug
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> Codec: $var(codec) Map: $var(map)\n");
	
			if($(var(map){s.len}) > 0) {
				$var(codecmask) = $var(map) + "|" + $var(codecmask);
			}
			
			# Preleva il codec successivo
			$var(count) = $var(count) + 1;
			$var(codec) = $(var(codeclist){s.select,$var(count),:});
		}
		
		# Rimuove i codec se non presenti
		if($(var(codecmask){s.len}) > 0) {
			# Strip last pipe
			# $var(reg) = "/\|$//g";
			# $var(codecmask) = $(var(codecmask){re.subst,$var(reg)});
			
			# Evita di rimuovere il payload type 101 - DTMF
			$var(codecmask) = $var(codecmask) + "telephone-event";
			
			# Debug
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS][0m            >>> Removing Codec: $var(codecmask)\n");
			
			# Rimuove tutti i codec precedenti tranne quello
			# appena prelevato dalla lista
			codec_delete_except_re("$var(codecmask)");
		}
	}

	if($avp(gw_attrs) =~ ".*USRCID=0.*") {
                # Debug
                xlog("L_INFO", "^[[31m[$(fU{s.fill.left,'.',15}) -> CHKGWATTRS]^[[0m            >>> Removing presentation headers!\n");
                $avp(x-rpid-override) = 1;
        }

	# Aggiorna il counter dei canali in uscita sul gateway impegnato
	if($(var(setcounter){s.int}) > 0) {
		set_dlg_profile("gwoutmark", "gwmk=$var(gwuid)");
	}
}

failure_route[BS] {
	# DEBUG
	xlog("L_INFO", "[39m[$(fU{s.fill.left,'.',15}) -> BS FALLBACK][0m           >>> Boss Secretary fallback from $fu to $ru --- AAAAAAAAAAAAH \n");
}

# Failure route per il preselezionamento del gateway successivo
failure_route[TODRULE] {

	# DEBUG
	xlog("L_INFO", "[39m[$(fU{s.fill.left,'.',15}) -> TODRULE FALLBACK][0m      >>> Dynamic Routing Group fallback from $fu to $ru --- $avp(gwlist) \n");

	# Esce su determinati stati.
	# La mappatura e' basata sulle specifiche ISUP-to-SIP cause code map
	# https://tools.ietf.org/html/rfc3398 -- Paragrafo 7.2.4.1
	if (t_check_status("50[0-4]|408|48[248]")) {

		if (t_was_cancelled()) {
			t_reply("404", "Non trovato");
			exit;
		}

		# Strippa il gateway fallito dalla lista
		route(GWLISTSTRIP);

		# Elabora il return code della rotta GWLISTSTRIP
		switch($retcode) {

			case 1:
				route(TODRULE);
			break;

			default:
				t_reply("404", "Non trovato");
		}
	# Accetta i trasferimenti se provenienti
	# da una sorgente abilitata
	} else if(t_check_status("302")) {
		if(check_source_address("1")) {
			#t_relay();
			route(1);
		}
	} else if(t_check_status("[46]04")) {
		t_reply("404", "Non trovato");
	} else if(t_check_status("480")) {
		t_reply("480", "Non disponibile");
	} else if(t_check_status("486")) {
		t_reply("486", "Occupato");
	} else {
		t_reply("604", "Non trovato");
	}

	exit;
}

# Failure route per il preselezionamento del gateway successivo
failure_route[GATEWAYS] {
	# DEBUG
	xlog("L_INFO", "[39m[$(fU{s.fill.left,'.',15}) -> GATEWAYS FALLBACK][0m     >>> Gateway route fallback from $fu to $ru\n");

	# Notifica solo se le destinazioni sono locali
	if(avp_db_query("SELECT username FROM location WHERE username='$rU'", "$avp(found)")) {
		exec_avp("/usr/local/bin/osipsexec notifyall '$rU' '$shv(default_domain)' terminated '$shv(local_hostname)'", "$avp(ret)");
	}

	# Transazione Cancellata
	if (t_was_cancelled()) {
		# Set Call Setup time if not already done
		if(!$avp(x-callsetup)) {
			$var(ts)  = $Ts;
			$var(tsm) = $Tsm;
			$var(tsm) = $(var(tsm){s.fill.left,0,6});
			$var(ts)  = $(var(ts){s.escape.common});
			$var(tsm) = $(var(tsm){s.escape.common});
			$avp(x-callsetup) = $var(ts) + "" + $var(tsm);
			$dlg_val(x-callsetup) = $avp(x-callsetup);

			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> GATEWAYS FALLBACK]     >>> Call setup time: $avp(x-callsetup)/$var(ts)/$var(tsm) on reply code: $rs");;
		} else {
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> GATEWAYS FALLBACK]     >>> Call setup already written!\n");
		}

		# DO_CDR
		# Recupera il valore dell'ultima translation effettuata in dialplan per le dialog aventi questo stesso uniqueid
		if(get_dialog_info("xcdr_translated_called","$avp(xcdr_translated_called)","uniqueid","$avp(uniqueid)")){
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> ONREPLY]               >>> Translation detected from $avp(xcdr_original_called) to $avp(xcdr_translated_called) on uniqueid $avp(uniqueid)");
			$acc_extra(xcdr_translated_called) = $avp(xcdr_translated_called);
        }
		# Debug
		xlog("L_INFO", "[33m[$(fU{s.fill.left,'.',15}) -> GATEWAYS FALLBACK][0m     >>> Transaction Cancelled by $fu\n");
		send_reply("487", "Chiamata Terminata");
		exit;
	}

	# Esce su determinati stati
	if (t_check_status("403")) {
		send_reply("403", "Non autorizzato");
		exit;
	} else if (t_check_status("[46]04")) {
		send_reply("404", "Non trovato");
		exit;
	} else if(t_check_status("480|486|600")) {
		# Controlla se abilitare il richiamo automatico
		# per l'evento di non risposta
		if(is_from_local()) {
			# Ripristina il Remote URI
			$ru = $avp(originalruri);
			route(RECALL);
		}
		
		# Set Call Setup time if not already done
		if(!$avp(x-callsetup)) {
			$var(ts)  = $Ts;
			$var(tsm) = $Tsm;
			$var(tsm) = $(var(tsm){s.fill.left,0,6});
			$var(ts)  = $(var(ts){s.escape.common});
			$var(tsm) = $(var(tsm){s.escape.common});
			$avp(x-callsetup) = $var(ts) + "" + $var(tsm);
			$dlg_val(x-callsetup) = $avp(x-callsetup);
			
			# Debug
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> GATEWAYS FALLBACK]     >>> Call setup time: $avp(x-callsetup)/$var(ts)/$var(tsm) on reply code: $rs");;
		}
		
		# DO_CDR
		# Recupera il valore dell'ultima translation effettuata in dialplan per le dialog aventi questo stesso uniqueid
		if(get_dialog_info("xcdr_translated_called","$avp(xcdr_translated_called)","uniqueid","$avp(uniqueid)")){
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> ONREPLY]               >>> Translation detected from $avp(xcdr_original_called) to $avp(xcdr_translated_called) on uniqueid $avp(uniqueid)");
			$acc_extra(xcdr_translated_called) = $avp(xcdr_translated_called);
		}
		send_reply("486", "Occupato");
		exit;
	} else if (t_check_status("502")) {
		send_reply("502", "Servizio rifiutato");
		exit;
	}

	# DEBUG
	xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> GATEWAYS FALLBACK][0m     >>> Looking for another gateway availability\n");

	# Preleva il gateway successivo se esiste
	if (use_next_gw("$avp(rule_attrs)","$avp(gw_attrs)")) {
		# Imposta la rotta di fallback
		t_on_failure("GATEWAYS");

		# Relay
		route(1);
	} else {
		# DEBUG
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> GATEWAYS FALLBACK][0m     >>> No other gateways found\n");
		# Altrimenti Esce dal routing
		t_reply("404", "Numero non disponibile");
		route(CLEANER);
	}

	exit;
}

## Smista le richieste verso le risorse MTP
route[MTP] {
	# Debug
	xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> MTP][0m                   >>> Injecting Call-Id $ci to a media termination point ($si:sip -> $fu/$hdr(Contact) to $ru)\n");

	# Se la richiesta proviene da un local AOR salva il contatto originario
	# e incrementa il call counting prima di inoltrarlo all'MTP.
	# Questo serve per evitare di perdersi il contatto originario che verra'
	# riscritto con quello dell'MTP selezionato
	if(is_from_local()) {
		# Salva il contatto originale prima di inviare la chiamata al dispatcher
		# $avp(x-origcallerct) = $(ct.fields(uri){s.select,0,;});
		$avp(x-origcallerct) = $hdr(Contact);

		# Crea una dialog se ancora non esiste
		if (!match_dialog() ) {
			create_dialog();
		}

		# Incrementa il profilo di outbound
		$var(contact) = "sip:" + $fU + "@" + $td;
		set_dlg_profile("outbound", "$var(contact)");
	}
	
	# Imposta l'id di ricerca dei dispatcher (basato su protocollo e id dominio)
	$var(dspt_sel) = $proto + " : " + $avp(domainid);

	# Debug
	xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> MTP][0m                   >>> Looking for $var(dspt_sel) key availability ... ");

	# Preleva il prossimo dispatcher in lista disponibile
	if(ds_select_dst("$proto:$avp(domainid)", "8")) {
		# Se non richiesta da Rule armo la rotta di failure
		if(!isflagset(10)) {
			t_on_failure("MTP");
		}

		# Send Trying for Progress Purpose
		sl_send_reply("100", "Trying");

		# Se presente un timeout lo incrementa per evitare il CANCEL
		if($T_fr_inv_timeout{s.int} > 0) {
			$T_fr_inv_timeout = NULL;
			# DEBUG
			xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> MTP][0m                   >>> Oversizing timeout to $T_fr_inv_timeout\n");
		}

		# Marchia la dialog come transitata su dispatcher
		$dlg_val(was_dsptched) = $hdr(Contact);
		set_dlg_profile("mtp", "fu=$fu;ru=$ru");
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> MTP][0m                   >>> [31mFlagged dialog by $dlg_val(was_dsptched)[0m\n");
		$avp(x-dspt) = 1;

		# Fa il relay della frame
		route(1);
	} else {
		send_reply("404", "No valid mtp found");
		route(CLEANER);
		exit;
	}
}

# Inoltra la chiamata verso lo specifico mtp
route[TODSPT] {
	if(avp_db_query("SELECT destination FROM dispatcher WHERE id='$avp(destid)'", "$avp(dspt)")) {
		# Preleva la destinazione senza il protocollo
		$var(dest) = $(avp(dspt){s.substr,4,0});

		# Debug
		xlog("L_INFO", "[35m[$(fU{s.fill.left,'.',15}) -> TO_MTP][0m                >>> Call-Id $ci sent to a dispatcher by dialplan target. From $fu to $ru ($var(id) - $var(dest))\n");

		# Riscrive la destinazione
		rewritehostport("$var(dest)");

		sl_send_reply("100", "Trying");
		route(1);
	} else {
		send_reply("404", "Numero non disponibile");
		route(CLEANER);
		exit;
	}
}

# Innsesca la ricerca dell'mtp successivo
failure_route[MTP] {
	# DEBUG
	xlog("L_INFO", "[39m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> Dispatcher route fallback from $fu to $ru \n");

	# Imposta lo stato di uscita
	$var(exit) = 0;

	# Controlla gli stati tornati
	if(t_check_status("403")) {
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> Destination not authorized!!!\n");
		t_reply("403", "Non autorizzato");
		$var(exit) = 1;
	} else if(t_check_status("[46]04")) {
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> Destination not found!!!\n");
		t_reply("404", "Non trovato");
		$var(exit) = 1;
	} else if(t_check_status("408")) {
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> Destination not found!!!\n");

		# Controlla se e' presente la voicemail su timeout
		t_reply("408", "Utente non disponibile");

		# Scrive nel log lo stato di timeout e ritorna
		if($T_fr_inv_timeout) {
			xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> Timed out\n");
			return;
		}

		$var(exit) = 1;
	} else if(t_check_status("487")) {
		xlog("L_INFO", "[33m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> Abandoned Call!!!\n");

		# Controlla se e' stato effettuato un pickup altrimenti
		# ritorna il codice corretto di chiusura
		route(CHKPCK);

		# Genera una nuova transazione e ritorna senza inoltrare
		# il codice 487
		t_reply("100","Trying");
		return;
	} else if(t_check_status("480")) {
		xlog("L_INFO", "[33m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> User DND!!!\n");
		t_reply("480", "Non disponibile");
		$var(exit) = 1;
	} else if(t_check_status("486")) {
		xlog("L_INFO", "[33m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> User Busy!!!\n");

		if($hdr(User-Agent) =~ "^[P|p]atton.*JS.*FXS.*") {
			xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> FXS: Check RECALL on Busy\n");
			route(RECALL);
		}

		t_reply("486", "Occupato");

		$var(exit) = 1;
	} else if(t_check_status("502")) {
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> Bad Gateway!!!\n");
		t_reply("502", "Bad Gateway");
		$var(exit) = 1;
	} else if(t_check_status("5[08][02]")) {
		# Debug
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> $rs Error: get next destination (INVALID FLAG: YES)\n");

		# Markia il dispatcher come non valido
		ds_mark_dst("p");
	} else if(t_check_status("603")) {
		xlog("L_INFO", "[31m[$(fU{s.fill.left,'.',15}) -> MTP FALLBACK][0m          >>> Call Declined!!!\n");
		t_reply("603", "Chiamata rifiutata");
		$var(exit) = 1;
	}

	# Pulisce in caso di uscita
	if($(var(exit){s.int}) == 1) {
		route(CLEANER);
		exit;
	}

	# Seleziona il dispatcher successivo
	if(!ds_next_dst()) {
		send_reply("404", "Non trovato");
		exit;
	}
	
	# Riarma la rotta di failure
	t_on_failure("MTP");
	
	# Inoltra la transazione verso il nuovo dispatcher
	#t_relay();
	route(1);

	# Altrimenti interrompe lo script
	exit;
}

## La route[LOADBALANCE] preleva dal db, tramite il modulo di loadbalancing, un host in grado di servire
## la sessione in base alla disponibilita'.
route[LOADBALANCE] {
	# DEBUG
	xlog("L_INFO", "[39m[$(fU{s.fill.left,'.',15}) -> LOADBALANCE][0m           >>> Call-Id $ci sent do a Load Balancer from $fu to $ru \n");

	# Trying load balancing - retrieve capable host
	load_balance("1", "conf");

	# Check if load_balance get successfully
	if ($retcode < 0) {
		 sl_send_reply("500", "Service full");
		 exit;
	}

	# Trying to Relay
	if (!t_relay()) {
		sl_reply_error();
	}
}

## Gestisce gli eventi di presenza e di Instant Messaging
route[PRESENCE] {

	$var(xmpp2sip) = "sip:.+@xmpp." + $shv(default_domain);
	$var(sip2xmpp) = "sip:.+@" + $shv(default_domain) + ":0";

	# Effettua le conversioni di dominio da XMPP a SIP
	if($ru =~ "sip:.+@xmpp.imagicle.com") {
		# Normalizza il contatto -- Molti device SIP non gestiscono
		# la risorsa dell'XMPP
		subst('/^Contact:(.*)@(.*)\/.+$/Contact: sip:\1@\2/ig');
		# Modifica il dominio di inoltro
		$ru = "sip:" + $rU + "@" + $shv(default_domain);
	# Effettua le conversioni di dominio da SIP a XMPP
	} else if($ru =~ "sip:.+@imagicle.com:0") {
		# Modifica il dominio di inoltro
		$ru = "sip:" + $rU + "@" + $shv(default_domain);
	}
	
	# Gestisce la segnalazione di presence
	if (is_method("PUBLISH|SUBSCRIBE|NOTIFY")) {

		# Absorb Retransmissions
		if (!t_newtran()) {
			sl_reply_error();
			exit;
		}
		
		# Gestisce la NOTIFY
		if (is_method("NOTIFY")) {

			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> PRESENCE]              >>> Handling notify message\n");

#			# Cerca di inviare la notify anche al server XMPP
#			if(pua_xmpp_notify()) {
#				sl_send_reply("200", "OK");
#			} else {
#				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> PRESENCE]              >>> Unable to update remote contact\n");
#			}

			# Handle Avaya Refer Event Packages - Senza questo le trasferte non rilascerebbero
			# il "trasferente" dalla chiamata.
			if($shv(avayaenabled))
			if($hdr(User-Agent) =~ "^Avaya.*" && $hdr(Event) == "refer") {
				t_relay();
				exit;
			}
			
			# Aggiorna il contatto
			if(lookup("location")) {
				# Inoltra la transazione
				if(!t_relay()) { sl_send_reply("500", "Unable to relay notify"); }
			
				pua_update_contact();
			} else {
				t_reply("404", "Non Trovato");
			}
		} else if (is_method("PUBLISH")) {
			if ($hdr(Sender) != NULL) {
				handle_publish("$hdr(Sender)");
			} else {
				handle_publish();
			}
		} else if(is_method("SUBSCRIBE")) {
			# Handle Avaya SUBSCRIBE Packages
			if($shv(avayaenabled))
			if($hdr(User-Agent) =~ "^Avaya.*" && $hdr(Event) != "dialog" && $hdr(Event) != "message-summary") {
				if(
					$hdr(Event) == "avaya-cm-feature-status" || $hdr(Event) == "avaya-ccs-profile" || 
					$hdr(Event) == "reg" || $hdr(Event) == "presence.winfo" ||
					$hdr(Event) == "dialog"
				) {

					# Retrieving AV-Global-Session-Id, Contact Infos and Append IT
					# to signaling for Avaya PPM Emulator
					cache_fetch("memcached:aor", "avgsid_$fu", $avp(x-avgsid));
					cache_fetch("memcached:aor", "avctreg_$fu", $avp(x-avctreg));
					
					# Attach Av-Global-Session-Id to request
					append_hf("Av-Global-Session-Id: $avp(x-avgsid)\r\n", "Contact");
					append_hf("X-PPMEmulator-CTInfo: $avp(x-avctreg)\r\n", "Contact");
					
					# Set remote PPM Emulator
					$du = $shv(avayappmserver);
					
					# Try dispatching presence Prame
					if (!t_relay()) {
						sl_reply_error();
						
						# Ritorna un valore negativo
						return(-1);
					}
				} else {
					# An unhandled event income
					t_reply("500", "Avaya Service Not Found");
				}
					
				# Drop Transaction
				drop;
#			} else if($hdr(User-Agent) =~ "^Cisco-CUCM.*") {
#				# Debug
#				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> PRESENCE]              >>> Subscribing Cisco Service\n");
#
#				# Set remote PPM Emulator
#				$du = $shv(avayappmserver);
#					
#				# Try dispatching presence Prame
#				if (!t_relay()) {
#					sl_reply_error();
#					
#					# Ritorna un valore negativo
#					return(-1);
#				}
#
#				drop;
			}

			# Gestisce la subscribe del telefono
			handle_subscribe();
			
			# Cerca di inoltrare l'evento di SUBSCRIBE al server XMPP
			if($hdr(Event)== "presence") { pua_xmpp_req_winfo("$ruri", "$hdr(Expires)"); }
		}
			
		# Termina altre possibili transazioni
		exit;

	} else if (is_method("MESSAGE")) {
		# DEBUG
		# xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> PRESENCE]              >>> MESSAGE Incoming from $fu to $ru ($si:$sp)\n$mb\n");
		# Tenta l'invio XMPP server solo se non
		# proviene dal dominio XMPP
		if(!$td =~ "xmpp\..*") {
			if (xmpp_send_message()) {
				t_reply("200", "Accepted");
			} else {
				t_reply("404", "Not found");
			}
		}
		
		# Cerca il contatto tra i local AOR
		if (!lookup("location")) {
			sl_send_reply("404", "Not found");
			return(0);
		}
		
		t_relay();
		return(0);
	}
}

