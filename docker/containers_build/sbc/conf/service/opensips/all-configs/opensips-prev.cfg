## Definisce il Server Header
server_header = "Server: {{INSTANCE_NAME}}_SBC ({{INSTANCE_NAME}})"

## Definisce lo User Agent
user_agent_header = "User-Agent: {{INSTANCE_NAME}}_SBC ({{INSTANCE_NAME}})"

