####### Global Parameters #########
log_level=3
log_name="sbc"
log_stderror=no
log_facility=LOG_LOCAL0

# ----------------------------------------  HINT!!!!
# Questo parametro abilita automaticamente il debug:
# non serve impostarlo ad off, 0 o null ... basta la
# presenza non commentata nello script per abilitare
# la modalita' verbosa.
#
# debug_mode=on

# Multi Homed Option
mhomed=1

# How many children to starts
children=10

# Only for debug purpose: add a warnings on reply sip messages.
# sip_warning=1

# TOS for DSCP Qos: Just enable when needed 
# tos=0x60

/* uncomment the next line to enable the auto temporary blacklisting of 
   not available destinations (default disabled) */
#disable_dns_blacklist=no

/* uncomment the next line to enable IPv6 lookup after IPv4 dns 
   lookup failures (default disabled) */
#dns_try_ipv6=yes

/* uncomment the next line to disable the auto discovery of local aliases
   based on revers DNS on IPs (default on) */
#auto_aliases=no

## Disable DNS Resolving
dns = no
rev_dns = no
check_via = no

## Listening Protocol/Interface/Port
listen=udp:voip.{{INSTANCE_DOMAIN}}:{{ADVERTISED_SIP_UDP_PORT}}
listen=tcp:voip.{{INSTANCE_DOMAIN}}:{{ADVERTISED_SIP_TCP_PORT}}
listen=tls:voip.{{INSTANCE_DOMAIN}}:{{ADVERTISED_SIP_TLS_PORT}}

# listen=udp:unigateip.{{INSTANCE_DOMAIN}}:5060

# XMPP Alias
alias=xmpp.{{INSTANCE_DOMAIN}}

######### SIP Identity #########
