####### Global Parameters #########

log_level=3
log_stderror=no
log_facility=LOG_LOCAL0

children=10
auto_aliases=no

## Listening Protocol/Interface/Port
listen=udp:*:{{ADVERTISED_SIP_UDP_PORT}}
listen=tcp:*:{{ADVERTISED_SIP_TCP_PORT}}
listen=tls:*:{{ADVERTISED_SIP_TLS_PORT}}

advertised_address={{HOST_IP}}
advertised_port={{ADVERTISED_SIP_UDP_PORT}}

# listen=udp:unigateip.{{INSTANCE_DOMAIN}}:5060

# XMPP Alias
alias=xmpp.{{INSTANCE_DOMAIN}}

######### SIP Identity #########
