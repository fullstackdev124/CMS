####### Routing Logic ########

# main request routing logic
route {

	if ($ml > $shv(maxurilen)) {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DROP]                  >>> [32mMessage size exceeded from $si:$sp[0m\n");
		sl_send_reply("513", "Message Overflow");
		return;
	}

	if (!mf_process_maxfwd_header("10") && $retcode == -1) {
		sl_send_reply("483", "Too Many Hops");
		exit;
	}

	if ($rU == NULL) {
		if (is_method("OPTIONS")) {
			options_reply();
		} else {
			sl_send_reply("484", "Address Incomplete");
		}
		exit;
	}

	# Define Main Variables
	$avp(X-CALLID) = $ci;
	$avp(X-USERAGENT) = $ua;
	$avp(X-CONTACT) = $ct;
	$avp(X-URI) = $ru;
	$avp(X-UURI) = $rU;
	$avp(X-CSEQ) = $cs;
	$avp(X-PROTOCOL) = $pr;
	$avp(X-SOURCEIP) = $si;
	$avp(X-SOURCEPORT) = $sp;
	$avp(X-DESTIP) = $Ri;
	$avp(X-DESTPORT) = $Rp;
	$avp(X-FROMUSER) = $fU;
	$avp(X-TOUSER) = $tU;

	if (check_source_address("1","$avp(trunk_attrs)") ) {
		setflag(IS_TRUNK);
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> INCOMING]              >>> [31m$si:$sp is a whitelisted entity[0m\n");
	} else if ( is_from_gw() ) {
		setflag(IS_TRUNK);
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> INCOMING]              >>> [31m$si:$sp is a known gateway[0m\n");
	} else {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> DROP]                  >>> [32mForbidden $rm from $si:$sp[0m\n");
		send_reply("403","Forbidden");
		exit;
	}

	if (has_totag()) {
		# sequential requests within a dialog should
		# take the path determined by record-routing
		if (loose_route()) {
			if (is_method("INVITE")) {
				# even if in most of the cases is useless, do RR for
				# re-INVITEs alos, as some buggy clients do change route set
				# during the dialog.
				record_route();
			}

			# route it out to whatever destination was set by loose_route()
			# in $du (destination URI).
			# route(relay);
			if (!t_relay()) {
				send_reply("500","Internal Error");
			};
		} else {
			if ( is_method("ACK") ) {
				if ( t_check_trans() ) {
					# non loose-route, but stateful ACK; must be an ACK after
					# a 487 or e.g. 404 from upstream server
					t_relay();
					exit;
				} else {
					# ACK without matching transaction ->
					# ignore and discard
					exit;
				}
			}
			sl_send_reply("404","Not here");
		}
		exit;
	}

	if (is_method("OPTIONS")) {
		options_reply();
		exit();
	}

	# CANCEL processing
	if (is_method("CANCEL")) {
		rtpengine_delete();
		if (t_check_trans())
			t_relay();
		exit;
	}

	if (is_method("BYE")) {
		rtpengine_delete();
	}

	t_check_trans();

	# requests for my domain
	if (is_method("REGISTER|PUBLISH|SUBSCRIBE|MESSAGE")) {
		sl_send_reply("503", "Service Unavailable");
		exit;
	}

	# I'm in a docker container -- assuming always inside a nat
	fix_nated_contact();

	# I want to be in the middle of signaling
	record_route();

	# create dialog with timeout
	if (!create_dialog("B") ) {
		send_reply("500", "Internal Server Error");
		exit;
	}

	# Debug
	xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REQUEST]               >>> [32mHandling $rm request for $si:$sp from $fu to $tu (ru: $ru)[0m\n");

	# apply transformations from dialplan table
	dp_translate("0","$rU/$rU");

	# Check for receiving number
	t_reply("100", "Trying");

	# 11 digit number normalization
	if($rU =~ "^1.*") {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REST]                  >>> [32m$ru starts by 1, need to be normalized![0m\n");
		strip(1);
	} else {
		xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REST]                  >>> [32m$ru does not need to be normalized![0m\n");
	}

	if(avp_db_query("SELECT `receiving_number`, `destination_uri` FROM `ecms`.`whitelist_rnumber_routing` WHERE `tollfree_number`='$rU'", "$avp(recv_num),$avp(dest_uri)")) {
		if($avp(recv_num) && $avp(dest_uri)) {
			$rU = $avp(recv_num);
			$du = $avp(dest_uri);
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REST]                  >>> [32mDATABASE LOOKUP FOR: $rU SUCCESS -> Sending $avp(recv_num) to $avp(dest_uri)[0m\n");
		} else {
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REST]                  >>> [31mDATABASE LOOKUP FOR: $rU FAILURE[0m\n");
		}
	} else {
		# Check for tracking number existence
		if(avp_db_query("SELECT `opn`.`routing_action`, `opn`.`sip_gatewayId`, `opn`.`receiving_numberId` FROM `ecms`.`op_number` as `opn` WHERE `opn`.`tracking_number` = '$rU'", "$avp(r-action),$avp(r-sgid),$avp(r-rnid)")) {
			if($avp(r-action) != null && $avp(r-sgid) != null) {

				# Retrive associated tracking number forward options and gateway mapping
				if(avp_db_query("SELECT `sg`.`address`, `sg`.`port`, `sg`.`digits_strip`, `sg`.`name` FROM `ecms`.`op_number` as `opn`, `ecms`.`sip_gateways` as `sg`
					WHERE `opn`.`tracking_number` = '$rU' AND `opn`.`sip_gatewayId` = '$avp(r-sgid)' AND `opn`.`sip_gatewayId` = `sg`.`id`;",
					"$avp(r-address),$avp(r-port),$avp(r-dstrip),$avp(r-name)")) {
	
					if($avp(r-action) && $avp(r-address) && $avp(r-port)) {
						$du = "sip:" + $avp(r-address) + ":" + $avp(r-port);
						xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> AVP_DB]                >>> [32mRouting Call to: $avp(r-name) ($du)[0m\n");
		
						if($avp(r-action) == "forward_to") {
							xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> AVP_DB]                >>> [32mNo remap needed[0m\n");
							if($(avp(r-dstrip){s.int}) > 0) { 
								xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> AVP_DB]                >>> [32mStriping destination number of $avp(r-dstrip) digit/s[0m\n");
								$rU = $(rU{s.substr,$avp(r-dstrip),0});
							}
						} else {
							# Retrieve mapping receiving number if any
							if(avp_db_query("SELECT `rn`.`number` FROM `ecms`.`op_number` as `opn`, `ecms`.`sip_gateways` as `sg`, `ecms`.`receiving_number` as `rn`
								WHERE `opn`.`tracking_number` = '$rU' AND `opn`.`sip_gatewayId` = '$avp(r-sgid)' AND `opn`.`sip_gatewayId` = `sg`.`id` AND `opn`.`receiving_numberId` = `rn`.`id`;",
								"$avp(r-number)")) {

								xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> AVP_DB]                >>> [32mRemapping needed: $avp(r-number) ![0m\n");
								$rU = $avp(r-number);
							}
						}
		
						$avp(x-new-ru) = "sip:" + $rU + "@" + $avp(r-address) + ":" + $avp(r-port);
						$ru = $avp(x-new-ru);
		
						xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> AVP_DB]                >>> [32mPlacing call to: $avp(x-new-ru) ![0m\n");
		
						# Route ahead
						route(relay);
						exit;
		
					} else {
						xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> AVP_DB]                >>> [32mRestful request status: $var(rest-ret) ($var(resp-status)), body:\t|$(var(resp-body){s.select,1,\"})|[0m\n");
					}
				}
			}
		}

		# Nothing found at db level -- revert to REST query
		$avp(rest-request) = "{{REST_ENDPOINT}}/OpNumbers/get_receiving_number?tracking_number=" + $rU;
		$var(rest-ret) = rest_get("$avp(rest-request)", "$var(resp-body)", "$var(resp-ctype)", "$var(resp-status)");

		if($(var(resp-status){s.int}) == 200) {
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REST]                  >>> [32mRestful request status: $var(rest-ret) ($var(resp-status)), body:\t|$(var(resp-body){s.select,1,\"})|[0m\n");
			$rU = $(var(resp-body){s.select,1,"});
		} else {
			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REST]                  >>> [32mRestful request status: $var(rest-ret) ($var(resp-status)) ... dropping call![0m\n");
			send_reply("403","Forbidden");
			exit;
		}
	}

	# route calls based on prefix
	if (!do_routing("1")) {
		send_reply("404","No Route found");
		exit;
	}

	xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REST]                  >>> [32mSending[0m [31m$fu[0m to [31m$ru[0m\n");

	uac_replace_to("$ru");
	t_on_failure("GW_FAILOVER");

	# Engage rtpproxy for recording purpose
	$avp(x-rtpproxy) = 1;

	# Route ahead
	route(relay);
}

route[relay] {
	# Debug
	xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> RELAY]                 >>> [32mRelaying $rm from $fu to $ru[0m\n");

	# for INVITEs enable some additional helper routes
	if (is_method("INVITE")) {
		t_on_branch("relay");
		t_on_reply("relay");

		# Do Accounting -- with extra parameters
		do_accounting("log", "cdr|missed|failed");
		$acc_extra(fu) = $fu;
		$acc_extra(tu) = $tu;
		$acc_extra(fU) = $fU;
		$acc_extra(tU) = $tU;
		$acc_extra(fd) = $fd;
		$acc_extra(td) = $td;
	}

	if (!t_relay()) {
		send_reply("500","Internal Error");
	};

	exit;
}

branch_route[relay] {

	if (!is_method("INVITE") || !has_body("application/sdp"))
		return;

	# Se richiesto coinvolge l'RTP Proxy
	if(($avp(x-rtpproxy) != null) && (!is_dlg_flag_set("11"))) {
#		# Coinvolge il proxy RTP
#		if (rtpproxy_engage("froc")) {
#			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> BRANCH]                >>> RTPProxy engaged\n");
#			set_dlg_flag("11");
#		} else {
#			xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> BRANCH]                >>> Fail to engage RTPProxy\n");
#		}
		$var(rtpengine_flags) = "trust-address replace-origin replace-session-connection rtcp-mux-demux ICE=remove RTP/AVP";
		rtpengine_offer("$var(rtpengine_flags)");
		set_dlg_flag("11");
	}

	remove_hf("Route");
}

onreply_route[relay] {

	# I'm in a docker container -- assuming always inside a nat
	fix_nated_contact();

	if (!has_body("application/sdp"))
		return;

	# Handle recording for call answer and call progress
	if ($rs =~ "(200)") {
		# Double check for SDP presence
		if (has_body("application/sdp")) {
			# Starts recording
			if(is_dlg_flag_set("11") && !is_dlg_flag_set("12")) {
#				rtpproxy_start_recording();
#				xlog("L_INFO", "[$(fU{s.fill.left,'.',15}) -> REPLY]                 >>> RTPProxy started recording!\n");
#				set_dlg_flag("12");
				$var(rtpengine_flags) = "trust-address replace-origin replace-session-connection rtcp-mux-demux ICE=remove RTP/AVP";
				rtpengine_answer("$var(rtpengine_flags)");
				rtpengine_start_recording();
				set_dlg_flag("12");
			}
		}
	}
}

failure_route[GW_FAILOVER] {
	if (t_was_cancelled()) {
		exit;
	}

	# detect failure and redirect to next available GW
	if (t_check_status("(408)|([56][0-9][0-9])")) {
		xlog("Failed GW $rd detected \n");

		if (use_next_gw() ) {
			t_on_failure("GW_FAILOVER");
			t_relay();
			exit;
		}

		send_reply("500", "No other routes available!");
	}
}

local_route {
	if (is_method("BYE") && $DLG_dir=="UPSTREAM") {
		acc_db_request("200 Dialog Timeout", "acc");
	}
}
